body:
  text: 周易參義卷上元梁寅撰上經乾下乾上乾元亨利貞文王乾卦之辭非以為四德也以為四德者由夫子始也夫子之意蓋以乾坤二卦盡天地之道故尊異其辭而因以明造化之大固非他卦之可同也然乾之為卦至大也而其占辭之略何也曰辭之略者此其所以為大也諸卦之言亨也有不曰元者矣有曰小亨者矣有曰某事亨者矣而乾獨曰元亨則無往而不大通也諸卦之言貞也有曰利某事貞者矣有曰小利貞者矣有曰利艱貞者矣而乾獨曰利貞則無往而不利於正也然元亨矣而又必利貞何也曰此為占者言之也蓋以乾之德固可大通然大通而不能正固是其德為有間非乾之德矣亦安能以保其終乎若自聖人而言之則固與天同德而無不亨矣無不貞矣雖然亦不可以不戒也初九潛龍勿用夫易者潔靜精微之教也故其取象皆假託其物而未涉於事包含其意而各隨所用然乾純陽之卦而取象於龍則其意多為聖人而發者故夫子於文言皆以聖人事明之今觀之六爻則象之所示占之所決夫人可用也獨聖人乎如初九之潛龍勿用在聖人則方居側微也在君子則遁世無悶也在學者則養正於蒙也在吾民則耕鑿出入也在商賈則韞櫝深藏也以是而推其用何不可哉朱子以象占言易而不欲以事論懼人之泥而失之也九二見龍在田利見大人六畫以下二爻為地而二在地上故為田之象龍見於田則雖未飛躍而人已共見矣故其占為利見大人大人者大德之人也占者有其德則大人即巳而他人所利見也無其德則大人者他人而已利見之也九三君子終日乾乾夕惕若厲無咎九三不言龍何也朱子曰陽剛不中居下之上有勞苦之象故不可以龍言若以龍言之其亦在亢旱之地爾終日乾乾在聖人為純亦不巳在君子為進德修業然聖人之心未嘗自以為足故以君子言之也其厲而無咎者重剛不中故有危厲然能乾乾惕若斯無咎矣九四或躍在淵無咎四隂位也隂虛故為淵之象淵雖下於田而可以通乎天龍躍于淵則欲飛而未飛乃進退未定之時也故以或言之占者之於事或進或退皆順於時而無容心焉斯可以無咎矣九五飛龍在天利見大人五君位故以飛龍言之六畫以上二爻為天故以在天言之聖人以天德而居天位其象如此若臣民占之則所利見者在上之聖人聖人自占之則有德有位者臣民之所利見又以二五互言之則二所利見者九五大德之君五所利見者九二大德之臣朱子所謂君有君用臣有臣用父有父用子有子用於此可見上九亢龍有悔龍靈變之物未嘗亢而悔也而曰亢龍有悔則以戒乎人也隂陽之消長進退極則必反理勢然也然苟能以髙亢盈滿為戒則地雖亢而處之未嘗亢時雖悔而處之無所悔亢且無矣而况於傾覆乎悔且無矣而況於凶咎乎能是道者固聖人之事然在於他人則尤不可以不愼也用九見羣龍無首吉歐陽子曰乾爻七九坤爻八六九六變而七八無為易道占其變故以其所占者名爻不謂六爻皆九六也六十四卦皆然特於乾坤言之則餘可知耳朱子釋用九之義蓋因於此云坤下坤上坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉坤之占為大亨而利於如牝馬乃其正也牝馬順而健行者不順則專而無成不健則不能配乾順而健者坤之正也史記云天用莫如龍地用莫如馬故乾之象龍坤之象馬若乾為馬坤為牛則又夫子之取象與文王之象固異也君子有所往者若居先則迷居後則得而主於獲利焉居先自專也故迷錯居後從陽也故得利陰為富為利漢書稱地為富媪非以利生於地歟西南得朋西南隂方也東北喪朋東北陽方也文王八卦自西北之乾至東之震皆父與三男之位故東北為陽方自東南之巽至西之兌皆母與三女之位故西南為隂方坤往於西南則巽離兊皆其朋也得其朋則生育之功成矣若迷而往於東北則雖喪其朋然能反之西南即得其常道而終有其福慶矣夫隂從陽者也而乃以往陽方為失道者蓋隂盡隂道乃所以順從於陽也若隂居陽職則是干陽也而豈從陽之謂哉曰安貞吉安於正則吉也順而健也後得而利也得朋喪朋也是皆坤之正道也而坤能安處之吉孰大焉蓋坤所以承乾者故常減於陽之半以前後言則缺於前以四方言則虧於東北在造化且然而況於為人臣子乎初六履霜堅氷至以類言之陽為君子隂為小人隂長而害陽猶霜之至於氷勢之必然也隂生之時陽道方消而隂亦未盛也故未有凶咎為君子者戒之於初則可以免矣六二直方大不習無不利坤六二以三才言之則得地之道以二體言之則居下之中以一爻言之則隂居隂位其視諸爻至為純粹者故有直方大之三德焉占者有是德則不待學習而自無不利無是德則雖習亦不利也不習云者謂無計較無覬覦其德其利皆自然也然坤賢人之德也其不習而利豈真不習乎其德內直外方而又盛大在人言之則真積力久而有得者也故其不習者未始不由於習此爻之辭但以成德者言之耳六三含章可貞或從王事無成有終隂陽相雜則成章六三以隂麗於陽章美之象也然未發於事業故為含晦其章美以隂居陽本非正位故又戒之以可貞有是章美而又能守正則或從王事必有終矣其以或言之者五非陽剛君失其道三雖居下之上而當閉塞之時其志之得行與否未可必也且曰無成有終則雖或當任豈能大有為哉亦隨時補助而巳六四括囊無咎無譽隂而又隂結塞不開括囊之象也時至於是亦豈非君失其道歟君子知隨時之義守括囊之戒則無咎無譽矣其曰無咎又曰無譽者蓋欲無咎則必無譽然後可苟有其譽不免於咎矣如東漢黨錮之士是也六五黃裳元吉五有中德為黃之象以六居之為裳之象君而如是所謂徽柔懿恭也臣而如是所謂柔嘉維則也君子而如是所謂和順積中而英華發外也其占為元吉宜矣哉上六龍戰于野其血玄黃王介甫曰隂盛於陽故與陽俱稱龍陽衰於陰故與陰俱稱血斯言善矣蓋龍固陽之象也然謂之龍戰則隂亦龍矣血固隂之象也然其血相雜則陽亦血矣不言凶者陰陽兩傷則凶可知也用六利永貞用六義見乾用九震下坎上屯元亨利貞勿用有攸往利建侯屯震下坎上震動也故可以大亨坎險也故利於守正勿用有攸往者以在坎險之中宜守其正而俟其亨不可躁動也利建侯者震陽卦一君而二民有立君之象也初九磐桓利居貞利建侯初九為成卦之主故其爻辭亦彖辭之意磐桓即彖之勿用有攸往也利居貞即彖之利貞也利建侯即彖之利建侯也觀利建侯之占則又與乾之利見大人意同六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字二處動體而乘初之剛有險在前故曰邅如班如言欲動而不能也以隂居隂柔順之至故又曰匪寇婚媾言二逼於初陽而為陽所求陽非為寇乃求為婚媾也居中得正非輕動者故又曰女子貞不字言其能以貞正自守而非其正應者不從也九五剛中與二為應故又曰十年乃字言相求以道則始雖有難而終必合也六三即鹿無虞惟入于林中君子幾不如舍往吝三不中不正無應而往求此小人之道也而以君子言之者以君子之道勉其人也若占者為君子固當以小人之道為戒矣六四乘馬班如求婚媾往吉無不利四與初為應婚媾也初求於四四亦求於初為隂陽相求之正道故往吉無不利此爻之占上進則艱阻而下交則有合也九五屯其膏小貞吉大貞凶坎為水膏澤之象也五陽剛得位宜施其膏澤者然在於險中未能自出其應又弱不能輔助而初九方得民於下是則五雖有其膏澤而屯塞不能施也為人上者於此時以小而正之猶可吉也若欲大正之不免凶矣小正者以漸而正之也蓋小正則吉者以在於其位而為所可為也大正則凶者以時勢既失而不可以強為也為可為於可為之時則從為不可為於不可為之時則凶可無愼哉上六乘馬班如泣血漣如屯之極乃亨之時也而上六處屯極則隂柔無應不離於險是安有亨之時哉乘五之陽進無所之乘馬班如之象也坎為血卦又為加憂泣血漣如之象也胡氏曰二乘初上乘五四應初亦云乘皆以上乘下之義其説得之坎下艮上蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞蒙亨蒙有亨之道也能發人之蒙則道行於人能資人以發蒙則道成於巳皆所謂亨也匪我求童蒙童蒙求我言必待其求而應之若自往告之則為枉道矣初筮告再三瀆瀆則不告言其求之誠一則告之若不誠而告之則為失言矣利貞言人求於我我告於人又皆利於得正也若其不正雖求之誠一安能亨乎初六發蒙利用刑人用説桎梏以往吝初近於九二賴之以發蒙者然九二之發其蒙也必寬猛相濟而威恩並行然後有其益若専尚威猛往而不反則取羞吝矣蓋始未知教則嚴其刑法使之知懼此威以懲之也彼既知懼矣則又解其桎梏觀其心服此寬以待之也若寬之而服斯無用於刑矣寬之而猶不服則刑之復用又何病焉或乃一於威刑而不暫寬以待之則其心不服有益其悖戾而終不順者矣是則雖彼之凶而用刑者亦豈不羞吝乎聖人之治人其慮深矣九二包蒙吉納婦吉子克家陽剛明隂柔暗故陰為蒙者而陽為發蒙者卦惟二陽而九二以剛居中為內卦之主與五相應初與三四又皆比附之當發蒙之任盡發蒙之道非九二其誰哉二中而不過為能包蒙言其量之有容也以陽受隂是為納婦言其志之相得也居下任事為子能克家言其才之有為也其占如是吉可知矣六三勿用取女見金夫不有躬無攸利三隂不中正而近於九五非其正應是邪淫之女見多金之夫而妄從之不能自有其身者也故戒占者以勿用取而言其無攸利焉蓋立身一敗則萬事瓦裂男取不正之女女有不正之行皆無所利矣推而言之君臣之遇合朋友之交際安往而不然哉六四困蒙吝以隂居隂柔暗之主而逺於二陽又無正應其蒙蔽之甚不能開通故象占如此六五童蒙吉夫所謂童蒙者非必童稚也蒙暗不明如童子之無知雖成人亦童蒙也六五雖蒙暗然以隂居陽而本有章美居於尊位而九二應之又以柔中之德能順巽於二則其蒙之發者將昭然矣豈有不吉乎上九擊蒙不利為寇利禦寇發人之蒙者貴於寬猛相濟而上九過剛非師傅之道乃將帥之事故不言發蒙而言擊蒙謂用兵以擊伐其蒙也自蒙者言之九居蒙之終乃蒙暗之極而非可以善喻宜受擊者也然擊蒙者不利為寇而利於禦寇貪忿之兵為寇也聲罪致討禦寇也推之他事凡無故加人者皆為寇也名正言順者皆禦寇也為寇禦寇其事相類而得失利害之分逺矣可不慎哉乾下坎上需有孚光亨貞吉利涉大川凡有需待者貴於有孚而得貞有孚則光亨貞則可以吉孚信也貞正也信而不正正而不信則雖有所需終不遂矣利涉大川以乾健而臨坎水也然乾之利涉非徒恃其健也以其恆易以知險能待時而進也若欲速而犯難則失需之義矣豈乾健之所為乎初九需于郊利用恆無咎需下三爻以去險逺近為吉凶初以陽處下最逺於險故為需于郊之象郊荒逺之地也而君子安處焉故云利用恆安常守故而不躁於進斯無咎矣九二需于沙小有言終吉郊逺於險而但言無咎沙近於險而乃得終吉何也初剛而不中不中則不能常也故戒之曰利用恆二剛而得中中則能常矣故其所值但為小有言而終則吉也九三需于泥致寇至三在下之上以陽居陽過於剛者也其需也不安處於逺而迫近於泥是有躁進之心矣故曰致寇至言自致之也然不言凶咎者以險在於外若能敬愼猶可免也六四需于血出自穴坎為血卦需于血則蹈其難矣然能出於坎陷者以柔而闕曰四居坎初而當三陽之進需于血者為陽所傷也出自穴者隂必避陽也隂能避陽則順服於陽而難可免矣故爻不言凶咎而象言順以聽所以開小人遷善之門也九五需于酒食貞吉坎體中多言酒食必有其象而不可知矣邱行可曰酒食所以待賔也下三陽為客需時而進五以一陽為之主故需于酒食以待其來以明良之會成涉川之功何吉如之又按鼎之傳曰大亨以養聖賢則人君之養賢固必豐其饗食矣以上六敬不速之客猶可終吉而況於人君養賢之正乎上六入于穴有不速之客三人來敬之終吉其言入于穴者隂柔之甚居險之極不能自出於險矣然三陽之進勢有必然如賔客之來而不待速召上六者若能敬之則猶可賴其力以出乎險故終有吉也小人自取禍敗而賴君子以得免其占當如此云坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川凡訟者必有孚也然後有以信於上必窒塞也然後有以絶乎私必畏惕也然後有以禦其姦必得中也然後有以勝其邪訟而有是四者故吉也若無是四者而徒欲終極其訟則凶矣然聽訟者非陽剛中正之大人則雖孚而窒惕而中亦安能伸其屈乎見大人則固利矣然不顧義理而輕犯大險則大人聽其訟亦安能自免於罪乎自有孚以下皆戒愼之辭也而曰不利涉大川者則尤欲其慎於未訟之先也夫以剛乘險以實履陷苟非孚窒惕中則自蹈於難而終以凶矣得是占者可無思乎初六不永所事小有言終吉柔居訟之初必不終其訟也故曰不永所事柔居險之下必不極其險也故曰小有言訟而如是則終吉矣九二不克訟歸而逋其邑人三百戶無眚九二以剛處險而與五為敵五居尊位而乾體中正二雖能訟勢不敵五以下訟上義亦不勝故不克訟也然二亦剛中能自知理勢不敵而遜避於五故歸而逋也邑人三百戶其所自有者也坎為陽卦一君二民有君長之象其與五訟也蓋恃其險健欲爭奪人之土地者然理勢不敵則非取亂侮亡之義矣故退而安處其邑則雖地狹民寡而可終無眚不然巳之所有且不能保而況於能奪人之所有乎世之不能度德量力而貪以取敗者觀此可戒矣六三食舊德貞厲終吉或從王事無成六三隂柔而其應上九剛健之極隂之於陽宜相聽順而不可與抗也故三不能訟唯食其舊德而巳食舊德者守舊安常之謂也守舊安常又在持之以正固處之以危厲方得終吉若或不正不固居安忘危則巳雖不訟而強敵亦將奪之矣其能吉乎若夫從於王事以有成功亦非隂柔之所能也是亦莫若守其常分而巳九四不克訟復即命渝安貞吉四雖剛健而居於隂位非至健者又與初為敵而初能聽順不與之校又近於九五則聽其訟者乃中正之大人此其所以不克訟也既不克訟則自反而就於正理變志而安於貞正可以吉矣九五訟元吉九五居尊位為訟之主而有陽剛中正之德其聽訟也能明以照之公以服之健以決之訟其有不平乎故以諸爻觀之初則不永三則食舊二四則不克而上則終凶皆由九五善於聽斷故始雖有訟而終於無訟其為吉之大也亦宜哉上九或錫之鞶帶終朝三褫之上九與六三訟者三柔不敵而上健之極又不中正故終極其訟或錫鞶帶訟而有得也終朝三褫得必復失也訟雖有得而必復失理勢固然也終凶之戒可不畏哉坎下坤上師貞丈人吉無咎凡用師之道在於得正與擇將而巳若不得正則兵出無名而事不成不擇將則將不知兵而喪其卒丈人者卦之九二乃剛健中正之大人也出師既正而又得大人為之將則吉且無咎矣程子曰吉無咎有吉而有咎者有無咎而不吉者吉而有咎凡無名行師而幸勝者是也無咎而不吉凡聲罪致討而不勝者是也吉且無咎如夫子言我戰則克臨事而懼好謀而成是也初六師出以律否臧凶初師之始也故言行師之道以律則吉不善則凶世之用師固有不由正法而勝者矣然殘民而構怨未免於否臧之凶也蘇子瞻曰以律者正勝不以律者竒勝既失律矣勝亦負也其亦善言易矣哉九二在師中吉無咎王三錫命二以一陽統衆隂受六五之命任閫外之責而能以剛處中威德兼著其吉而無咎宜矣然非在上者信任之深褒寵之厚亦何由而成功乎自古忠良之將多矣然其無成功者或委任不隆或吝於爵賞或輕信讒間或代以私人若是者豈將之不能哉由君之不能用也如九二之為將雖非因寵祿而後盡力者然六五之君深所倚仗其可無三錫之恩乎六三師或輿尸凶以一卦觀之則九二獨為將自各爻觀之則皆將帥之事也六三以隂居陽不中不正失為將之道矣其輿尸而歸凶孰甚焉六四師左次無咎師之左次者或義有不順力有不敵而全師以退或善師不戰善戰不陳而待敵自服皆可以無咎矣四居隂得正故能如是六五田有禽利執言無咎長子帥師弟子輿尸貞凶六五以隂居尊以柔道服天下者也故其用師也不為貪暴而但為應兵田有禽寇敵之為害者也利執言則奉辭以攘除其害也用兵如是無咎矣然將非其人亦敗也故以長子帥師而以弟子參之則亦不免於輿尸長子老成之將也弟子者不經事之少年也人君委任失人以致傷敗雖有言可執而得其正能無凶乎上六大君有命開國承家小人勿用上六師之終故言封賞之事大君有命其功之大者命之以開國而使為諸侯功之小者命之以承家而使為大夫爵必稱其功報必償其勞無僭差無私吝此王者公天下之心也然師旅之興人才非一概或以忠勤或以勇力或以才幹或以謀略其封賞之行固無不及也至於董正治官任以庶政則惟賢是用不復計其功矣故戒之曰小人則勿用如漢光武中興其功臣無不封者而得與於政惟鄧禹耿弇賈復三四公他皆不任焉蓋合於此爻之義也或曰小人任事不可也而有土有民獨可哉曰賞者公道也彼有功而不賞得為公乎且大惡如象而以親當封舜不敢廢也而以功當封者聖人其敢廢之邪聖人於此惟當别有處之之道耳而廢其功則不可也斯義也朱子實發之而與本義之言異故述之於此坤下坎上比吉原筮元永貞無咎不寧方來後夫凶凡為人所親比與親比於人者皆吉之道也卦之九五以一陽居尊位剛而中正上下五陰比而從之此為人所親比者也為人所比必有其德然後可故必再筮以自審如揲蓍求卦固筮也或卜度於心亦筮也元永貞元善之長也永能長久也貞正而固也再筮而有是三德則衆皆歸之無咎矣夫為人上者以其德為下所比則天下之人孰不舍暴而歸仁去亂而從治若安於私比昧於所從則殃咎至矣故九五在上則其不寧者方來親比之而後夫者凶也後夫謂後至之人也初六有孚比之無咎有孚盈缶終來有他吉初之為孚信何也曰陽為實隂為虛初以隂居陽虛而能實此孚信之象也有孚盈缶缶本虛也而有孚盈缶則實矣其孚如是始雖無應而終有他吉也他吉吉之自外來者也六二比之自內貞吉二與五為比由內而比外者也凡貞吉有爻之本善者有爻非貞而為之戒者此曰貞吉爻之本善也言自內比外而得其正是以吉也六三比之匪人三與上六為應而又上比於四下比於二以隂而比隂所比皆非其人之象也六四外比之貞吉卦以上為外下為內四雖在外卦然以四視五則五為外而四亦內也四近五逺初初亦隂也故四不比初而比五所謂外比也以隂居隂為得正而又比於陽得相比之正其吉宜矣九五顯比王用三驅失前禽邑人不誡吉九五陽剛中正為比之主陽剛則明而不暗中正則公而不私此其所以為顯比也以象言之如田狩而用三驅失前禽來者不拒去者不追此上之比下也固顯比也比下既得其道則雖私屬亦喻上意而不待告誡此下之比上也亦顯比也上下之相比同一顯明之道又安有不吉乎上六比之無首凶隂必比於陽上六隂也而居陽之上不能比於陽矣故為比之無首而凶也首居上者也陽不居首而隂居之此倒置也無首之象也乾下巽上小畜亨密雲不雨自我西郊以巽之隂而畜乾之陽以四之一隂而畜上下之五陽故謂之小畜其曰亨者陽之亨也卦之二五皆陽剛中正固可亨也易為君子謀不為小人謀以人事言之以小人畜君子以人臣而畜其君皆小畜也小畜之時陽未失道其亨自若但失其道則不能亨耳四一隂而言密雲者以隂居隂亦隂之盛也然雲自西郊而興則隂先倡之而陽性上進不能應和故雲雖密而不雨也世之興功立事不出於君子而出於小人則雖欲強為而人心不和未有能成其功者觀小畜之象亦可以自省矣初九復自道何其咎吉陽在上者也而乃居於下則其上進乃復其故處復之由於道者也三陽在下同志並進初雖應四而二陽間之故不畜於四而能上進也然初本與四應宜若有咎也故占辭變文曰何其咎吉言何至於咎乎斯為吉矣曉占者能絶其私繫而隨於同類則吉也九二牽復吉二與五同德者也五剛健中正以在尊位非四之一隂所能畜止而二居下卦之中方與上下二陽同志並進賴五在尊位為之牽引故於五言攣如而於二言牽復也夫君子之居下位未有不獲乎上而能勝夫小人者也然其獲乎上也必以中正同德然後為不失不然雖得上之心亦枉道而合者也道既枉矣雖欲正人其將能乎九三輿説輻夫妻反目輿所以行者也陽方上行而前遇隂則為隂所制而不能行矣此輿而説輻之象也隂説於陽陽係於隂故為夫婦然本非正應而內外異體此夫妻反目之象也六四有孚血去惕出無咎六四以一隂畜五陽自全卦言之則為小人畜君子自本爻言之則四近君位為以臣而畜君也孟子曰畜君何尤畜君者好君也然處近君之位乃多懼之地苟欲畜止其君之惡而無其孚誠則雖曰好君而君能免於疑乎夫子言未信而諫則人以為謗巳又教子路事君曰勿欺皆有孚之謂也能有孚誠則血傷可去惕懼可出矣又何咎乎九五有孚攣如富以其鄰小畜之時本以陽為隂所畜故陽亦牽引同類以力拒乎隂然以五陽觀之上九無位而下之三陽又在下而方進則居位而為之主者九五也九五賴下之三陽進而拒隂則其同志相求如縻係然言其結之固也富以其鄰言由其力之富盛故能用其鄰以自助也君子當小人將盛之時其同心協力而防微杜漸蓋如此云上九既雨既處尚德載婦貞厲月幾望君子征凶上九處畜之極隂既極盛終能畜陽昔之不雨者今既雨矣昔之尚往者今既處矣然隂之盛非一日由其德積滿而然也故云尚德載隂盛敵陽雖正亦危故云婦貞厲此二句以戒小人也月之幾望隂方盛之時也隂之方盛則君子有行已不免於凶矣而況此盛極之時乎此二句以戒君子也爻辭如此蓋君子小人俱不利之象兊下乾上履虎尾不嘻人亨履者踐履也人之於禮亦踐行其天理者故履為禮也夫虎剛猛之獸乾三陽虎之象也上為虎之首則四為虎之尾兊履乾之後履虎尾之象也虎嘻人者也然以和説履之則不見嘻而反致亨以是觀之人之踐履卑遜何往而不亨乎行於強暴則強暴服行於蠻貊則蠻貊化行於患難則患難弭皆和説之效也然和非阿容也説非佞媚也亦恭順而不失其正耳兊之傳曰剛中而柔外此其道也初九素履往無咎人之所履貴於卑下初九以陽剛之才而居至下之地猶君子安其卑下之素而無躁進之失履之善者也愼斯以往夫何咎之有九二履道坦坦幽人貞吉夫行於道路者由中則平坦從旁則崎險九二以剛居中是履道而得其平坦者也持身如是乃君子不輕自售而安靜恬淡者故為幽人貞吉言幽人如是則正而吉也此爻亦戒於躁進之意六三眇能視跛能履履虎尾嘻人凶武人為于大君兊互體離離為目故言眇能視兊又為毁折故言跛能履夫履虎尾而不嘻人者以和説而中正也若不中不正暗於識而輕於進則未免於嘻人之凶矣其以為武人者蓋以柔居剛外隂暗而內剛猛武人之象也以為大君者卦以六三一隂主乎五陽是武人而為大君處非其位亦肆為凶暴自取滅亡而已矣九四履虎尾訴訴終吉以兊履乾則四為虎尾以四履五則五為虎尾四不中正而履五之剛宜見傷害者然以剛居柔又近而多懼故為訴訴恐懼之象而得終吉也六三之所以見嘻而凶者亦以其視履之不慎而不知懼焉爾九五夬履貞厲彖傳言剛中正履帝位而不疚即九五也然彖言不疚爻言夬履何也蓋夬決其履而過焉者即所謂疚病也彖言其德之善而巳而此則言其病所以戒之也剛明之君夬決其履非暗於識而妄行者但恃其剛明而為之或過故雖得正而不免於危也五若能處之以畏愼則可以轉危而為安矣大傳曰乾天下之至健也德行恆易以知險五健之至矣而知險之戒可不愼哉上九視履考祥其旋元吉上履之終也人之所履者觀之於始則誠偽未可見惟觀之於終然後見也故視其所履以考其善若周旋無虧則其吉大矣是爻也豈非動容周旋中禮而為盛德之至歟乾下坤上泰小往大來吉亨乾上坤下不易之位也而泰之為卦則乾下坤上乃相交之用也有不易之位然後有相交之用故交泰之時先言小往然後大來也陰陽之氣既交則隂往居外而助其化陽來居內而為之主又上下二體隂陽各相應而其志通此所以為泰也所以吉而亨也初九拔茅茹以其彚征吉自全卦言之則以隂往陽來為吉自各爻言之則又以陽之上進為吉進之與來雖取義不同然進而有為即來而為主者也初九雖在下而三陽牽連並進如拔茅而併其根俱起此以其同類而進者也有征行而得是占則巳雖不能帥先以趨事而有同志之引援亦獲吉矣九二包荒用馮河不遐遺朋亡得尚于中行九二以剛中而應六五之柔中此大臣當治泰之任者也故於此備言處泰之道焉包荒者其量之寬也用馮河者其行之勇也不遐遺者其慮之周也朋亡者其心之公也九二以剛而柔其有不寬乎以剛而進其有不勇乎以剛而明其有不周乎以剛而中其有不公乎夫寬而有勇周而不比君子之成德也大臣之當務也占者能如是其合於九二中行之道乎九三無平不陂無往不復艱貞無咎勿恤其孚于食有福聖人於天下之患不圖之於巳然而常戒之於將然泰之時吉亨之時也然九三才過中則聖人即為之戒非思患豫防之意哉天下之理平者必有傾往者必有復隂陽之相勝治亂之相因如循環然唯善處之者於此之時如奉槃水如馭六馬有戒懼之意而無怠忽之心焉故艱難守正則可以無咎也如豐之為卦亦盛大之時也而其彖之傳曰日中則昃月盈則食天地盈虛與時消息亦此意也然君子於此之時亦鞠躬盡力而巳至於成敗利鈍則豈能必哉故又當勿恤其必信斯可也若事求其可功求其成則利害之心生理義之意沮亦非所謂艱貞者矣能艱貞矣勿恤矣則其效亦有不期而終者其于食有福也豈非自天祐之而吉無不利者歟六四翩翩不富以其鄰不戒以孚隂爻中分有鳥羽之象翩翩言其飛之疾也隂陽往來其疾徐等爾而言隂復之疾者所以深戒夫陽也小畜九五曰富以其鄰言以其富厚之力而能用其鄰也陽自下而上則三在於前而初二兩爻乃其彚也隂自上而下則四居其首而五上兩爻乃其鄰也不戒以孚者不待告戒而自相孚信也君子道消小人道長則其乘機伺隙以僥勢利者不待號召紛然而集矣君子處之其慮當何如哉六五帝乙歸妹以祉元吉商帝乙釐降王姬其禮必盛故特稱之以柔居上帝女之象也下配九二下嫁之象也以位言之則至尊之女以妻其下宜不敢匹者然以禮言之則陽尊隂卑夫先婦後不得而紊也故如六五之柔中虛已以下應九三則有其福祉而大吉若恃其貴勢以輕其夫家則隂反制陽而夫婦之道廢矣其能免於咎乎上六城復于隍勿用師自邑告命貞吝上六泰之極變而為否之時也坤為土而上處至髙土之至髙而復傾圯城復于隍之象也坤又為師衆為國邑故言師言邑當泰極之時人心驕怠勢將潰散雖欲用師必無成功不若不用師而自守之為愈也自邑告命言姑守其邑而戒飭其衆不可以有為也時至於此末如之何矣失之於此而其亂巳成今雖以正自守亦可羞矣然能隨時順理扶衰補敗而不至於凶猶可也屯之小貞吉大貞凶意亦如此云坤下乾上否之匪人不利君子貞大往小來乾上坤下宜若尊卑之得所也而其卦為否者以二氣不交而閉塞故也以人事言之隂柔之小人為主於內而陽剛之君子出居於外此天地閉塞而賢人隱之時也否之匪人言當否之運者非其人也居其位者既非其人則君子之正道者不利矣故大往而小來也初六拔茅茹以其彚貞吉亨君子小人皆以類牽連而進者故否三隂亦取拔茅之象然人之有生均具此性君子之與小人豈其性之大相逺哉亦由其所習之異耳否下三爻雖為小人之方進者然以六居初則其進也在二隂之後其處也在卑下之位是罪惡之未形者也若初者苟能持之以正而不流於邪則亦君子矣其吉亨也宜哉六二包承小人吉大人否亨否三隂以所處之髙下見其惡之淺深二以陰而應五已居其位而任其事不能如初之反正矣然以其處得中正故猶能包容承順乎君子小人而如是固小人之吉也大人而當此時則其身雖否而其道自亨大凡小人肆其姦凶則君子者雖欲全身避禍有不免也今幸而小人猶能包承使君子得安於退遁是亦君子之亨也然君子小人非可共事彼雖包承其心終異為君子者又安可以彼包承而輕於附之邪亦安於吾之否而巳矣六三包羞三不中正而居位益髙姦惡益甚異於二之包承者矣然所為不善亦未免於愧􅌤故為包羞也或曰否之過極時將復泰則公論漸伸而姦惡銷沮故三自以所為不善而包羞也此義亦通九四有命無咎疇離祉泰極則為否否極則復泰故泰之外卦言小人而否之外卦言君子九四者否過中而泰復來之時也故言有命無咎疇離祉謂天運循環既往而復而疇類三陽皆獲其福慶然占者為君子則如是若小人則未免於咎也九五休否大人吉其亡其亡繫于苞桑天下之否非有髙世之才德者不能濟故必陽剛中正以居尊位然後能休息其否也休否者為剛中之大人則吉也苟非其人則凶矣其亡其亡戒懼之辭也無道之君自謂不亡故亡有道之君常懼其亡故不亡苞桑者叢生之桑繫于苞桑堅固之至矣人君能常戒懼則其堅固如是也上九傾否先否後喜上九不言否傾而言傾否者蓋否極而泰雖由天運而傾否為泰實因人力傾時之否者苟非陽剛之才則天時雖至人事未應否固自若也然傾否之道當正其誼不謀其利明其道不計其功故其占又曰先否後喜所謂先天下之憂而憂後天下之樂而樂者也離下乾上同人于野亨利涉大川利君子貞同人之道以大同而不私為善故卦之諸爻或比或應皆為同於所近無大吉者而彖言同人于野則能絶其私與而廓然大公此其所以亨也其取乎野之象者何也以一卦觀之由內而至外初為同人于門至近也二為同人于宗亦近也至上而同人于郊則逺矣然未如野之尤逺也國外謂之郊郊外謂之野同人于野豈非超出於家邑之外乎二為同人之主而不能大同故其有應者乃所以為吝初上雖無咎無悔然終不若于野之亨也聖人以四海為一家中國為一人而情無不孚恩無不洽者豈非同人于野之意哉人心之大同則何為而不成何往而不利雖大川之險涉之無難矣然亦必行之以君子之正道然後為利也不然處斷之乖理持守之不固雖其心之匪私亦豈能亨乎夫同人于野心之公也利君子貞事之正也世固有其心非私而事失其正者亦有事雖正而未能無私者君子所以通天下之志其唯至公至正之道乎初九同人于門無咎初與二相近二隂而偶門之象也初同人于門同於二也初處卑下之地雖不能盡天下之大同然能出門同人不昵於私亦可無咎矣然其不能亨者非其有私也以其不在於位而未能達之天下爾六二同人于宗吝卦唯六二一隂諸陽皆欲同之二又中正足以致人之同使其無所私係則善矣而二乃應五是未免於私也故為同人于宗其所同者止於宗黨而不能及逺吝之道也九三伏戎于莽升其髙陵三嵗不興同人之卦變則為師故三四五爻皆以用師言之九三以剛居剛而不中乃恃其強力者也然欲同於二而二與五應故懼五之見攻而伏戎於草莽又升髙以顧望至於三嵗之久終不敢興世之強暴者欲奪人之所有而畏於名義遷延顧望其狀蓋如此九四乘其墉弗克攻吉九四亦欲同於二而為三所隔故乘墉而攻之三居下卦之上墉之象也然四以剛居柔故能以義自反而不克攻此吉之道也同人諸爻未有言吉者如九四之興兵攻奪亦非得吉之道也然聖人於此爻獨言吉者所以深美其能自反也常人之情過而能改者鮮矣而於訟與師則必伸其志其能自反者為尤鮮蓋有計窮力屈不得已而退者矣未有其力之強而能自退者也春秋趙宣子納邾公子捷災于邾邾人辭之以義宣子引師而去之先儒引此爻之義以美其事蓋聞義能徙者誠人情之所難也九五同人先號咷而後笑大師克相遇九五以乾剛中正而居尊位所宜盡大同之道者然下與二應而係於私失君道矣欲同於二而為三四所隔故先號咷然同心相與終莫能間故後笑三四間之者皆剛強故用大師克之始相遇也上九同人于郊無悔上無所係應而同人于郊則所同者逺亦無私矣然猶未能極乎逺故不能吉亨止於無悔而巳象傳言志未得蓋其所同者未能周於天下是其志之未遂也乾下離上大有元亨陽為大隂為小大有六五一隂能兼諸陽而有之是所有者大也又卦之為象火在天上凡天地之間萬物之富莫不畢照亦所有之大故卦之名曰大有所有既大則其亨亦大矣初九無交害匪咎艱則無咎大有者富有之時人情易至於驕溢驕溢之極則殃害至矣初九居大有之初自處於卑下而在上無應與是雖富有而不驕溢故曰無交害匪咎言未涉乎害非有咎也然富不與奢期而奢自至人情之常也今雖非有咎苟忽而不戒咎亦至矣故又當艱以處之然後無咎也艱者艱難其思慮戒愼之意也九二大車以載有攸往無咎車者健行之器而其中能容載九二以剛健居下卦之中而所有者大此大車以載之象也如此而有所往則如車之不輸其載宜無咎矣九三公用亨于天子小人弗克九三居下之上乃諸侯之象也當大有之時不自有其有而以獻之於天子其善可知矣亨讀作享獻也諸侯土地人民受之天子非所敢私也其財用貢賦皆生之於地而取之於民而三能不私其有以歸於王府忠莫大焉彼小人者好專利而不厭不至於侵奪其君亦可矣而安有能竭力以奉上者乎故又曰小人弗克三雖正而不中故設二義所以贊君子而勵小人也九四匪其彭無咎六五柔弱之君也九四以陽剛在其側有僭逼之嫌矣然四以剛居柔則能自謙抑不至於過盛也故云匪其彭無咎彭盛多之貌四能不至過盛則無咎也四之所處所謂挾震主之威者也其能自謙抑才免於咎而巳若矜功挾權以陵轢其上能無凶乎六五厥孚交如威如吉六五大有之主而虛中為孚信之象上以信待下下以信事上上下之間交相孚信此厥孚之交如也然柔弱之過則陵慢或生以六居五外柔內剛亦能用威者也故又言威如則吉也上九自天祐之吉無不利處大有之極而不自有其有故自天祐之而吉無不利謂之自者自然而然也艮下坤上謙亨君子有終謙亨人能謙巽者乃亨之道也書曰滿招損謙受益詩曰彼交匪傲萬福來求人而能謙其益其福有不期而然者矣其亨通為何如哉然此唯成德之君子者能之非常人可及也常人之情有能必矜有功必伐視巳常有餘視人常不足而君子者不見是而無悶不矜不伐而莫爭其功能其何以能若是哉由其安理樂天而物我無間故不自滿足而自然卑巽非矯為之也若內有矜伐之心而外示挹損之意則非安履乎謙者矣其始雖飾其情而終則見於色如是亦安能有終乎故謙而有終者君子之德也初六謙謙君子用涉大川吉夫涉大川者非剛健之才不能也謙之初六以柔居下而以為能涉大川何也蓋以柔居下謙而又謙乃君子之行然所居者陽位則外柔而內剛非徒能謙謙而無其才者也故其外柔則不陷於險內剛則能濟乎險矣以此涉川其有不吉邪謙互體為坎而初六前近之故為涉大川之象六二鳴謙貞吉鳴謙以謙而有聲聞也二柔順中正其謙德之昭著人皆知之矣然以柔居柔疑其不足於剛也故又言得其貞則吉謙而不貞則近於邪佞雖有聲聞何由吉乎九三勞謙君子有終吉卦多隂則陽為主九三以一陽為謙之主是獨能建立其勳勞者也然以陽居四則有逼君之嫌以陽居三則不陵其上而為下所戴是大臣有勳勞而能自謙退上則君不疑下則民所服尤人之所難者也其曰君子有終吉用全卦之彖辭何也於以見君子之謙德必如九三然後為盡善也六四無不利撝謙六四柔而得正上而能下可謂謙矣無不利矣然處近君之地在功臣之上柔中之君能謙以待下勞謙之臣能謙以下人而六四皆受之則猶疑於不謙者故戒以更當發揮其謙也世之人臣固有執柔守正不與物競者矣然或暗於事理辭受失宜無功而受其祿無實而處其名若是者失謙之道矣不可以不戒也六五不富以其鄰利用侵伐無不利六五柔中之君而卦之衆柔以同德順附是不待富厚而能以其鄰也九三在下剛而得正乃立功之臣而坤為衆有用師之象故又利用侵伐而無不利也夫以六五之柔中而執謙以臨下宜無不服矣而猶有不服者則其為冥頑之寇強暴之敵可知也五既得衆心之歸而又以賢臣為之將如是而侵伐乃誅暴去惡之兵也是惟無動動必利矣故曰利用而又曰無不利所以深贊其決也上六鳴謙利用行師征邑國坤為土有邑國之象上六處謙之極聲聞於人而邑國之中猶有不服則其行師固利矣坤下震上豫利建侯行師豫有三義和豫也逸豫也備豫也彖辭言利建侯行師則以和豫言之也卦之德下坤上震為順以動凡事順理而動則人心和豫故利於建侯行師也又震為陽卦一君二民建侯之象也坤為民衆行師之象也屯初九之傳曰以貴下賤大得民也春秋傳曰師克在和不在衆建侯行師苟非人心和順則其位何由而安而功亦何由而成乎初六鳴豫凶九四近君得政而初六與之應是小人阿附權臣而縱志自樂故謂之鳴豫言以逸豫自鳴而無所忌憚也如是者凶之道也六二介于石不終日貞吉六二以中正自守其於九四非相係應者是猶君子之特立守正而不附於權臣也故云介于石不終日貞吉石安靜之物也其為節介如石之堅靜而確也見幾而作不俟終日動而審也動靜隨時而不失其宜所謂君子而時中者也既中而又正其吉宜矣六三盱豫悔遲有悔三近於四而不中正見四之擅權據勢縱志自樂故亦有歆羡之心而盱望焉如是則有悔矣然能速反於正猶可免悔若不勝貪欲之私而有遲回之意則悔而又悔將何及哉九四由豫大有得勿疑朋盍簪自諸爻而觀九四則以四為權臣其豫者逸豫也於本爻而觀之則四為任政之賢臣其豫者和豫也曰由豫者言人心之和豫由四而致也處近君之地以剛而能柔衆隂之所順附此所謂大有得也然人既樂從則當開誠心布公道待以曠大之度不為物我之私然後有以致人心之皆服故曰勿疑朋盍簪簪所以聚髮者言朋類之畢來如髮之聚於簪也此與咸九四憧憧往來朋從爾思正相反勿疑則非憧憧之思也盍簪則非朋從爾思也以貞一無我之心感天下而天下無不應其唯豫之九四乎六五貞疾恆不死五柔暗之君志在逸豫而人心皆歸於九四權勢既去不可復救如人有沉痼之疾而不可療者此所謂貞疾也然以其位在中君臣之分未至泯廢故恆不死也若以陽剛居之則無是疾而可以生彼九四者固為忠良之臣矣上六冥豫成有渝無咎處豫之極而至於昏冥冝若不能反於善矣然其事雖成而能有變志猶可以無咎也而況於過惡之未成者乎聖人所以勉人之遷善其意至矣以往事觀之如楚莊聽伍舉之諫而罷淫樂齊威因淳于髠之諷而行誅賞其皆成有渝之義歟震下兊上隨元亨利貞無咎凡隨從之道可致大亨而必利於正乃能無咎無咎非大亨也然所隨不正咎且不免況欲大亨乎由無咎然後能大亨也卦之德為動為説動固可以大亨而説則或失其正故必以利貞為戒焉若豫之動而順益之動而巽無妄之動以天則其正可知不待於戒矣初九官有渝貞吉出門交有功官之言主也當隨之初剛來下柔為震之主故以官言之凡官其事者不可膠滯當隨時變易乃為不失故曰官有渝也震體為動固能變者也然剛而下柔動而有説則懼失其正故戒以貞則吉也能變以從正則其事正矣然所與共事者非其人亦豈能成其功邪故又當出門以交不私其隨然後能有功也世之趨事赴功者固有得其時而合乎義者矣然或用人之出於私或所因之失其親亦卒以敗事蓋昧於出門交之義也六二係小子失丈夫隨之六爻隂陽各半而三隂爻皆以係言之蓋以柔隨剛則受制於剛其謂之係者言隨之固結也六二與五為正應而逺與初陽非正應而近故不能上隨於五而下隨於初是係小子而失丈夫也其為凶咎不言可知也人之逺君子親小人説與不若已者同處觀於此亦可以自省矣六三係丈夫失小子隨有求得利居貞三不隨初而隨四係丈夫而失小子也四君側之臣而三隨之則有求必得矣然四既不正而三亦不正故戒之以利居貞若其不正而合則詭隨者也雖求而有得奚足貴哉九四隨有獲貞凶有孚在道以明何咎九四近九五與之同德乃大臣之任其事者其有求於五宜無不獲也然大臣之道當正其義不謀其利明其道不計其功乃職分之宜也今有求而必獲雖受所當受為得其正其能免於凶邪然則欲免於凶當何如哉曰積孚誠以釋其疑盡臣道以致其忠明幾微以保其身斯無咎之道也如漢之蕭何韓信皆受君之重任者也韓信恃其功能既求封齊復求王楚髙祖唯所欲則豫之可謂隨有獲者也然髙帝疑信之心固積之久矣此其所以及於禍也夫自人君言之則有功必賞固其正也然於人臣之義則挾功求賞能無凶乎蕭何素知髙帝之心者而又得鮑生召平之徒以此意曉之故得免於禍髙帝在軍中數遣使勞何何聽鮑生之言悉遣其子弟從軍而帝大恱帝擊陳豨遣使拜何相國益封五千戶何又從召平之言而讓其封不受悉以家財佐軍用而帝又大恱何之使帝不疑而勤於其職以保其身其於有孚在道以明亦庶幾乎以是觀之聖人之戒深矣九五孚于嘉吉五陽剛中正為隨之主得衆爻之隨者而五之正應則唯在於二二亦中正乃嘉善之人也故曰孚于嘉吉言能信於中正之應則吉也上六拘係之乃從維之王用亨于西山以柔居上而為恱之極是以柔順之德在人之上而為人心所恱者如文王是也然九五剛強自上六觀之則五為暴君也與暴君同時以文德勝之而出於其上必見忌疾矣故拘係之又從而維之正如紂惡文王之修德而囚之于羑里也然德如文王則誠意之極可通神明故宜祭亨於西山焉西山者岐山也兊為西方而岐山亦在西故於兊言之也巽下艮上蠱元亨利涉大川先甲三日後甲三日天下之理蠱壞之極則必復治故蠱有大亨之道也卦之為蠱以艮剛在上巽柔在下而上下不交不能有為又下巽則卑巽而無矯正上艮則止息而無動作此其所以壞而不治也今治蠱之道則其止也當矯之以奮發其巽也當矯之以剛果故利涉大川巽下為木以舟涉川之象也甲者事之首也先甲三日所以原其始後甲三日所以圖其終人之於事能審愼如是則何弊之不可革而何利之不可興乎艮者物之所以成始而成終也既思其始復思其終其唯艮之篤實輝光者能之乎初六幹父之蠱有子考無咎厲終吉幹木之身也木之蠧而壞者亦蠱也凡蠱壞而復能幹立則如木之朽腐而復有生意也泰之卦變為蠱蠱壞之時亦泰之變也陽往居上隂來居初如父退處而無為子在下而任事乃子而幹父之蠱也子而如是則可謂有子而考得無咎矣若子之不任父事則雖有子亦如無也然子任父事凡所當改者不改則弊深改之則非孝其處之亦難矣苟非起敬起孝而心懷惕厲其能終吉乎九二幹母之蠱不可貞六五以隂而居尊母之象也如晉六五之為王母小過六五之為妣皆隂之尊者也蠱由乾坤之變而成則蠱壞其事者非獨由父亦母實為之也九二以剛中居下而與五應乃賢子而幹母之蠱者也子幹母之蠱尤易流於專斷而有失於順承故戒之以不可貞言當巽以行之不可專尚堅確也九三幹父之蠱小有悔無大咎以九居三剛之至也幹父之蠱而大剛則或以果而怫意或以直而賊恩故未免於小悔然以其所行者正也故終無大咎是道也以施之於君臣斯可也而行之父子之間其可乎雖無大咎非子道之盡善者也六四裕父之蠱往見吝幹與裕正相反幹者強而有立之謂也裕者寬而無制之意也六四承父之蠱壞而以柔居柔是懦而無立以寬裕治蠱者也如是而往能無吝乎或曰四之吝與三之悔皆失矣然孰為優歟曰三之太剛失之過者也四之寬裕失之不及者也必不得巳而行之寧為悔毋為吝六五幹父之蠱用譽五與二應二多譽故云用譽欲幹父之蠱而巳之才弱不足以濟矣然能任在下之有譽者則在下之力猶巳之力也又何凶咎悔吝之有哉上九不事王侯髙尚其事治蠱者子任父之事臣任君之責也上九當蠱壞之極而不受任於人是賢人君子當天下之壞亂而獨善其身者故曰不事王侯髙尚其事也上既在事外而不事王侯則髙尚其事而巳其事者何事也曰聖賢之道也吾身之德義也苟不任王侯之事又不事吾身之事而徒嘐嘐然曰吾不事焉髙尚焉則乃無君之罪人也若人者又曷足稱乎兊下坤上臨元亨利貞至于八月有凶臨之道大亨而利於貞也然二陽浸長以臨於隂乃其方盛之時而言八月有凶者於方盛之時而先慮其衰此易所以為君子謀也一陽始於復二陽長於臨至於六陽而為乾則陽極矣於是一隂生於下而為姤二隂長而為遁自臨至遁凡經八爻自丑至申凡歷八月八月之後則為否矣此所謂凶也聖人於臨豫為之戒其意深矣初九咸臨貞吉咸臨者以陽感動於隂而臨之也初與四應初陽而得正四隂而得正陽感動於隂而能以正其吉宜矣九二咸臨吉無不利二感動於五而臨之曰吉又曰無不利者以二剛中而五柔中其感應之道又大於初九也六三甘臨無攸利既憂之無咎六三居二陽之上而不中正懼二陽之相逼乃以甘言臨之而取説故謂之甘臨以佞恱臨人無所利矣然能憂之而變其所為則亦無咎也兊之象為口其德為説故為甘言之義六四至臨無咎謂之至臨矣而止於無咎何也曰至臨者非臨之至善也以其與初為應相臨之情最為切至耳隂柔無臨人之德而唯以私情相臨得免咎可矣而豈能大有為乎六五知臨大君之宜吉外柔內剛而得中道則其居位而臨人也不偏於剛柔而能處其中乃以智而臨人大君之所宜也吉之道也宜者義也能隨時處中則其智之明而義之合亦可見矣上六敦臨吉無咎坤以厚德載物者上六處坤之終則其德之至厚可知也以厚德臨人人無不懷服固為吉矣又何咎哉六五處得其中則謂之知臨上之以敦厚臨人者又豈非敦仁之君子歟坤下巽上觀盥而不薦有孚顒若卦之九五以巽順中正之德為觀於下而在下之四隂莫不觀仰之此聖人在上而天下自化之象也盥而不薦精潔誠敬之至也夫祭祀之禮將奉酒食以薦之必先盥手以致其潔敬則其盥者為將薦而盥未有既盥而不薦者也今其曰盥而不薦亦設辭以見其潔清之至而不輕自用耳猶中庸曰不動而敬不言而信聖人未嘗不言不動也而其敬其信則尤在於未言動之時焉故聖人之御天下也其政教之施民固無不化矣而其政教未施之時所以化民者尤有不言之妙焉蓋其篤恭之極如臨大祭而孚誠之念存於中顒然之容見於外故下民之望之也其信從化服自有不知其然矣若以有孚為下民之孚以顒若為下民之仰則亦其盥而不薦之誠有以感之也中庸曰唯天下至誠為能化吾於觀之九五而見之初六童觀小人無咎君子吝九五在尊位為在下四隂所觀仰而四隂之觀於五者以相去之逺近為所見之明暗初六柔而在下去五最逺是如童稚之觀不能明見者故在小人則無咎在君子則可羞也六二窺觀利女貞坤為闔戶而六二為柔之在中者乃女子窺觀之義也聖人在上萬物咸覩而六二不能出於戶但為窺觀非丈夫之事乃婦人之道故云利女貞也六三觀我生進退三之觀五非逺非近故在進退之間也初二去五逺而才又柔下非用於世者故不能進而可羞吝四去五最近而以柔居剛其才可用矣故利於進而不宜退若三者居下之上亦可以進然不得中正則疑於非賢也故必先自審以為進退焉其曰生者吾身之動作施為也觀我之所生如其行之善而時之通也雖進可也行之未善而時之塞也雖退可也用舍在於時而進退決於已是雖不曰君子也而非君子能之乎六四觀國之光利用賔于王九五陽德也故其光華被於國六四既近五而觀國之光華如是則可以進矣故利用賔于王也賔如賔興之賔言為王者之所賔禮也九五觀我生君子無咎觀之為卦四隂長盛而二陽消落聖人之作易常扶陽而抑隂也故於卦取大觀之義而於四隂爻則不言隂之害陽而但言隂之仰於陽然自五言之則隂之盛長陽不可以不愼也故九五之爻辭曰觀我生君子無咎言觀我之所行必君子之道然後無咎若自失其道則在下之隂皆吾之害也能無咎乎然爻辭如此所以戒於凡為人君為君子者非言聖人之事也若以聖人居九五者言之則當如彖辭所言下觀而化其德猶天也而豈止為君子乎豈但無咎而巳乎上九觀其生君子無咎上九雖非君位然在人之上亦為下所觀者故亦當自觀其所行如所行皆君子則無咎也震下離上噬嗑亨利用獄卦之名噬嗑取口囓物之象而凡折獄用刑者其才有剛柔之殊而所治亦有強弱之異政如人之囓物其齒有利鈍之殊而為物亦有堅脆之異故噬嗑一卦專言刑獄之事也噬嗑言亨者噬之而嗑則亨也言利用獄者聖人之意固期於無訟無獄也然有強梗者以害吾治則其罪亦不可以不懲而噬嗑之所以利用獄者以其有威震而又明照乃用刑之象也初九屨校滅趾無咎震為足初居震下趾之象也在下而罪薄過小故但以校而滅其趾以輕刑治小罪可無咎也六二噬膚滅鼻無咎二以中正而用刑者故其所治如噬膚之易膚者肉之脆而易入者也然以柔乘剛則其所治亦強梗故至於滅鼻言必深入之如噬膚而沒其鼻於器中也二之治獄如此豈非中順有餘而剛嚴不足者歟然能深入之則雖小傷於巳而無虧於法矣又何咎哉六三噬臘肉遇毒小吝無咎三以柔居剛亦能用刑者然於巳不中正而所治者強梗故我方治於彼彼亦傷於我是猶噬臘肉而遇毒也周禮小物全乾曰臘蓋有骨而難噬能傷人者也其身不正而無以正人固可羞矣然彼受刑者既有其罪終必伏法故亦可無咎也九四噬乾胏得金矢利艱貞吉自全卦言之則九四一爻不中不正而處於隂柔之間猶強梗之人為善人之害者也然自九四言之則又為噬之主而輔六五以用刑者是以剛強而治剛強者也故為噬乾胏之象胏肉之帶骨者亦堅而難噬也得金矢即周禮獄訟入鈞金束矢而後聽者也訟訴之人必令其納是物者金取其堅也矢取其直也其果堅而直則必納是物然後聽其獄如其非堅且直則自當止矣今四聽訟而得金矢則彼之強梗者果為民害不可不治也然其強梗如此苟治之者一有不正則彼反得以中傷故又利於艱難正固乃吉也六五噬乾肉得黃金貞厲無咎六五君位而以柔居剛文明得中則其用刑賢於六二矣故為噬乾肉得黃金而不至於滅鼻然亦必貞固而危厲然後無咎也上九何校滅耳凶初卑而無位上髙而無位故皆為受刑者過極之陽不能卑伏此惡極罪大怙終不悛之人也其何校而滅耳凶孰甚焉離下艮上賁亨小利有攸往賁者文飾之道也有質而加之文斯可以亨矣朝廷文之以儀制而亨焉賔主文之以禮貌而亨焉家人文之以倫序而亨焉官府文之以教令而亨焉推之事物凡有質者無不待於文也文則無不亨也然既亨矣而曰小利有攸往何也文飾之道但加之文采耳非能變其質也故文之過盛非所利也恃此以進為非所利也但小利于有攸往而已矣世之不知本者或忘其當務之急而屑屑焉於文飾雖欲其亨亦安得而亨乎初九賁其趾舍車而徒初以陽在下而與四為應四近君之大臣而柔弱之甚又有間隔不能引而進之如初者將何為哉亦自賁飾其所行而無藉於駟馬之貴斯可也賁其趾自飾其行也舍車而徒以賤為貴也人所為貴於軒冕者尚賁飾而巳然有命焉而不可致則有吾身之富貴者在焉而何羡於其外也古之恬退者自謂安步以當車晚食以當肉無罪以當貴豈非賁趾舍車之義歟六二賁其須隂麗於陽而成章者也六二自坤之上六來居離之中固為文明之主者然其賁飾也必附三而動故曰賁其須須附頤而生者也賁上四爻外實中虛有頤之象故二取象於須也或曰須需也六二文明中正之賢能賁飾其行以需六五束帛之聘也九三賁如濡如永貞吉九三處文明之極而上下之隂皆附麗焉故曰賁如言賁之盛也三在二隂之中有坎之象故曰濡如言賁之盛而潤澤也如三之所處固正矣然陽在隂中則易於溺溺則失其正矣故又戒以長永其貞則吉也六四賁如皤如白馬翰如匪寇婚媾六四在離明之外為艮止之始乃賁之盛極而當反質素之時也故云賁如皤如夫初之舍車為在下而無所乘故也四在九三之上則有所乘矣故云白馬翰如人既質素則馬亦白也然四本與初為應而三乃逼近故疑其為寇而三實非寇也乃求與已為婚媾耳四之與三雖非正應然三得正而四亦得正以正而合又何尤乎六五賁于丘園束帛戔戔吝終吉六五當賁飾之時居至尊之位宜徵集邱園之賢以共成文明之治者也然隂性吝嗇其賁飾於邱園之賢者止於束帛之戔戔而巳束帛薄物也戔戔淺小之意也將招致賢才而物薄如是可羞吝矣然賢人者不以幣帛為恱而以恭敬為悅也如六五之虛中待賢則幣帛雖微而賢者亦進矣此其所以終吉歟上九白賁無咎以陽剛而在艮上剛而不屈止而不動是賢人之髙尚而不屑於世用者也故云白賁無咎六五之君方以束帛徵賢者而上九無歆羡之心甘淡泊之守所謂白賁也居於治世而不能有為雖若可恥然量能揣分不墮其節亦善矣其何咎之有坤下艮上剝不利有攸往剝之為卦隂盛長於下而陽剝落於上也以卦象言之則山之頽剝於上以附乎地如陽之消剝於上以為隂故卦之名曰剝以卦德言之則內順外止有順時而止之意故其占辭為不利有攸往君子當斯時也其可不與時消息以避小人之禍乎初六剝牀以足蔑貞凶卦上實下虛而牀亦上實下虛者故取以為象君子在小人之上猶人之卧於牀也小人自下而害君子猶自下解剝其牀而身不安也隂滅陽之正道則陽固凶矣而隂亦豈能吉邪六二剝牀以辨蔑貞凶辨者牀之幹乃辨别上下之處故謂之辨也六三剝之無咎衆隂方剝陽而三獨與上為應是小人中之君子也如三者雖得罪於私黨而見取於公論其義無咎矣而利害之私者奚較哉六四剝牀以膚凶六四為剝之上體而艮有人身之象乃剝至牀之上而及於人之身也其害愈切而凶愈甚矣六五貫魚以宫人寵無不利爻言隂剝陽之凶至四而極矣至五則為君位不忍復言矣故變義而言隂之順陽者以隂而居尊位后妃之象也后妃之道在於不妬忌而帥嬪御以奉於君故取貫魚之象魚隂物而一陽連五隂其狀如貫魚然宫人者亦衆隂也五以宫人受寵於君如貫魚之有次序則內職修矣何不利之有上九碩果不食君子得輿小人剝廬一陽獨存於上如碩大之果而不食之則必以之復種而復生矣陽之不可盡其象蓋如此是爻也君子得之則道將復長而為衆所載小人得之則自剝其廬而無所庇其身其吉凶判矣然則為小人者當何如哉其惡之極則必見誅於君子不可容也如惡之未甚則載君子而為之輿庶乎其免矣震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往復亨者陽復生於下有亨道矣然尚微弱未能遽勝隂也故不言元亨而止言亨既生則漸長長則可以大亨矣出入無疾何也一陽出於剝之上而入於復之下也陽雖僅存而不能使之絶隂雖極盛而不能盡絶陽是陽之出而無疾也由剝而坤由坤而復則微陽之積巳成一爻靜而動矣暗而明矣閉而通矣是陽之入而無疾也朋來無咎何也謂一陽既復則諸陽漸進也以人事言之一賢人在位而受小人之害則其同列者皆當見幾而避害一賢人方進而其志之得行則其在下者皆可彚進而獲吉陽既生矣則朋類之來夫何咎哉反復其道七日來復何也隂陽兩端循環不窮者也故往則復來來則復往反者往也復者來也反復其道未嘗有間故陽雖消剝而七日則來復矣七日者七月也月而言日猶豳風言一之日二之日也自五月之姤一隂生而陽始消至十一月之復一陽生而隂始消於卦歷七爻於時經七月也利有攸往何也陽既亨而朋來矣此君子道長之初也以此之時勢得此之朋助固當有為也將何往而不利乎陽之方生勢可以進而即勉之以有為蓋難得而易失者時也進而為臨為泰以至於純乾皆由是也復也者其變通之大機歟其世道之一初歟初九不逺復無祗悔元吉以卦爻言之陽才消於剝而即生於坤至復而一爻巳成矣是陽之失不逺而即復也以人言之則陽為君子君子不能無過也而才有過則便能知之才知之則更不萌作即所謂不逺復也不逺而復則不至於悔而大吉矣是爻也惟顔子之不二過者以之六二休復吉一陽在下為卦之主猶仁人君子為衆人之所視效也故卦之衆隂以與初逺近嚮背為得失焉二柔順中正去初最近而能順從之乃復之休美者故吉也休之言美也而亦有好善之意焉秦誓言其心休休焉乃好善之人也六三頻復厲無咎三與初非比非應而不中不正又處動之極則多動而數失大傳曰吉凶悔吝生乎動文中子曰不動故無悔夫動而時中斯為善矣多動而過中得為善乎此六三之頻復所以危也然非頻復之危也乃頻過之危也其過雖危而復則無咎矣曰厲曰無咎所以戒其過而勉其復也六四中行獨復復之六四乃剝六三之反對也剝六三違衆隂而應上九則為無咎復六四違衆隂而應初九則為獨復皆小人而變為君子者也然剝六三則無咎而復六四不言吉與無咎者何也曰剝之上九雖陽之僅存然在上之陽也復之初九雖陽之方生乃在下之陽也在上之陽大勢雖去而天命未改也故猶得以制羣隂而六三可無咎在下之陽雖漸以長而其勢尚微如六四者其能免於羣隂之害乎然義所當然吉凶有不計也聖人於此爻不言凶咎其亦扶陽之意歟六五敦復無悔六五雖逺於初陽然其位則尊位也其體則坤厚也其德則中順也人而如是則敦篤於復宜無悔矣不親近於仁賢而能復非天資之美能如是哉然質美而未學亦止於無悔而巳若欲亨而元吉則必親在下之陽德然後可上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征上柔暗之甚居復之終逺於陽德終迷不復凶之道也如是則上有天災而下有人眚矣坤兵衆也故又不度德而好兵如是而行師則師敗績而禍及君雖十年之久人亦不服是終於凶者也小人之在上而恃威者觀此可戒矣震下乾上無妄元亨利貞其匪正有眚不利有攸往卦之名無妄言實理自然而無邪妄也史記所謂無望者言無所期望而有得焉者也此二義者固異矣然無邪妄之心者唯盡其在我而於吉凶禍福皆委之自然亦未嘗有所期望也人而有所期望者即邪妄之心也故爻辭言無妄之禍福而夫子之彖傳與大象皆以無邪妄者言之蓋欲明義理以教人也人能無邪妄者誠也卦震下乾上為動以天動皆天理則無妄矣無妄則誠矣誠者天之道而天祐之矣故人既無妄則可以大亨然其於事又必利於守正然後可亨也若其非正則為有過眚而不利於有攸往矣不利有攸往者以其匪正也匪正即妄也若無妄而正又何不利之有乎初九無妄往吉初九無妄之始而能守正斯無妄矣如是而往則凡有所為皆無期望之私也其吉宜哉六二不耕穫不災畬則利有攸往人之於事也當絶其覬覦之私如不耕穫不災畬而自然有得然後利有所往也夫農夫之於農事災則必畬畬則必耕耕則必穫未有不耕穫災畬而有得者其取象如是亦設言以見無營度之心耳以義推之如聖人之無為而治君子之不要人爵而人爵從之皆是也六二柔順中正而無邪妄者是以能若是而其自然有得也豈非所謂無妄之福哉六三無妄之災或繫之牛行人之得邑人之災凡人之災患無故而至者雖君子有所不免也然為善而得禍者常少為不善而得禍者常多如六三之不中正則災之至也雖云無故然亦由其素行之不謹而有以致之也夫無妄之災者如行人牽牛以去而居人反罹其禍與亡猿而禍林木失火而殃池魚者政相類也然人之誠信之極豚魚猶可感也而況於人乎三之受無妄之災亦盍自反而已矣九四可貞無咎四陽剛乾體下無應與此無妄者也然以陽居隂懼其不能固守而或失正故戒以可貞則無咎也九五無妄之疾勿藥有喜五乾剛中正而所應亦中正所謂純粹精者也無妄之至也如是而或猶有疾焉是乃無妄之疾也不當得而得者也天下之理邪不勝正妖不勝德故雖有是疾亦勿藥而自愈矣是又無妄之福也然則在我者唯純乎一天而其疾其喜亦順其自然而巳矣上九無妄行有眚無攸利上九剛健之至無妄之終本非有妄者也而其無妄之災乃至於行有眚而無攸利何也蓋以其處窮極之地而進無所之也如吾聖人之伐木於宋畏於匡厄於陳蔡豈非聖人之無妄邪亦無其時位而所遭者然爾此曰有眚曰不利與彖辭所言者自不同也彖之所言者由其匪正而然也乾下艮上大畜利貞不家食吉利涉大川畜者止也又聚也能止然後能聚也卦之為大畜以上卦之艮而畜止下卦之乾也乾健上進而艮能畜止之其力之大可知矣又乾之三陽至大也而艮能畜之則其所畜聚者至大亦大畜之義也小畜之為小者以巽畜乾也巽隂卦故其力小而畜之不固也大畜之道利於得正陽君子也苟畜之不正是以小人而止君子也其可乎如畜之以正則陽之上進乃剛惡之小人矣以畜聚言之則六五之君畜聚天下之人才陽剛之君子藴畜其德義皆利於正也所畜聚之不正則上之畜才也為小人之淵藪下之畜學也為曲學之小道聖人何取焉不家食吉言君子之進用也君子之藴畜其道德固將以濟斯世而安斯民也若食於家而不食於朝則吾之所畜者無以設施矣故不家食則君子之吉而亦人君之吉也利涉大川君臣皆利於有為也六五之君下應於乾剛而得其用固利於有為矣而乾剛之君子亦何事之不可為乎以畜德之賢遇畜才之主上求於下而下從其上則大畜之功業可知矣初九有厲利已大畜初二二爻取其能自畜而不進則其上之畜之者乃小人之畜止君子也四五二爻取其能畜彼而不使進則其所以畜下者乃君子之畜止小人也初居最下然與六四為應則為四所止矣故往則有危厲而利於自止也九二輿説輹九二與五應亦為五所止而其處得中道故能自止而不進也車之為器健行而中有容者二剛而中實輿之象也人之有行必賴於輿輿而説輹則不行矣以義言之如剛中之君子遇非道之君而不食其祿以免於禍時行則行時止則止善可知矣大傳曰乾天下之至健也德行恆易以知險非大畜之九二惡能如是哉九三良馬逐利艱貞曰間輿衛利有攸往初與二皆與隂相應而以隂畜陽為不正故初與二者利於自止而不進九三與上九皆陽則不相畜而俱進是君子畜極而通之時也以同類相求利於進矣而乾之象為馬乾健之極為馬之最良者以良馬而馳逐同類之人以行於天衢之上其進孰量哉然三過剛而鋭進亦不可以不戒也故又必利於艱難貞固而日間習其輿衛然後利有攸往也六四童牛之牿元吉四大臣之位而以柔居柔為得其正故其止剛惡之人有其道而可以大吉焉童牛者角繭栗之犢也牿者楅衡也加橫木於角以止其觸也夫制惡人者禁之於其初則如童牛而加牿其為力易矣六四艮體故得止之道者如此六五豶豕之牙吉六五止九二亦制其惡者也牡豕曰豭攻其特而去之曰豶所以去其勢也豕之剛猛為害者在於牙然去其勢則絶其剛躁之性牙雖存不害矣六五以艮體居尊位得止惡之道故九二之剛如豶豕之牙不能為害而可以吉也柔能勝剛弱能勝強於大畜四五見之上九何天之衢亨上九與九三合志以進者也他卦之上為窮極而大畜之上則為亨通以其畜極而通故上進而豁達無礙如登天衢然艮為路艮在上而又居其上猶天之路也三之良馬為上之所乘上之天衢為三之所行其相得如是宜其亨也何天之衢言何其得路之如是哉自在下而望之者言之也震下艮上頤貞吉觀頤自求口實卦為頤頷之象者其上陽為輔下陽為車中四隂為齒外實而中虛上止而下動皆其象也頤之為義則養也人之養其形體者飲食而已推而言之則養德養民養賢才皆養之義也養之之道以正則吉不得其正則養形者或失其正味而致疾養德者或失其正理而誤身不可不慎也觀頤觀其養德之正不正也自求口實觀其養身之正不正也口中虛而資食以實之故飲食謂之口實然口實而謂之自求豈貪欲者哉亦曰當自審擇而不可失其正焉爾初九舍爾靈龜觀我朵頤凶陽實隂虛實者能養人而虛者養於人卦上下二陽皆養人者也然以陽居上則養人之道行居下則其道未行當自養可也初以陽伏於下如靈龜能咽息不食而以氣自養者然為動之主而與四為應是不能自養而動於欲也故設為六四語之之辭曰舍爾之靈龜而乃觀我之朵頤乎朵頤者動其頤而食之也不能守其正而羡人之食則飲食之人人皆賤之矣烏得而不凶乎六二顚頤拂經于丘頤征凶養之為義有止有動止而待養於人正也動而求養於人非正也六二居動體不能無求於人矣然求養於初則顛倒而拂常求養於上則髙逺而征凶如二者於初與上皆非正應不能待其養而輕動以求之安往而不凶乎然則欲免於凶將何如曰唯守其中正而不妄動斯可也六三拂頤貞凶十年勿用無攸利三與上為應賴上之養者而三處動極又不中正動以求養而不由其道拂於養之正矣若不知變而貞固守此凶之道也十年勿用無攸利深戒之之辭也六四顚頤吉虎視耽耽其欲逐逐無咎四處大臣之位不能養人而賴初以養人雖為顚倒其常理然求之於正應而以之養人亦可吉也世之人臣固有在髙位而才德不稱者然能咨諏善道擢引賢良使上賴其益而下蒙其澤亦可謂賢矣虎視耽耽視下而專也其欲逐逐求之相繼也下賴上之養則不可以求上賴下之養則不可以不求四居艮之體懼其上而不求也故戒以如是則無咎若止而不求為有咎矣六五拂經居貞吉不可涉大川頤五不言頤者五居尊位而隂虛不能養人反資上九之實以為養故五不養頤而上九曰由頤以頤養之權由於上也權由於人而不由於已拂其常理矣故居貞則吉涉大川則不可言宜靜而不宜動也洪範言用靜吉用作凶亦此意也上九由頤厲吉利涉大川上九以陽實在上為頤之主下之衆隂皆由之以養也養天下者人君之事也六五之君不能養天下而權由於上九若養之以正則伊尹周公也養之不正則徐偃田常也其可不愼乎曰厲吉者戒之以惕厲則吉也聖賢出而任天下之責德澤出於已而上下不疑焉亦處之以惕厲而已矣又曰利涉大川者利於有為也夫以上九之才之地何事之不濟然九居頤之終艮之極恐其安於養而止則不復進為也故其勉之者又如此云巽下兊上大過棟橈利有攸往亨大過者陽盛而過隂也卦取象於居室四陽居中為棟之象二隂兩旁為宇之象四陽過盛而二隂不能勝為棟橈之象棟既橈則厦將傾矣以國家言之此過盛而崩壞之時也然聖人不委之時命必有扶顚持危之道焉觀之於卦四陽雖過而二五得中猶足以有為又以內巽外説有可行之道處大過之時而以大過之才為大過之事則棟雖橈壞猶可支也此其所以利於有往而亨歟初六藉用白茅無咎茅柔物也巽為白故謂之白茅夫藉剛以柔則其剛雖過而不能為之害如人以強暴見加而承之以柔順自無咎也然是道也豈人不知乎不為耳如大過之初能過於畏愼以免咎亦難能者也九二枯楊生稊老夫得其女妻無不利楊近水之木感隂氣之多而易生者也九二雖老夫然得女妻則猶能生育而無不利亦猶枯楊近水而復生根稊也巽下長女也而乃以初為女妻兊上少女也而乃以上為老婦此何也蓋九二在初六之上老於初六故二為老夫而初為女妻九五在上六之下少於上六故上為老婦而五為士夫此但以爻之上下為老少非取於兊巽之象也斯得之藍田吕氏云九三棟橈凶凡物從上而崩墜必自重者始九三以剛居剛不勝其重是如棟之至重而先橈也故棟橈之辭獨於三言之太剛則折其凶宜矣九四棟隆吉有他吝四以剛居柔非過於重者而其下乘之以二陽故如棟之隆起而吉也然四居大臣之位所以支大厦之顚者非四其誰哉苟其執德不固而又下同初六之柔則以柔濟柔亦不能以堪事矣故戒以有他則吝也夫大臣之當重任者當引用剛強之才與之協濟斯可也若但私其所與而恱其柔善則棟橈屋壞將誰咎歟有他吝之戒其意深矣九五枯楊生華老婦得其士夫無咎無譽木之有華乃柔而在上者九五過極之陽而一隂在其上枯楊生華之象也五居尊位當大過之時過極而衰不能無事之時也而五乃自任其剛下無應與但比於隂以樂其目前則如枯楊之華雖榮於暫其如不永何老婦得其士夫不言夫得而言婦得以見婦之得志非夫之美也無咎無譽言雖無殃咎亦不足稱也上六過涉滅頂凶無咎兊為澤上為頂涉於澤而水滅沒其頂此不量淺深以冒於大難者故凶也然其身雖凶而其義則無咎朱子以為東漢黨錮之諸賢是也坎下坎上習坎有孚維心亨行有尚上下皆坎習坎也二體皆中實有孚也心亨中有其德也二五皆以陽居中猶人在險難之時其身雖陷而其心自亨也聖人君子所以遁世而無悶樂天知命而不憂亦心亨而已既有孚矣心亨矣則雖在於險行必可嘉又豈終陷於險乎初六習坎入于坎窞凶坎中之小穴謂之窞乃險而又險者也六以隂柔居重坎之下故為入於坎窞之象其凶孰甚焉九二坎有險求小得二剛中之才也而陷於重險之中五亦在於險中不能為之應是未能出乎險者也然其以心亨而中德不失故坎雖有險而尚可以求小得但不能大有為耳如二者非才德之不足乃時命之使然可為之愍而不足為其病也六三來之坎坎險且枕入于坎窞勿用三處二坎之間故云來之坎坎猶乾九三曰乾乾也來之二字其來於下則坎也其之於上亦坎也以下險而枕上險是之謂險且枕也六四為坎下之小穴而三將入其中是之謂入于坎窞也既進退皆險而又不中正則無可為者矣戒之以勿用得無愼哉六四樽酒簋二用缶納約自牖終無咎九五居險中而六四之位近焉是大臣遇人君之在難而義當匡救者也四之於五雖隂陽相得而相比然濟天下之險非剛健之才不能也如四者才既不逮而在於其位義不容已唯當積其誠實之意以感之因其本心之明以導之使之親賢臣逺小人以自出於險爾一樽之酒二簋之食薄物也其樽用瓦缶質素之器也所以獻於君者以薄物而用質器是尚於誠實而不尚浮侈也損之彖辭言二簋可用亨者亦如此歟室雖暗而有明者焉窗牖是也君心雖暗而有明者焉其性之偏長者是也人臣之進善於君者將順其所長而委曲以導之則吾之言易入是進其要約之言者如自牖之明而入之也睽六二之遇主於巷者亦如此歟臣之事君能質實以取信委曲以納忠以義言之終無咎矣然其濟與否則君之賢愚也時之否泰也吾唯能盡吾之誠心而已矣九五坎不盈秪既平無咎九五陽剛中正以居尊位而九二在下與之同德近則六四能至誠以輔導之是雖處乎險而終能出險者也彖所謂有孚維心亨行有尚九五當之矣然時方艱險難於遽濟如坎水之未盈而未至於平也若既盈則至於平平則無咎矣不言吉亨者當險之時言險之義則無咎可矣至於吉亨者又存乎其人也上六係用徽纆置于叢棘三嵗不得凶坎六爻唯初上二爻並言凶蓋陷陽者隂也而隂出陽之外者其惡尤甚焉然邪之陷正正固凶矣而邪亦豈能免乎故初則深入于坎窞而自以陷其身上則係之以徽纆囚之於囹圄而終無以逃其罪為邪惡者亦盍知懼哉離下離上離利貞亨畜牝牛吉離有二義以隂附陽則麗也取其中虛則明也彖辭所言以附麗言之也夫隂之為物不能獨立必附麗於陽也然麗得其正則可亨通不正則不能亨矣牝牛柔順之物也一隂居中而二陽在外為之防間焉其畜牝牛之象歟隂附於陽能柔順而不過越焉是則麗之得正也其亨而吉也宜矣初九履錯然敬之無咎廬陵楊氏曰九以陽剛居離明之初如火之始然日之始旦雖在下無位而未進其踐履之實錯然璀璨於天下已不可掩矣非晦其明則衆之所忌咎之所集敬者謹畏以晦其明也故無咎非無咎也敬畏以避之也六二黃離元吉離之六爻唯二最吉以其柔順中正而文明有以盡離之道也人臣以文明之德麗於文明之君必可以成文明之化矣是以謂之元吉也九三日昃之離不鼓缶而歌則大耋之嗟凶三居下離之終乃日昃之時也夫持滿定傾非中正之君子不能也三處日之夕而過剛不中則時已去矣其志荒矣故不鼓缶而歌則大耋之嗟其歌也樂之失常也其嗟也哀之失常也哀樂失常能無凶乎君子值此之時則思患之心與樂天之誠並行而不悖是固不暇於歌矣而亦何至於嗟乎九四突如其來如焚如死如棄如前眀已盡後明將繼此世道昏而復明衰而可盛之時也然聖人之道其防亂者貴於豫而圖治者戒於躁九四當大臣之任輔柔弱之君處多懼之地而乃迫之以剛而不正能免於凶乎其突如而來也則其焚其死其棄非無故之禍也其自取焉爾六五出涕沱若戚嗟若吉五重離之主文明之極而迫於上下之陽明之極則慮其衰迫於陽則懼其患故其憂之之深而至於出涕以戚嗟焉然時當明盛下有中順之臣而又能處之以畏愼則彼雖強暴亦自取死亡而已此其所以吉也五本以不正而致患以能憂懼故僅獲吉爾其不言元吉者以其不如二之中而又正也上九王用出征有嘉折首獲匪其醜無咎離為甲胄為戈兵而上九陽剛之爻也故於此言征伐之事以正言之則剛處明極明足以照而剛足以斷此智勇之將而王用出征以有嘉美者也以不正言之則剛處窮極之地而不得其正乃姦凶之人勢凌於君以極其惡又宜折其首而擒獲其非類也如是而行師可無咎矣周易參義卷一
