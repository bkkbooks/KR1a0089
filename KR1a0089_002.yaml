body:
  text: 周易參義卷二元梁寅撰下經艮下兊上咸亨利貞取女吉咸者交感之義交感而後可以亨也艮兊二體合而成咸而艮兊又由乾坤而成者坤求於乾得乾之九三而成艮乾求於坤得坤之六三而成兊此柔上剛下二氣感應以相與故卦之名曰咸也二氣既交感則化生萬物萬物生生而變化無窮焉故咸有亨之道也然所感必利於正然後能亨艮止兊説能止而説此交感之正也止者止於其所而感之專説者其情相通而應之至分而言之陽止而隂説合而言之隂陽皆止而説也止而説者正道也論夫婦之常則婦從於夫論婚姻之始則男求於女此卦艮下而兊上是男下於女得相求之正故取女而得是占則吉也夫婦人倫之本故以咸恆為下經之首而利貞之辭二卦皆言之尤以見聖人設戒之意也初六咸其拇初與四為應四之感以私而不免動其心初之應以私而亦已動其拇然處於至下故其拇雖動而未能遽進也不言吉凶者能止則吉不能止則凶是吉凶存乎其人而未定也六二咸其腓凶居吉二與五本隂陽之交感者然五言咸其胟則不能感物矣五不能感則二不可以妄動故言咸其腓則凶而居則吉也九三咸其股執其隨往吝三與上亦交相感者然上六感人以言而無其實三亦不可以往也初為拇指二為足肚三為股股動則欲行愈甚矣蓋隂説於陽陽固易動而説人以言則其動尤易故戒三以固執其所隨則可若不能固執而輕往以隨之則吝矣九四貞吉悔亡憧憧往來朋從爾思咸以人身取象下三爻為拇為腓為股皆應乎上者也上三爻為心為脢為口皆感乎下者也上感人以言者五不能感人者四則感人以心者是六爻之中唯四為感之主也然感人以心而不曰咸其心者以有心之感不如無心之感也貞正而固也感人之道必正而固正則不以私固則有其常若感人以私而不常則豈能無感不通乎以九居四失正而不固非所謂貞也不貞則有悔矣故戒以貞則吉吉則悔亡也人之私感應者固不正矣如憧憧往來朋從爾思者雖非不正然既憧憧以思而不出於自然是亦私也既私則是亦不正也人之心不能無思思則不能無往來然聖人之感人如日月寒暑其往其來皆出自然故所感無不通無不應若憧憧往來則以忙迫之意而有計獲之私其往來者非自然之往來矣故是其朋則從其思非其朋則不從其思也感人如是雖所思之正亦私也聖人之感人廓然而大公物來而順應如九四者其猶未之及乎九五咸其脢無悔五不當心之位而當背肉之處則相背而不能感人矣如是則雖可無悔然居君位而失其道奚足貴哉上六咸其輔頰舌兊為口舌而口舌在身之上故於上六言之也人之言語則輔頰舌皆動故又以三者並言也不言吉凶者言之以正則雖不能感人猶無凶咎唯言之不正然後為有咎也巽下震上恆亨無咎利貞利有攸往恆為常久之道能常久則亨而無咎矣利貞者常必以正也利有攸往者常必有變也正者不易之恆也變者不已之恆也蓋能常而後能變而其變也亦所以為常常而非貞則或安於流俗或習於邪惡非常也常而不變則其守之也固其行之也窮亦非常也故既得其不易之理又必有不已之道其曰利有攸往者隨時變易也窮則變變則通也苟不如是雖謂之常也亦烏得謂之常哉初六浚恆貞凶無攸利恆之為道能常能變之謂也彖傳言天地之道聖人之化皆是也而六爻者或知常而不知變或知變而不知常於彖傳所云者皆不足以當之矣初六與四為應此常理也然四為田無禽則不能應初之求而初乃深入以求之是知常而不知變者也故雖正亦凶而無攸利也九二悔亡二以陽居隂處非其位有悔矣然以其久於中也故能亡其悔六爻之中唯二為彼善於此者九三不恆其德或承之羞貞吝三陽爻陽位乃其常處不當有動者也而過剛不中與上六為應故不能恆其德而或承之羞雖得其正亦可吝矣此知變而不知常者也九四田無禽四以陽居隂處非其位雖至於久而竟無成功如田狩而無禽復何益哉以人臣言之既無其功而又不能去乃持祿固位之人也知常而不知變者也六五恆其德貞婦人吉夫子凶五處得其中是能常其德而貞固者也然隂柔不能有為則亦知常而不知變者故占者為婦人則吉為丈夫則凶也上六振恆凶上六處恆之極不能安常居動之極不能無動故以振動為恆而其占凶此又知變而不知常者也艮下乾上遁亨小利貞卦之為遁以隂方盛長而陽退以避之也以人事言之則小人道長君子亦當退避也退則其身雖窮其道自亨不然則道不能行身雖亨而道塞矣况身亦不能以亨乎然人臣之義有當遁者焉有不當遁者焉遁亨者隂侵陽而當遁也其君子之在下位者歟小利貞者以剛當位而與時行不當遁也其大臣之任安危者歟夫在下位者當小人之進則見幾而作不俟終日可也而可遲回顧戀以罹其禍哉若大臣之義則君在與在君亡與亡雖欲遁亦安得而遁也其曰小利貞亦猶屯之小貞吉也夫國家昏亂而小人構禍非一日之故則靖其難也亦非一日之力故必以小而正之言正之以漸不可驟也卦之九五以剛當位而與六二應是君臣相得固當隨時消息以弭其患而圖其治而以二之中正非剛躁固能得小貞之道者也此言乃程子之意朱子以小利貞為小人利於正則又一義云初六遁尾厲勿用有攸往遁以居前者為善居後者為不善以六居初言乎人則柔弱言乎位則卑下而其遁也在人之後此危之道也然卑位弱人遁雖居後猶為可也若不遂其遁而往從於小人則失身甚矣故戒以勿用有攸往也六二執之用黃牛之革莫之勝説六二以小人言之則其道方長乃先害乎君子者也以君子言之則居大臣之位應九五之君所以禁絶邪黨而安全善類皆二之責焉故其遏小人之進當如執之以牛之革而不能脫也二柔順中正得位得君此固其所能者而不能者亦不可以不勉也九三係遁有疾厲畜臣妾吉九三居下之上非卑位矣而以比近於隂不能先遁而與隂相得是有所係戀而不能速遁者故有疾而危也占者以畜臣妾則猶可獲吉若在位當遁而又有所係豈其可邪九四好遁君子吉小人否九四在四陽之中而以陽處隂又與初應是可為君子可為小人者也好遁者言與小人有交好而能絶之以遁去如此則為君子而吉也然有交好而能遁最為難者故言小人則否謂其不能遁也占者當是時處是事將為君子乎抑為小人乎其必有以審之矣九五嘉遁貞吉九五雖君位然遁非人君之事故但言君子之遁而已五與六二為應而陽剛中正無所私比故為遁之嘉美而得正以吉也上九肥遁無不利上九髙而無位逺而無係能知幾以先遁乃遁之肥饒而自得者何不利之有哉乾下震上大壯利貞大壯者陽剛盛壯之時也陽剛之道未嘗不正而必戒以利貞者以其盛壯之甚則恃其剛而或過於理過於理即失其正也失其正則剛惡而非善矣君子而小人矣可不戒乎初九壯于趾征凶有孚夫君子之進也在於待其時時之至也在於戒其躁初九當陽盛之時固可以進矣然壯于趾而急於行則失之躁迫者也其行之凶有必然而無疑矣九二貞吉彖辭戒陽剛以利貞六爻之中能貞者其唯九二乎二雖當壯時而居柔得中不過於壯既中則正可知矣故無他辭而止曰貞吉貞其固有非戒辭也九三小人用壯君子用罔貞厲羝羊觸藩羸其角三當壯時而過剛不中以君子小人處之皆非冝也小人而過剛則用其壯以陵君子君子而過剛則視有如無而鋭於進貞固守此而不知變危之道也其壯如是如羝羊之觸籓籬而困其角凶咎可知也自三至五為互兊有羊之象九四貞吉悔亡藩決不羸壯于大輿之輹九四不正矣故戒之以貞則吉而悔亡四雖壯之甚然以陽居隂不極其剛且在諸陽之前以去隂害為己任則亦冝用壯而不可以無剛者故如羊之觸則籓已開而角不困如人之行則大其車而輹甚壯此利於進之象也六五喪羊于易無悔易為君子謀不為小人謀故大壯之五上雖隂爻而亦言君子之事夫大壯之時戒於過甚而六五以柔居中如羊之忽然而亡不復抵觸矣如是則安有悔哉上六羝羊觸藩不能退不能遂無攸利艱則吉盛壯之時有進無退上居壯之終動之極故如羊之觸籓既不能退又不能進而無所利也然進固不可矣而退豈終不可乎若能艱以處之止而不進亦可吉矣坤下離上晉康侯用錫馬蕃庶晝日三接晉者進盛之時雖不言吉亨而吉亨可知也以順而麗於大明雖不言利貞而正可知也夫朝覲燕賜所以明君臣之禮也稽之他經諸侯來朝而錫豫者有三焉即位而來見一也六年五服之朝二也敵王所愾而獻其功三也此曰康侯者其諸侯之有功者歟當國家之明盛而賞有功之諸侯其禮之勤至當何如也坤為馬故言錫馬蕃庶離為日故言晝日三接凡禮至三者隆之極也如王三錫命出入三覲皆可見也以康民安國之侯而多受大賜顯被親禮則其為天命有德而非私惠可知矣彖辭雖主於一事而言然當是時有是德而得其占者於事固無不利也初六晉如摧如貞吉罔孚裕無咎四居大臣之位為鼫鼠之行而初與之應則雖欲上進而彼乃見摧故云晉如摧如也若初六者亦如之何哉唯守吾之正而不自失則可以吉矣能守正矣而猶有不信者焉則亦處之以寬裕而自無咎可爾然是道也非遁世無悶之君子其何以能之六二晉如愁如貞吉受兹介福于其王母二欲進而愁則非安於義命者故戒之以守正則吉而終能受福于王母也王母以隂居尊者也此爻之象占為先塞後通之義六三衆允悔亡人三為衆下之三隂皆欲進者而六三居其前故衆皆信之以同進而其悔亡也三之有悔以非中正也能亡其悔以處順之極也九四晉如鼫鼠貞厲互艮為鼠而九四陽爻鼫鼠之象也四之位為大臣而不中不正上逼柔順之君下絶三隂之進如碩大之鼠貪而畏人貞固守此能無危乎六五悔亡失得勿恤往吉無不利以六居五有悔也而處得其中則悔亡矣六五以大明在上冝為羣下之所順附者而下之三隂以順而麗於大明亦樂親附於五者也然九四以剛強不中正而隔絶三隂之進是下之順從者其失其得未可知也夫王者之懷服天下唯明其明德使天下自然嚮化而順從固未嘗有期必之心也如比九五之顯比乃其道也若不然而屑屑焉恤於其失得則必違道以干譽計功而謀利雖有意於服人而人有不服者矣王者曠大之度豈如是哉如五能失得勿恤則王道得矣如是而往何有不吉而又何不利乎上九晉其角維用伐邑厲吉無咎貞吝上九晉之極知止可也而復求進焉不可也離為牛而以剛居上角之象也進而摧其角凶可知矣若以伐其私邑則猶可以用其剛者然亦必危以處之則吉而無咎也又曰貞吝者私邑內叛至於用兵而猶不能服則自反可也若貞固不變而窮兵黷武安得不吝乎離下坤上明夷利艱貞明夷者以暗居明上而明見傷也以二體觀之則日入地中地傷日之明以六爻觀之則上六一爻為暗之主而傷下之明其下五爻皆明者而受傷於上六此二者皆明夷之義也利艱貞者明見傷於暗則其明者當艱難正固以處之乃免於難也艱者畏愼而無忽也貞者正固而無邪也艱而能貞處患之道盡矣初九明夷于飛垂其翼君子于行三日不食有攸往主人有言內卦離為雉故取于飛之象飛而垂翼已見傷矣然但傷其翼則未甚故尚能飛以避患也初去上最逺猶人臣在下位而害未及所冝速去也行而不食者窮日之力而去也見幾而作不俟終日此君子之事在常人之見固未免有言者然義所當然不可以人言而顧慮也或曰有攸往謂不度時勢而尚欲有為者如是則公論之所譏矣故云主人有言也六二明夷夷于左股用拯馬壯吉傷及左股甚於翼矣然得壯馬而速行猶可救其傷而吉也或曰二居大臣之位雖見傷而義不容去者故以壯健之力拯國家之難則猶可吉也九三明夷于南狩得其大首不可疾貞三居下之上與上為應上暗主而三剛明故先儒以湯武誅桀紂當之也如狩之向南而得其惡之魁首無不克矣然又言不可疾貞者蓋俟天休命臨事而懼所以正其罪者亦不容於亟也六四入于左腹獲明夷之心于出門庭朱子此爻之義善矣而邱氏之言亦若可取者今録之曰入于左腹者六四入坤體之下也坤為腹左者僻處也上傷人之明者而六四與之同體能深入其腹而得其傷明之心故知其不可輔而去歸於九三此出其門庭也微子去紂而歸武王蓋如此云六五箕子之明夷利貞當明夷之時而居此地得此爻者當如箕子之正其志也利貞即爻辭之利艱貞也艱貞固二義而尤以貞為重失艱則死爾失貞則邪臣也其可乎上六不明晦初登于天後入于地下五爻皆為上六所傷者故皆云明夷上六乃傷其下者故不言明夷而但言不明晦唯其不明而晦所以能傷人之明也始之作威如登于天終之隕命如入於地不言凶者其凶甚明不待言矣丘氏曰以商周之事觀之上極暗為紂五近晦為箕子四與上同體避暗就明為微子三與上應以明克暗為武王二大臣而藏明於暗為文王初去暗逺而見傷即避為伯夷太公夫易之稽實待虛固非為一時一人而發也然其配此六爻義亦當矣離下巽上家人利女貞卦之為家人言一家之道也而王道在是矣蓋天下之本在國國之本在家家正而天下治矣其可忽乎利女貞者正家之要道也一家之中大倫有其三而所以正之者莫難於夫婦夫婦之道既正則父子兄弟之正為易矣昔舜之刑于二女文王之刑于寡妻皆女貞之義也自天子至於庶人其道之所施雖逺邇之異而正家之道安有二哉初九間有家悔亡正家之道在正其始初九者有家之始也於是而有以防間之則其悔亡矣有家之始如子之始有室始代父而任事始命於朝而為士大夫皆是也六二無攸遂在中饋貞吉彖言利女貞傳言女正位乎內在六二當之矣故於二言女正之義婦人之道在家從父既嫁從夫夫死從子於家事無敢專者唯順從而已矣故曰無攸遂言無有專遂而行之者也婦人之事如絲枲織絍以至於飲食膳羞皆其所當躬任也而飲食者所以為養尤不可以一日而廢者故曰在中饋言居中而專主乎饋食也詩所謂無非無儀唯酒食是議其此二句之義歟然凡所事者又必皆以貞則吉貞者婦道之正也以四德言之無攸遂者婦德也在中饋者婦功也若推其餘婦言婦容之類皆必以正也六二柔順中正有其德矣然亦不可以不戒也九三家人嗃嗃悔厲吉婦子嘻嘻終吝九三以剛居剛治家而大嚴者也然閨門之內恩常掩義故以嚴則嗃嗃悔厲而終可以吉以寬則嘻嘻樂易而終至於吝此二者或過或不及雖皆失中然與其失之寬寧失之嚴也若夫九五之交相愛者聖人中正之道也而三固未之及也六四富家大吉卦之六爻四陽二隂而二四之隂皆得正位故於二言家之正於四言家之富富者正之效也夫陽主義隂主利以隂居隂固能富其家者然家之所以富以男女之正也苟為不正則驕奢淫佚睽乖分裂無所不至矣雖欲富安得而富哉記曰父子篤兄弟睦夫婦和家之肥也家之肥即家之富也故知男女之正雖不期於富而有自然之富矣九五王假有家勿恤吉諸爻通言家人之道而九五君位也故以王假有家者言之假至也王至於有家家道之成也夫自庶人之賤夫婦之愚孰不謂之家者乎然求其父子有親長少有序閨門有法亦云罕矣是雖有家猶無家也唯王者則正身修德化先於家而倫理以正恩義以篤此王之至於有家也勿恤吉言勿憂其不化而自化也夫身不行道不行於妻子於妻子而未化吾之道有未至爾故王者之正家唯躬行以率之盡誠以感之明禮以一之而其下之化有不期而然者矣若憂其不順而治之過剛則至於嗃嗃矣豈王者之道乎上九有孚威如終吉陽而居上父道也故言正家之道備矣有孚者誠以感之也威如者嚴以正之也夫身既修矣而此二道者又不偏廢焉則始雖不治而終有不治乎其曰終吉者亦不求速效之意也兊下離上睽小事吉睽乖之時小事則吉以時勢之難合人心之多疑也在他卦則五柔二剛多為吉者而睽則相應者亦乖異矣故二之於五必於巷而後遇五之於二必噬膚而後合其合之難也如此是豈能大有為者邪初九悔亡喪馬勿逐自復見惡人無咎初之有悔以無正應也其悔之亡以其守正於下而不苟合也夫以下而求合於上則必上之求於我然後我往以應之爾若之何其可自往邪初不苟合於四而四將自合初四是如馬之喪失不逐而自復也然是道也以望於在上之賢者可也以望之於惡人不可也故惡人者必見之則無咎不見之則殃咎至矣然此非聖人之達節者惡能之如孔子之於陽貨合斯義矣若未至於聖賢而欲見惡人是猶非津人而欲馮河也往則溺矣吁難矣哉九二遇主于巷無咎二與五應而五自睽乖有所間隔不能合於二然二在大臣之位不容不思以合於五也故當委曲相求如遇之於巷然後可以無咎焉然其遇之也非詭遇其於巷也非邪徑固自有其道耳大臣之事君如陳善以曉之積誠以感之順其美以導之因其明以入之唯宛轉以求合而不離於正理此遇合之道也能如是者其剛明中正之君子乎六三見輿曵其牛掣其人天且劓無初有終隂必合於陽者也然三應於上而間於二四之陽則於正應者睽矣故其輿之行則二曳之於後其牛之動則四掣之於前以三之隂柔不正冝其舍上九而附二四也然上之過剛而多疑能不見罪乎故輕則耐其須重則劓其鼻以其叛於已也然三之附二四實迫於強勢非得已也上始則疑焉而終亦疑釋矣無初有終始睽而終合也九四睽孤遇元夫交孚厲無咎四處近君之位當睽乖之時而下無應與故曰睽孤然在下而孤乃其素也在上而孤由已之不交於下爾若能下交則安得孤乎故又曰遇元夫初九以陽在下安於卑下而不苟合於上此富貴不能淫貧賤不能移威武不能屈所謂大丈夫者也四能與之遇則睽者可合而無竊位之恥矣然交接之道貴於有孚然後賢者能應之而又處之以惕厲則可無咎也求賢而必危厲何也蓋睽乖之時人心多疑苟不惕厲則讒人間之而睽終不合矣此聖人之深戒也六五悔亡厥宗噬膚往何咎隂居尊位而上下睽隔乃人心疑散之時冝有悔也而其悔亡者以二能委曲以事君而五得以全君臣之義也五二君臣之分素定猶宗親也二既委曲以遇五則五當深親信於二是於其宗如噬膚之相入也睽而合者如是是唯無往往必達矣夫何咎之有上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪寇婚媾往遇雨則吉上九與三不合是睽孤也上剛極而躁暴明極而多疑而三乃附於二四故上深惡之如見豕在於塗而鬼在於車未免以寇讎視之也然原三之本心乃迫於強而非其罪也故先則張弧而欲射後則説弧而相親於是乃知三非寇也實婚媾也隂陽既和則可與共事而有成功矣豈非如遇雨而吉乎始睽而終合先疑而後信其象如此蓋世有異常之事則必有異常之象也艮下坎上蹇利西南不利東北利見大人貞吉蹇之為占何以利西南而不利東北也蓋西南平易坤方也東北險阻艮方也蹇之九五變則為坤而出乎險矣豈非利乎若入於東北則方出險而又入險矣豈非不利乎利見大人者九五陽剛中正之主而方在險中在下者固利見之以共濟乎蹇也利貞者處蹇之時濟蹇之道利在於正而六爻自二以上皆得正位是亦貞之道也初六往蹇來譽蹇之諸爻皆以往來言之而説者多不同竊求其意彖辭言利見大人者利見九五也九五言朋來者以上下皆來助之也以是推之則諸爻之言往者去九五而不助之者也言來者來助於九五者也如是則往來二字諸爻之義皆順矣如初之往蹇來譽言去五則益蹇來助五則有譽也六二王臣蹇蹇匪躬之故六三不以往來言之者以二應於五而已任其事非去而不來者故但曰王臣蹇蹇匪躬之故言其處多難之地者非為其身之故也乃為王而已矣其曰蹇蹇者二與三四為互坎有重坎之象猶重乾而曰乾乾重坎而曰坎坎也九三往蹇來反四與上皆比於五二則應於五而三獨非比非應去而不能助五者故勉之曰往蹇來反言來助五而復於臣職無為離畔也六四往蹇來連四近於五故曰來連言當與五連力以濟險也九五大蹇朋來五剛健中正而陷於險中乃遭其厄運而非自致亂者其曰大蹇猶所謂遺大投艱於朕身也當是之時凡有志者皆當以澄清天下為己任矣而況於有位者乎其得朋來之助亦冝也非幸也上六往蹇來碩吉利見大人上六者非髙位之臣則髙世之士也而以五之在難亦來助之則必有碩大之功矣利見大人見五也坎下震上解利西南無所往其來復吉有攸往夙吉解者難之解散也難之解散利於平易安靜故曰利西南西南坤方平易安靜之地也無所往謂難既解而無復有為也復者復於安靜之地也人心樂於安靜者其常也至於禍難者豈其所樂哉今幸難解而復安靜是復於其常也有攸往夙吉謂尚有所為則早往乃吉蓋除亂去惡貴於乘勢苟亂滋而惡甚則用力愈難而前難之解者且將復合矣時哉不可失其夙吉之謂歟初六無咎難之初解雖無所為亦無咎矣九二田獲三狐得黃矢貞吉難之解者時也而亦由於人也解六五隂柔而九二剛中則解其難者二也故云田獲三狐狐者隂邪為害之獸也去其害則難解矣得黃矢言以其中直故能解其難也二能以中直而去邪則正而吉矣六三負且乘致寇至貞吝以隂居陽處非其位故為負且乘之象而致寇至小人見罪於君子君子非寇也自三言之則寇爾貞吝言貞固守此吝之道也九四解而拇朋至斯孚初六居下拇之象也在人則小人也難之方解正君子道長之時也而四與初應則為纍矣故必解其拇則君子之朋至而相信矣六五君子維有解吉有孚于小人世之所以致蹇難者小人也六五為解之主而與三隂同類是小人未去也將何以為解乎故君子之有解而吉者必驗之於小人之退也上六公用射隼于髙墉之上獲之無不利公者大臣上六也隼者鷙禽六三也六三負且乘為有罪者上六能去之則悖亂者解散矣故其象為公用射隼而獲無不利也兊下艮上損有孚元吉無咎可貞利有攸往曷之用二簋可用享損之為卦與謙同意未有謙而不益者矣亦未有損而不益者也然損之為道必有孚誠非孚誠則偽也豈能久而不變乎故損而有孚則大吉矣於義無咎矣可貞固而守之矣可以往而有為矣然損益之大者莫大於禮而禮必始諸飲食也故又設為問答曰損之道當何所用哉雖二簋之薄亦可用享矣夫損者損文而存質也損過而就中也損欲而存理也推二簋之義凡事之當損無不然矣初九已事遄往無咎酌損之初與四應而損其陽之實以益隂之虛此當行而無疑者也故言當輟所為之事而遄往以益之則無咎也然損已者又必酌量之可也使彼自滿而不受吾之益則雖欲益之亦何從而益之乎九二利貞征凶弗損益之初之益四則曰遄往二之益五則曰征凶何也蓋初之陽居下而得正則患其自守而不能益人也故勉之以遄往二雖剛中而居柔則患其不貞而枉道以説人也故戒之以征凶其地不同而其事亦異也然二之不往非終不往也唯守其正而待上之求然後益之爾是則弗損其貞者乃所以益其君者也六三三人行則損一人一人行則得其友六三兊之主也上九艮之主也兊之隂不與同體之二陽為偶而與艮之陽為偶此三人行而損一人也艮之陽不與同體之二隂相應而與兊之隂相應此一人行而得其友也隂陽相友而生生之道不窮矣六四損其疾使遄有喜無咎六四近承六五而柔弱之甚苟非求益於在下之陽則何以損其身之疾哉然欲損己之疾而不能急於求善人亦豈能樂應也故初既遄往則四亦遄喜所以喜者以損疾而得喜也而又何咎哉六五或益之十朋之龜弗克違元吉人君居天下之尊位則當受天下之大益六五柔中而虛己以應二則能受益者也九二剛中而自重以待五則能益人者也故其益之大如十朋之龜多而可寶蓋五之於二必先致敬盡禮而二之於五則自當責難陳善矣以如是之寶而益於五五雖欲辭之而不可得也其為大吉也冝哉上九弗損益之無咎貞吉利有攸往得臣無家上之損以益下者以恩惠言之也然上之益下不待於損已唯以天下之益益天下斯可也如欲養老者非人人而養之也但教之樹畜使之自養其老爾欲富民者非人人而富之也但禁其遊惰而使民之自富爾此豈非弗損而益之乎如是則可以無咎矣然亦必以貞則吉而利有攸往也得臣無家言其效之大也家者大夫士也得臣則為王公矣震下巽上益利有攸往利涉大川損下益上則為損損上益下則為益乾下坤上損乾上爻益坤上爻而成兊艮其益在上也故為損乾上坤下損乾下爻益坤下爻而成震巽其益在下也故為益益者損之反也處益之時何所不利哉於安寧之時則利於有為於險危之時則利於濟難九五六二皆得中正其足以有為也非以其德乎震巽二體皆木之象其足以濟難也非以其才乎既有是德而又有是才以一身之益而為天下之益益之為效亦大矣初九利用為大作元吉無咎損之損下益上則受益之多者上九也益之損上益下則受益之多者初九也初既受上之益則不可徒然而無所報效故利用為大作言當大有為以報上也大臣之於君必敬其事而後其食可也況受君之大惠而可以不效其忠邪然設施之大者必大善而吉也若非大善之吉能無咎乎六二或益之十朋之龜弗克違永貞吉王用享于帝吉六二虛中處下能受上之益者也然隂柔之性患其不能貞固則所以求益者或非其道矣故戒以永貞則吉也王用享帝未詳其義得非以帝出乎震歟六三益之用凶事無咎有孚中行告公用圭六三不中正而與上九之陽剛為應如人受橫逆侵加而困心衡慮以反於善者故為益之以凶事而可以無咎也若有其孚誠而合於中道則又可以告於公上而用圭以通信矣蓋又為朝覲聘問之吉占也六四中行告公從利用為依遷國三四爻皆不中故戒之以中行也近於六五則為得君者故有告於公則從也遷國者必順下而動又互體坤為國邑故利於遷國也九五有孚惠心勿問元吉有孚惠我德九五不言益而為益之大者如天施地生而其益無方也為人君者有至誠惠益天下之心則其治天下以大德而不以小惠有周遍宏大之度而無偏滯固狹之私此其為益亦大矣然人君之益天下如天之生物其春生秋殺隂潤陽煦天之心固無私也而物生之不齊則天不與知焉故既有孚惠之心則勿問其效之何如而大吉可知矣夫上下之間感應之機如桴鼓影響之必然者上既以至誠而惠益於天下則天下亦至誠而感吾之德以為惠所謂勿問元吉者於此可見矣以聖人之益而同於天地之益豈非九五乎上九莫益之或擊之立心勿恆凶當益下之時而以九居上故莫益之而或擊之以其在人之上徒務益已而不能益人乃取禍之道也夫天下之理聚必有散盛必有衰其聚也盛也豈可恆哉唯仁者則知其理不可恆故散財以得民不以利為利而以義為利小人居之則但知益之為恆而豈知自損乎其曰立心勿恆戒之也言立心勿以益為恆也以益為恆不免於凶矣乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往夬者以隂而決陽以君子而決小人也君子之決小人必揚其罪於公朝使人共知然後加刑焉蓋隂居陽上小人而凌君子此其罪之大者也既正名其罪無不服矣然亦必盡誠以呼號其衆而處之以危厲斯可也蓋不盡誠則君子未信而無以固吾勢不惕厲則小人隂謀而變生於所忽事之不濟職由此也告自邑不利即戎言當自治而不尚威也夫君子異於小人者以正之勝邪而仁之勝不仁也苟不自治而行不合理專恃威力則吾之所以異彼者亦幾何哉小人既去矣則君子利有攸往矣為可為於可為之時其孰能阻之初九壯于前趾往不勝為咎陽決隂雖正然在上而決之則職之當然在下而決之則思出其位使決之而勝猶不可也況不勝乎初九在下而任決之事如趾在下而壯于進者也往而不勝能無咎乎九二惕號莫夜有戎勿恤五以陽居尊位主決乎隂者也然五近於隂如莧陸然而二與五應剛而居柔又得中道是助五以決隂者二也惕號即彖辭之孚號有厲也能如是則雖莫夜有戎可勿憂矣九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎三以剛居剛而過中則其決去小人必悻悻然而形於面目故云壯于頄言剛壯見于顴骨也如是者凶之道也然三之剛壯乃君子之夬夬雖過而不過也夬夬決其所決也三在衆隂之中獨與上六為應如獨行遇雨至于若濡而有愠怒冝其決之壯矣是其有凶者不足為凶而可無咎也蓋君子而惡小人固其常情至與之有故而能去之者尤人之所難也其決之雖過又何病焉九四臀無膚其行次且牽羊悔亡聞言不信四陽爻本剛決者而居於隂位又為説體故如臀之無膚而次且不前也四居大臣之位當佐五以決隂而次且如是則欲小人之退難矣為四者自知才力不足則當舉賢讓能以避其位斯可也牽羊者前以牽之則不行退而隨其後則行矣九三欲決小人而壯于頄此勝其任者也四若能讓三居前而已處其下如牽羊然則其悔亡而小人去矣然以四之當決不決雖聞是言必不信也占者因不信之辭而或能信焉庶無悔矣九五莧陸夬夬中行無咎九五為夬之主而比於上六如莧陸感隂氣之多者也然五剛健中正能決其所決者故合於中道而無咎也朱子云莧陸二物莧馬齒莧陸商陸也上六無號終有凶衆君子去一小人則為小人者勢孤而援絶矣故無所號呼其黨而終有凶也巽下乾上姤女壯勿用取女姤者隂與陽遇也夫隂陽之消長固自有常非陽緩而隂驟也然聖人之作易常扶陽而抑隂故陽之長也唯恐其緩而隂之來也恆憂其驟姤之為卦一隂始生而羣陽所不覺如卒然而來與之邂逅故謂之姤也陽之生也於復之一陽尚微而必曰朋來無咎至於四陽然後謂之壯而隂之生也於一隂已謂之女壯矣陽剛健而隂則柔弱也而何其壯之甚歟蓋以一隂而遇五陽雖未盛壯而已敵陽矣既敵於陽謂之壯可也隂陽相配合者也而戒以勿用取女者蓋隂順於陽則其配也隂與陽敵則為仇矣其可取乎聖人之戒深矣初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅此爻言以陽制隂之道也夫隂始生而制之當如以柅止車之進而以金為柅則堅之至也又從而繫之則固之甚也然其制之不可以不愼故當以正則吉有攸往見凶言隂進之時陽不可有為也唯安靜守正以阻隂之進亦可矣若有所為則是不能與時消息也其免於凶乎羸豕孚蹢躅言隂雖尚微而其跳躑不靜已必然矣當此之時尚可以有為乎古之聖賢未嘗不欲有為也然時行則行時止則止乃免凶咎之道也九二包有魚無咎不利賔二與初遇而陽能畜隂故云包有魚能畜隂則隂不為害矣故云無咎一隂生則隂為主而陽為賔隂若進而與衆陽遇非衆陽之利也故云不利賔九三臀無膚其行次且厲無大咎三過剛不中欲下與隂遇而為二所隔故如臀無膚而行次且然不遇於隂可免其害故雖危而無大咎九四包無魚起凶四與初為應而初為二所得故云包無魚此為人上而喪其民衆之象也起凶者言自作凶非人之罪也九五以把包瓜含章有隕自天以陽制隂者九五為之主也然五之制隂者以九二為之正應二能包畜初隂不使之進如以把葉而包瓜也瓜在下乃初隂之象把木之髙而堅者乃九二之象五既免於隂之進淩則當含晦章美以俟天命而已有隕自天言天運之復也隂之極則陽必復生也上九姤其角吝無咎乾為龍剛而居上角之象也陽極於上而隂生於下則上之與初雖非比應亦相遇者以剛極之陽遇方進之隂則與之相薄矣姤其角者其龍戰之謂歟以陽而與隂戰固可羞吝然戰而退之則陽免於害亦可無咎也坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往萃聚之時而王者至於有廟此萃之至也夫王者之有天下則所以一天下之心教天下之孝莫大於宗廟宗廟既立則已之精神以誠而聚可以交乎神祖考之精神以誠而聚有以享其祭皆萃之道也利見大人者當萃之時又必大人以治之乃亨也如聚人以財者固萃也然理財正辭禁民為非則所以治其爭而保其聚也此非大人而能之乎利貞所聚者利於得正也所以萃鬼神萃人心萃貨財凡有萃者皆當以正也不正則萃以致咎非亨之道矣用大牲吉言祭祀之所用也以是推之如朝聘燕饗之類莫不然矣其必大牲者非過侈之謂也時之豐富則其物冝稱若一於儉薄則所謂以天下儉其親者非聖賢之行禮也聖賢之行禮與時隆殺如國奢則示之以儉國儉則示之以禮是也其用大牲者亦天理之當然而已矣利有攸往當萃之時可以有為也夫人心既萃則動無不順財貨既萃則用無不周於萃之時而有為功業可就也萃之為道將安往而不利哉初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎人之萃者必以正初與四應本相信者而乃近比於二隂是有孚而不終為亂而妄聚也豈為正乎既比於同類若又號呼其正應則其同類羣聚而笑之矣一握羣聚之意也初若能勿恤其笑而往從於四終無咎矣蓋人不能無過而貴於改過苟其當改而速改之雖衆之所笑又何病哉六二引吉無咎孚乃利用禴二應五為萃之正與上下二隂為萃則非正矣如二者於同類之中當自引去以從於正應斯吉而無咎也二雖隂柔而處得中正能自引拔而不隨人後者也孚乃利用禴謂有其孚誠則祭雖薄物亦可交於神明也彖言用大牲吉而二言利用禴者或情文之必稱或去末以存誠固不必同也六三萃如嗟如無攸利往無咎小吝隂必求萃於陽者也三在二陽之下欲求萃於四則四非其應欲求萃於五則為四所隔故不得其萃而至於嗟歎如是則何所利哉然三本與上同類而上亦無與萃者故二爻雖非正應亦可以往而無咎也然上乃無位之爻又求萃不獲然後從之雖得其萃亦小吝矣九四大吉無咎卦惟四五二陽五居君位固下之所萃者而四近於君亦下之所萃如是者非處之以大善之吉其能免於咎乎夫以周公之大聖其忠誠之心皎如日月人孰不知也然在嫌疑之地而得人心之歸猶不免於流言者而況忠誠之不及者乎況為齊田氏魯季孫者乎四以陽居隂為不正故有大吉之戒云九五萃有位無咎匪孚元永貞悔亡五為萃之主則萃而有其位矣冝無咎也然有其位而無其德則人亦未能信故又必有元永貞之德然後可以亡其悔五剛陽中正而言匪孚言悔者為有位無德者言之也若素有其德則何有不信而又何悔乎元永貞亦猶比之元永貞也人君之萃天下即所以比天下比之與萃非二道也上六齎咨涕洟無咎萃必有位有德然後人萃焉上六無位無德而徒在於上誰與之萃乎然能畏懼之甚而齎咨涕洟雖無所萃亦可無咎也巽下坤上升元亨用見大人勿恤南征吉升進之時冝見大人然後可以遂其進既見大人則不用憂恤而事可為矣凡升于位升于治升于德莫不如是也南征者前進也東南巽西南坤二卦夾拱而為南故曰南征也初六允升大吉隂信於陽而順從之者也初柔在下為巽之主信從二陽以遂其升故謂之允升能如是則大吉也九二孚乃利用禴無咎二以剛中而應五之柔中是以剛強之臣而事柔弱之君也如是者唯不事矜飾而專尚孚誠乃能取信於君而無咎孚乃利用禴去飾存誠之謂也九三升虛邑人之不遂其升者必有阻於前也以九三之剛而得正進臨於坤則虛豁而無阻其吉亨不言可知矣隂為虛坤為邑乃虛邑之象六四王用亨于岐山吉無咎升言祭祀者人積其誠意以事鬼神乃升而上通之意也六四大臣之位而當升之時極乎柔順升而不過文王事紂之時其如是乎故言王用亨于西山言舉祭于岐山也天子祭天地諸侯祭境內山川以文王而祭岐山則其祭不越境而極其誠敬可知矣其吉而無咎也冝哉六五貞吉升階凡升於位升於治必以序而升者也六五以柔而升居尊位矣而又得剛中之臣以誠輔導之則其升於德與治也以序而進如升階之易矣夫天則不可階而升也若居人之位致人之治奚不可升乎然柔弱者常病於不能貞固也故其占曰貞吉戒之也上六冥升利于不息之貞升而不已必困上六處升之極乃將困之時也故謂之冥升言昏冥而不知自反也如上六者能以其升進之心而施於不息之貞則其升於道德之髙雖聖人可至也中庸言弗得弗措而愚必明柔必強其亦不息之貞乎坎下兊上困亨貞大人吉無咎有言不信困之為卦處險而説是身雖困而道自亨也故曰困亨然常人之情遂其安榮則躍躍以喜處於困辱則戚戚以悲烏有險而能説乎是則困而亨者乃成德之所能而非可以強為也故困而能亨則得其正矣有大人之德矣吉而無咎矣有言不信言處困之時雖有所言人莫能信唯當默以避患斯可矣如坤六四之括囊是也初六臀困于株木入于幽谷三歲不覿困而在下處之不安乃臀困于株木之象也株木非可坐之物而坐于其上不安可知矣入于幽谷三歲不覿言入于幽暗之所而無嚮明之時也坎險而至下幽谷之象也處困而亨唯君子能之初以隂在下而不正則困而益困固自取也九二困于酒食朱紱方來利用亨祀征凶無咎坎為酒食故云困于酒食人之困莫甚于貧餒而酒食則所以為樂者也今其曰困于酒食是以所樂者為困也夫人之行不中正其取困冝矣而以九二之剛中亦且困焉是以君子而困者如酒食本可樂而反為所困也然為邪而困身與心俱塞為善而困身困而心亨心之亨則身亦有時而亨矣故如二之困者以之事君則君應之而朱紱來以之事神則神應之而冝享祀若征行而欲有為則非其時矣不免於凶矣然義所當為亦無咎也又安可以時之利鈍為作輟乎二處大臣之位者故雖當困時而事有必為蓋食焉而不避其難者如此也六三困于石據于蒺藜入于其宫不見其妻凶三進則為四所阻如石之在前退則乘二之剛如蒺藜之在下是進退皆不得其安也其宫者本爻之位也妻者其相應者也三與上非應是入宫而不見其妻也其象如此凶寧免乎九四來徐徐困于金車吝有終四與初為應而初方困于下進則為二所隔故其來徐徐而困于金車金車謂二也車剛健而中有物者故九二象之如大有之九二曰大車以載大畜之九二曰輿説輹未濟之九二曰曳其輪皆剛健而中實者也四以陽剛居上位而不能拯人之困亦可羞吝矣然處於説體已出乎險而邪不勝正其應必合此所以有終也九五劓刖困于赤紱乃徐有説利用祭祀兊為毁折劓刖者皆毁折也劓傷於上刖傷於下九五上為隂掩下則乘剛故為劓刖也既為刑人則於赤紱無所用而反為所困矣然既出乎險而在説體則其困者亨矣故徐而有説也利用祭祀者陽剛中實為孚誠之意人之交於鬼神者亦誠而已矣上六困于葛藟于臲卼曰動悔有悔征吉葛藟柔而居髙者以六在上亦柔而居髙故取以為象也夫葛藟之懸於上不能無危不能無動也人以柔而居髙以憑陵於君子則冝其臲卼不安而動則有悔矣然處困極之時有變通之理故動而有悔亦可以征行而吉也巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶大傳曰井居其所而遷井之為處有常而不動此居其所也井之為澤能遍及於物此水之可遷也曰改邑不改井非居其所之謂歟又曰無喪無得往來井井非遷而及物歟汲之而不竭無所喪也不汲而不盈無所得也人人得而汲之往來者皆井其井也然能及物者井也汲之以及物者人也汲井幾至未盡綆而敗其瓶則凶矣是則人之罪也非井之罪也以人事言之凡天下之事有一定之理猶井之不動也為其事者必有其功猶井之及物也為之不愼以敗其事而無其功則汲井之非其人也舉其一而天下莫不然矣井之為義豈徒取於水而已乎初六井泥不食舊井無禽居井之至下此井之泥而不可食也井而如是乃眢井也禽亦且去矣而人豈復井之乎以人言之處至下而無才德亦時之所棄也九二井谷射鮒甕敝漏井谷井旁之穴也鮒蛙也井雖有泉而無能汲者則其泉但注射於蛙穴爾其所以莫汲者以甕之敝漏故也二以剛中之才而上無正應不能汲引故其象如此然非井之恥也不能汲者之恥也九三井泄不食為我心惻可用汲王明並受其福三以剛居正在下之上而未見於用猶泉之泄治潔清而不見食則人之見者莫不為之惻傷也井而如是則可用汲矣夫潔清者泉之性也非為人汲之而潔也然自人觀之則潔而不食能不惻乎彼惻之者未必能汲而欲汲者未必能見人既惻矣則井雖未汲而潔之名著矣彼汲者豈不因惻者而求之乎人才之可用亦猶是也夫賢人君子之修德於下固非以求知於人者然其才行之顯著天下之人莫不期之以致君而澤民則是人也雖未為上知而上之知者有不因天下之慕望而舉乎王明王之明於知人者也王者有知人之明則進之於位而授之以政此賢者之福也亦明王之福也亦天下之福也譬之於井則並受其福即泉之遍及於物也向之惻者今則為之喜矣明明在朝穆穆布列其九三遇王明之時乎六四井甃無咎井以陽剛為泉六四雖隂柔而處得其正猶井之無泉而甃治者也是雖無功而亦無咎矣九五井冽寒泉食泉以冽為美冽而能寒則美而又美者也九五陽剛中正而功及於物猶寒泉之冽而汲之以食也其於二之甕敝三之心惻固有間矣上六井收勿幕有孚元吉以六居上而坎口不掩猶井有鹿盧以收繘而無所蔽覆則汲之者無間矣以人言之其居上而功已及物者歟然亦有其孚誠乃大吉也若無其孚誠則虛偽而巳矣其功施亦豈能久乎離下兊上革已日乃孚元亨利貞悔亡凡變革之道必順於人心人心不服非革之善也然人之常情可與樂成難與慮始而變革之初固有人心樂從者然亦有始疑而終信者焉已日乃孚豈非始疑而終信歟已日者終其日也乃者然後之辭也其始則未信必終日乃信者深以見革之之難非革之善而告之詳人終不信也事當革而革之則有大通之理傳曰變而通之以盡利又曰通其變使民不倦其盡利也不倦也豈非元亨乎然事雖當革而必利於正若其不正則前弊未去後弊復生或新不如其故者有矣夫吉凶悔吝生乎動者也使革之而當安得有悔唯革之不當乃有悔也故革之而正則其悔亡矣所謂悔者如人心之終疑革之而不亨皆是也若其孚而能亨則為革之善者矣而何至於悔也初九鞏用黃牛之革以九居初其不可革者有四焉以時言之則初也以位言之則下也以德言之則非中順也以人情言之則上無應也如是而革致咎必矣又曷若安常之為愈乎陽性躁動故戒之以鞏用黃牛之革言當固守其舊不可革也六二已日乃革之征吉無咎六二之可革者有四焉其文明足以燭理也其中正足以有行也其應上足以任事也其體順足以得衆也當其位得其時而又有其才與德冝革之易矣然亦必巳日乃革者所以待人心之信從而後動也以臣而任君之事苟不能從容審愼而斷然遽行雖所革之當亦未免於咎也故必巳日乃革之則征吉而無咎矣九三征凶貞厲革言三就有孚革之為道戒於躁而貴於審如九三者過剛不中居離之極則其於變革不能無躁之失也故戒以征行則凶而當守其貞正處以危厲然後可革焉然革故為新其事大矣必廣詢熟議至於再三而後人信之革言三就言變革之議至於三而始就也此審之至也以三之變革如是其於二之征吉無咎四之改命吉未免為有愧矣九四悔亡有孚改命吉九四輔九五當變革之任盡變革之道故其悔亡而人信之如是而改命則吉也命者君之所以令其下即重巽以申命而審之至者也即渙汗其大號而不可反者也命之如是則純乎天理如天命之公矣改之而吉豈苟然乎九五大人虎變未占有孚兊有虎之象如履之上乾下兊亦以虎言也大人之德變化不測有類於虎者故曰大人虎變五陽剛中正以居尊位如虎之希革毛毨而變化其文章其盛德之光輝為何如哉五之變革如是則不待占度而人皆信之與巳日乃孚者異矣蓋大人者所謂天且弗違也而況於人乎彖言已日乃孚賢者之事也如二四之革是已傳言湯武革命則聖人之事也當之者其唯九五乎上六君子豹變小人革面征凶居貞吉天下變革之時人無不變矣上六居革之終此革道之成也然君子小人之革其外雖同而其中未免於異故君子之革則如豹之變以其弸中而彪外也小人之革則可變其外而難變其心故謂之革面言面順於王化也小人者聖人非不欲革其心也以其下愚而終不可移也如有虞之世苗之來格象之蒸乂皆革面而已聖人固末如之何也若中人性非下愚未嘗不可革也而亦或止於革面焉則吾革之之道未至也非其人之終不可革也征凶居貞吉言革道之成不當復有為唯守其貞靜則吉也若復有為則徒事煩撓乃王莽之為也聖人之變革豈如是哉巽下離上鼎元吉亨鼎之有耳者其象也烹飪者其用也安重者其德也有實者其量也人而如之則儀足以法才足以用德足以鎮量足以容以是而處崇髙之位臨在下之民蓋有不動而敬不言而信者矣其占為元亨豈無所自而然歟初六鼎顚趾利出否得妾以其子無咎鼎之顚趾本非美也然因其顚以傾出其否惡則為利矣是所謂因敗以為功也如人之得妾本不足稱也然妾之有子則亦可為之喜幸矣是所謂因賤以致貴也占者有是事而處之以道則無咎矣以初而上應於四鼎顚趾之象隂在下而與陽應得妾以其子之象九二鼎有實我仇有疾不我能即吉陽剛而中實此鼎之有實者也陽之與隂乃相求者二本與五應而又近於初二既守其中正以與五合則舍初而與之為仇矣有疾謂初之顚趾也二守中正不比於初初亦有疾不能從於二猶君子逺小人而小人亦無以親君子此君子之吉也九三鼎耳革其行塞雉膏不食方雨虧悔終吉三以剛正之才處巽順之極而與五非應是君子而未用者也鼎以五為耳而五與三非應又上下異體是鼎耳變革而不能舉也陽雖可上進而前為四所隔四居大臣之位而應在下之隂則不能以同志並進而反隔絶三之進此其行之所以塞也雉膏者六五文明之腴乃美祿也三未受其任則未食其祿然以五之耳目聰明則三終進用非四之所能隔是如隂陽和而成雨則其悔虧亡而終得吉也然則如三者唯當不變塞而雉膏之美有時而自至斯為善歟九四鼎折足覆公餗其形渥凶二三四爻皆為鼎腹而四居其上乃鼎之滿者人之受祿多而自滿者如是也四近於君乃上公之位也而恃其小能專其美祿遏絶善類昵比憸人則如鼎之折足而覆公之餗矣餗者熟食也鼎之實也以烹飪言之其待食者與其烹者固將俱享其美也若覆之則待食者巳乖其望而烹之者罪且不免矣亦安得而食哉夫大臣之比小人為持祿計也然折足覆餗則公事既墮而已之祿亦喪矣鄉之自滿者孰知其反以自傾乎其形渥程子言覆敗而赧汗也朱子作其刲剭言當加之以重刑也其義雖異而皆可以見其凶矣六五鼎黃耳金鉉利貞五為鼎耳而文明得中故謂之黃耳上九以剛而貫其上故謂之金鉉人君有天下之大器而安處於億兆之上其耳目聰明而無所壅蔽舉動以法而不至傾欹則其賞罰彰明姦邪黜逺亦猶鼎之耳黃而鉉舉也然柔中之君或貞之不足則雖聰明而恐失於不斷故又必利於貞也上九鼎玉鉉大吉無不利自六五而觀上九則曰金鉉以其剛也上九之自觀則曰玉鉉以其剛而能溫也夫在人之上苟非剛而能溫其免於禍乎上能如是冝其為吉利之大也震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯震者陽之動動則有亨之道也然一陽在下二隂在上陽氣方動未免震懼當震之來而虩虩以驚恐則始雖不安而後乃亨遂故笑言啞啞也先震懼而後笑言此所謂生於憂患者也震驚百里雷聲之逺聞也不喪匕鬯言當祭之時方執匕鬯聞震雷而不失容也蓋人能恐懼則敬矣敬則誠矣以是誠敬之心豈徒笑言之樂而已哉雖臨大事處大難如當祭而聞震雷亦不為之變則其於事變之小者無所屈撓可知也震之能亨蓋以此歟初九震來虩虩後笑言啞啞吉卦唯初四二陽而九四陷於隂中不能震動則下卦之陽乃全卦之主也故其爻辭亦與彖辭同六二震來厲億喪貝躋于九陵勿逐七日得自二陽言之則陽為善類自四隂觀之二陽之進乃剛暴而為患者也六二柔順中正蓋善處患難者故當震之來而先自危厲焉前言虩虩者恐懼在於陽爻也此言危厲者當陽剛之來而懼之也六二知懼如是則以心億度之必喪其所有之貨貝於是躋於九陵以避其患而敵來勿逐久則自獲矣億之訓度如億則屢中不億不信皆是也九陵者互體之艮有山陵之象其言九者如云九臯九淵皆重復之意也七日者卦位有六而七則更始此事久而變通之時也六三震蘇蘇震行無眚三去初稍逺故雖當震懼之來而蘇蘇然緩散不復深懼矣如三者固不如二之迫於強暴然在震之時亦當行以避之乃無眚也二之躋九陵者奔竄也三之行則從容而去矣九四震遂泥九四不中正而互體乃坎陷之地故陽雖能動而不免於滯溺也遂者成遂而無反之意當此之時雖有其德猶不能以自拯也況失其剛德豈能動乎六五震往來厲億無喪有事以五視四則四亦為患者也然四方自陷於險往來不安豈能為人之害乎在於五則迫近強暴雖不為患亦危厲矣故云震往來厲其又曰億無喪有事者以心度之雖無所喪然時當震驚亦必有事也言思患而預防之也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言上去四漸逺則雖當震懼之來而索索然不存矣然以隂居震極不能無懼故其視猶矍矍然不安也其柔弱如是則豈可有行乎震不于其躬于其鄰無咎言暴橫之來不及其身止及于五可無咎也然在人之上惴惴自保其鄰有難不能往救是雖無咎也而能免於婚媾之言乎艮下艮上艮其背不獲其身行其庭不見其人無咎艮之為卦二體相背而不相向如人但見其前而不顧其後故言艮其背也艮者止也人身皆動而背獨不能動是背亦止也艮其背者止於所當止而不顧其私也人之不能止於所止者唯隨身以動而狼顧卻慮其為見不一故失其所止也若能如重艮之背止不動而各居其所安有不善乎艮其背而不獲其身言止其所當止則不見有其身此止而止也行其庭而不見其人言雖行有人之地而亦不見其人此行而止也程子所謂靜亦定動亦定此之謂歟人能養其至靜而理存於心則事之當止皆有定見故其止也自不見其身其行也自不見乎人其所見者唯理之當然而巳矣苟為不然而理欲交戰於其中則以已之利害為利害以人之是非為是非如是者靜亦動矣而動又安能靜乎動靜皆失則不能主夫靜矣又安能止其所當止乎彖辭四句以其對言之則有止而止有行而止所謂動靜各止其所而皆主夫靜也以輕重言之人能止其所當止則不見有已不見有人皆其自然矣故彖傳以艮其背一句為綱領而下文三句又對言者乃其效驗也初六艮其趾無咎利永貞時當止而止可也時當止而行不可也以隂居下欲行而止艮其趾之象也無咎冝矣然以其隂柔故又戒以利永貞若立心不常而所守不固亦安能免於妄動乎六二艮其腓不拯其隨其心不快艮以人身取象二居下之中故曰艮其腓腓脛也脛在足之上股之下股動則脛動矣故二之所隨者三也三為內艮之主而過剛不中有列夤之疾二雖中正能止其脛然以三之有疾而二不能正之是不能拯救其所隨此其心之所以不快也以人臣言之雖吾之守身者不失乎中正然立於人之朝而諌不行言不聽於其心能無憂乎如二之不快非其身之憂也乃道不行之憂也然在我既不失則其行其止亦隨時而巳如三者雖聖人其若之何哉九三艮其限列其夤厲薰心以二體言之則三為內卦之背以全卦言之則三當上下之際乃腰胯之象也三為內艮之主而過剛失中比於羣隂止而不動如人有腰胯之疾不能屈伸故曰艮其限列其夤限上下之限也夤膂也列者伸而不能屈也疾而如是則危厲薰塞其中心雖不言凶咎而凶咎可知矣六四艮其身無咎六四心之位也其不言心而言身者何也蓋身者事之本也心者身之主也心能止其身而身不能止其心身者所以聽命於心者也故心能止其身則事皆得其止而心之為用可見矣是則言止其心者又曷若言身之為切乎六五艮其輔言有序悔亡五居上體而中虛口之象也故為艮其輔人之所當謹者莫大於言行而言者行之表尤所當謹者也六五以柔居中能止其輔則其言之謹可知矣其曰言有序非全不言也但謹而不放時然後言其不言也不至於躁妄其言之也不至於隱默如是則言有序矣又安有失言之悔乎上九敦艮吉艮者震之反震二陽以內卦之陽為主艮二陽以外卦之陽為主此艮之上九所以吉也上九者外卦之背也人之身莫敦厚於背故謂之敦艮是止其所止而處之敦厚所謂止於至善者也蓋艮體篤實在於上者又篤實之至所以善也不特重艮為然凡艮居外卦者八其上九一爻無不善也艮下巽上漸女歸吉利貞漸者以漸而進也在下者能止在上者能巽止則不驟進以逼上巽則能謙遜以待下又內止而無爭競之心外巽而有恭順之意此皆以漸進而不遽之義也天下之事莫不當以漸而女子之從人則尤貴於有待非行媒不相知名非幣不交不親男親迎而後行三月廟見而後成婦皆漸之義也卦以艮之少男下於巽之長女又六爻自二至五位皆得正初上雖非正然陽上隂下是亦正也故其占為女歸吉而利於以正不得其正雖進以漸其能吉乎初六鴻漸于干小子厲有言無咎鴻之來往有其時而飛止有其序故漸之六爻皆取鴻之象然鴻宿于水而食於野則其進者將以求食也君子修其道於家而以施於國則其進者亦將以食祿於朝也初六雖在下而當漸之時思以漸進故如鴻至於水涯如是者雖小子危之而有言然時可以進於義固無咎也六二鴻漸于磐飲食衎衎吉二以柔順中正居大臣之位猶鴻之離水而進居於磐石處身既安而又得食也然二之得祿而飲食衎衎豈尸位素餐之人乎蓋其上得正應而衎衎和樂固喜於得行其志者此其所以吉也詩云豈弟君子求福不回其六二之謂乎九三鴻漸于陸夫征不復婦孕不育凶利禦寇三過剛不中如鴻之進於陸而去水益逺非安身之地也三四皆無正應而相比故三以四為婦而征則不能復四以三為夫而孕則不敢育以其相合之不正也其占如是凶之甚矣然以禦寇則又利也二與上不相敵而皆剛則上乃三之寇矣三以剛居剛而主於內故可克也上以剛居柔而客於外故不勝也夫禦寇與婚姻之事吉凶固相反矣然婚姻者其合以正則占雖凶而吉禦寇者其義不正則占雖吉而凶此又學易者之所當知也六四鴻漸于木或得其桷無咎四位近於君乃多懼之地如鴻之進而栖於木非其所安也然柔而得正善於自處又如鴻之栖木而得平柯焉保身如是可無咎矣九五鴻漸于陵婦三歲不孕終莫之勝吉九五尊位如鴻之進於岡阜其地益髙矣然下有正應而為三四所隔當漸之時三四皆欲漸進以逼於五是五亦不得自安也婦三歲不孕謂正應未合而不能成生育之功也然五二皆中正如三四者豈能勝之乎其始雖未遂而終則吉矣上九鴻漸于陸當作逵其羽可用為儀吉上九至髙之處如鴻之飛于雲路矣然其飛也有先後之序雖羣而不亂而其羽毛之鮮可以為器物之儀飾自人言之則其進于朝也必髙出乎庸才而可以師百僚其超於俗也必髙尚其心志而有以勵貪懦是皆賢達之髙致也夫惟大雅卓爾不羣於上九見之兊下震上歸妹征凶無攸利歸妹之占辭如是則舉事皆凶而無利不獨於婚姻為然也其所以如是者以兊之少女而從震之長男則非其配也其情以説而動則不能以貞靜自守也又卦之諸爻自二至五皆不正初上雖得正而隂上陽下亦非正矣女子如是則為不正之女丈夫如是則為不良之夫故占得彖辭者凶而不利而六爻之中則又隨其所處有吉凶之異也初九歸妹以娣跛能履征吉古者天子諸侯大夫之娶其嫡必以其姪娣從則娣者從嫡以適人而不能自行者也初九居下得正而上無正應乃女之為娣而賢者跛能履言其雖待人然後行而亦能踐履也如是而行冝其吉矣兊為毁折而初二有跛眇之象九二眇能視利幽人之貞九二居中乃女之為正嫡而賢者而其應六五隂柔不正是女賢而配不良也然婦人之道以順為正配雖不良在我其可自失乎二能盡其賢智以治內事安於命分不為邪行則如眇者之能視其明雖不逺而猶不替其操女而如是豈非賢德乎六三歸妹以須反歸以娣須女之賤者六三居下之上本非賤也然以不中不正為説之主故失行之甚人莫之取而反為娣以從人也世之躁動失守而自取卑賤者觀此可戒矣九四歸妹愆期遲歸有時自內卦觀之則外震三爻皆男也以全卦言之則卦曰歸妹而六爻皆妹之歸者矣四以陽居上體而無正應乃賢女而不輕從人者也其守既不失雖過時而歸庸何傷乎六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉泰之三四變而為歸妹歸妹之六五即泰之六五故皆以帝乙歸妹言之也帝王之女為公侯妻則為小君矣君之袂不如娣之袂是女之尊貴者尚德而不尚飾也五以柔居尊而得中道固為有德者然又言月幾望吉者戒其盈滿之失也夫以尊貴之女下嫁於其臣苟不深自抑損則驕貴之心存焉又安能順於其夫而禮事其舅姑乎月之望則與陽敵矣而但曰幾望則不至於盈而不敢伉陽也聖人之戒深矣上六女承筐無實士刲羊無血無攸利上與三居相應之地而非應故為約婚而不終者夫婚姻之禮成而厚其資送者女歸之盛也為酒食以召鄉黨僚友者男婚之冝也今女之承筐是將而無幣帛為之實士之宴其新婚而刲羊未見其血焉是男女之禮皆不備也交好之不誠也如是何所利乎上六隂而虛筐無實之象三兊體而亦虛羊無血之象離下震上豐亨王假之勿憂宜日中諸卦言亨者或雖未亨而將有亨之時豐之言亨者豐即亨之時矣蓋以明而動故能豐夫明則有以察天下之理動則有以應天下之務此其盛大而亨通為何如哉王假之勿憂冝日中言王者至此盛大之時不必以過盛為憂也蓋時雖過盛而處之有道則盛而不衰當如日中之時矣夫盛極而衰治極而亂固天道也然亦必人感之於下然後天應之於上有聖賢者能戰兢惕厲常如蹈春冰履虎尾而不敢少懈焉則無釁孽之萌動而可以引天休於永久所謂冝日中者此道也然如是者非盛德之君以明而動亦孰能之乎初九遇其配主雖旬無咎往有尚豐盛之時而九四以大臣任君事初與之同德相應乃在下之賢也故謂之遇其配主夫以大臣之賢而與在下之賢相遇合將以輔其君而成豐亨之治非竊權植黨以傾其君者故其勢雖均敵而可無咎也旬謂初與四之勢均敵也往有尚謂以初之剛正往遇於四則可嘉尚蓋賢人得位而能汲引善類與之共事則雖暗主在上亦可隨時而補益處豐之時而明動相資乃義之當然非躁進者也如初者有濟時之才而抱濟時之志夫何病焉六二豐其蔀日中見斗往得疑疾有孚發若吉二與五相應二至明而五柔暗不如初之遇四矣夫斗以昏見者今日中而見則障蔽之甚而然也二於是時不可以往往則見疑矣然既為大臣豈容不往乎唯積其誠意以感發其善心斯可也二本明者其達於事理而善説人主不假言也若又能感之以至誠則誠明合一而悟之易矣果何有不可事之君乎九三豐其沛日中見沫折其右肱無咎三居下之上而無正應如四則近於五二則應於五皆見用者也三居其間獨見疏隔以五之暗而不能任之則三雖剛明之極其如君之不察何豐其幡斾而晝見小星則其蔽暗甚矣有才而不用如人之折其右肱雖欲動作其可乎然以其剛明而不失正則其不用者乃君之暗耳此其所以無咎也九四豐其蔀日中見斗遇其夷主吉四近暗君故其障蔽之象與二同也然四既得位則當以致豐為己任初陽在下既與已同德所當援而進之故遇其夷主則吉也初稱四為配主以四在位而尊尚之也四稱初為夷主以初同德而等夷之也其皆謂之主者初主於四以進用而四主於初以圖事猶所謂謀主也初非四不能動四非初無以明其相資者如此云六五來章有慶譽吉彖辭言王假之者明君也而六五以隂居尊則暗矣五雖柔暗然離體三爻皆為章明之君子四之近於已者則固賢臣也五若能去其蔽塞明揚衆善則在下之賢可以彚而進矣夫是之謂來章也既來致章明之賢則能成豐大之治福慶在於身而稱譽著於下吉孰大焉上六豐其屋蔀其家窺其戶闃其無人三歲不覿凶豐之時盛大之時也盛大之極乃凶禍所由始矣以隂居上既逺於明而動無所之其過髙而暗塞反以自禍如人之豐大其居而反以自蔽也如上六者雖時命之使然而亦驕盈之所致歟艮下離上旅小亨旅貞吉旅者客於外也凡客於外皆謂之旅非止於商旅也如天子之蒙塵諸侯之寄寓大夫之去亂聖賢之周遊皆是也客於外而無常處乃遭時之變而然者豈為得志乎故可以小亨而不可以大亨卦之五二皆隂五附於外而二止於下此其所以為旅而其亨之小也然在旅者亦必守正則吉若其不正雖小亨亦安能乎君子在旅之時而守其正所謂素患難行乎患難者也時之所值者雖變也而豈以失吾之常哉初六旅瑣瑣斯其所取災旅而守正唯君子能之常人則顚頓而失志卑詘而詭隨無不至矣當旅之時以六居初柔弱卑下瑣瑣無稱是豈徒難免於羈旅乎其所處之失正蓋又有以自取其災矣六二旅即次懷其資得童僕貞二柔順中正乃處旅之至善者也在旅之時而即其次舍懷其資財得童僕之貞良則處之安矣然是三者皆由已以致之苟失其道雖有之亦喪也可不愼乎九三旅焚其次喪其童僕貞厲九三過剛不中其占與六二相反貞厲言貞固守此危之道也九四旅于處得其資斧我心不快四以羈旅而居人位之上處不當位九三在下而過剛不中乃強暴之人為四之害者也三見四之處於其上必思奪之而以四之才剛則有以備之矣故云得其資斧漢書引此句資作齊應劭云齊利也讀如齊衰之齊蓋資齊音同而誤也四雖有其備然在羈旅而據髙位遇剛暴能自安乎其心不快者處之不安而懼害也六五射雉一矢亡終以譽命六五中順文明而以射雉為象其處旅之時而有獲者歟射雉而亡其一矢則所得者大而所失者小也處旅有其道而得失之小勿以為意則能有獲而終以譽命矣譽者人之稱譽命者天之休命言終以譽命者始雖不幸而終則吉也上九鳥焚其巢旅人先笑後號咷喪牛于易凶以九居上剛而自髙非處旅之道矣故如鳥之焚其巢則失其次舍而不安先笑後號咷則親之者寡而無助喪牛於容易則亡其所資而不可行處旅之凶無甚於此者巽下巽上巽小亨利有攸往利見大人巽為亨之小者以隂為主也巽兊二卦皆隂為主然兊亨而巽小亨者兊柔在外用柔也巽柔在內性柔也以人言之內剛外柔不害為君子內柔外剛或難於自立且重巽之卦為巽順之甚又安能致大亨乎利有攸往者以隂從陽也夫柔順之人不能有為其於功業必因人而成者也利見大人者所從必得其正也順從於人而不擇所主則失其可親而為詭隨矣卦之二五皆以剛得中乃大人之象初從於二四從於五此利見大人也然其利有攸往利見大人亦以遂其小亨而已矣初六進退利武人之貞初六以柔居剛質柔而用剛也用剛則欲進質柔則易退進退不果安能立乎然以義言之則巽順之人必濟之以剛然後能有為故利於如武人之貞所以勉其斷也九二巽在牀下用史巫紛若吉無咎巽為木而隂在下為足牀之象也禮尊者當坐於牀而卑者坐立拜跪皆在於牀下二以剛居中不為卑矣乃巽順之甚而在於牀下誠足羞也然人之交際寧巽毋傲寧卑毋亢況如祭祀之交神者其心愈下則其誠愈至又豈不足以獲福乎用史巫紛若而吉無咎此竭誠以獲福者非諂瀆鬼神之比也九三頻巽吝以九居三本不能巽者而勉強以為之則非出於誠心矣故頻巽而頻失其所以吝乃頻失之吝非巽之吝也六四悔亡田獲三品巽而取象於田狩未詳其義九五貞吉悔亡無不利無初有終先庚三日後庚三日吉五剛健中正而處巽之時巽順之過則威斷不足而失其剛健矣此其所以有悔也然能守以貞固則吉而悔亡於事無不利矣蓋巽順者果斷之反也故勇猛剛強者戒於大暴溫良謙巽者戒於無斷今五既巽順而又能貞固則剛柔不偏而君德全矣以如是之德將何事之不可為哉無初有終者言始雖未善而其後可以善也巽主命令五居尊位乃命令之所從出也庚者事之變更也凡事之變更必審之於始而慮其所終先庚三日於未更之前而審其始也後庚三日於既更之後而慮其終也巽之義為入人於事能熟思如是則入於理者深而見於行者決巽之道然後為盡矣不然優遊牽制其多思者乃所以為纍也曷足貴乎上九巽在牀下喪其資斧貞凶二巽在牀下而吉者以其巽之得中也上巽在牀下而凶者以其巽之失中也九本剛而有斷者以其處於柔而巽之極故失其果斷而謂之喪其資斧焉夫在下而卑巽無斷則雖不足以立事而猶可以免害也若居上而如是則自喪其權無以馭下將如神龍之失水而居陸幾何而不為螻蟻之所制哉喪斧之凶為戒深矣兊下兊上兊亨利貞兊有亨之道然必利於貞不貞則不能亨或身雖亨而道則屈也大抵三女之卦聖人多戒之以貞故於離曰利亨貞巽曰利貞兊曰亨利貞三男之卦則不言貞矣震曰亨坎曰心亨艮曰艮其背而己蓋貞者在於隂柔則多不足在於陽剛則其固有也初九和兊吉和者無乖戾之意以和為説者正也以佞媚為説則非正矣九二孚兊吉悔亡二陽剛中實有其孚誠者也然當説之時與六三比近為三所説故不免於有悔二若能絶去三之私比而與九五以同德相説則其説以孚誠可以獲吉而其悔亡矣六三來兊凶隂必説於陽者也三為説之主不中不正而來説於陽此小人之説君子也所説如是則小人固凶矣而君子受其説者亦豈免乎九四商兊未寧介疾有喜四上則説於五下則説於三從五則與之同德其説為正與三則比於隂柔其説為邪四以剛而居柔剛則欲往從於五柔則不能舍乎三是商度所説而未定也然以義言之則去私比而順中正乃致亨之道也故四能守其節介而疾惡柔邪則有喜矣如大臣之絶私黨而忠其君學者之逺損友而親仁賢皆為可喜也九五孚于剝有厲五陽剛中正而有其孚誠其信于在下之三陽固為君臣相説之正也然與上六切近五若信之則隂能剝陽其害大矣故戒其信於隂之剝則有危厲也九五非信於隂者然以其位近故不可以不設戒耳上六引兊上六近於九五雖欲説之而九五剛中不受其説則與六三同類自相牽引以為説而已不言凶咎者以上有明君下有賢臣二隂相説不能害陽也凡隂之言凶者皆戒其害於陽也若不能害陽則雖凶不言以其不足言也易為君子謀不為小人謀其意如此坎下巽上渙亨王假有廟利涉大川利貞渙之為義散也然有散必有合散所當散而合所冝合乃亨之道也王假有廟言王者至於立宗廟有取於渙也宗廟之立必合人心之散而致其誠敬合祖考精神之散而致其降格是祭祀者所以合其散也利涉大川取木在水上之象以人言之則其時可以有為而其才足以有濟也夫天下禍難之合則必收人心之散以散其難之合而天下之勢既散必合之然後可以治君子之有為於時固盡乎合散之道也然處渙之時盡渙之道必利於正不以其正雖欲拯渙其將能乎初六用拯馬壯吉初六隂柔本非拯渙之才也然拯渙於始而能順從乎九二則動必有成如人之行而得壯馬冝其吉也九二渙奔其機悔亡渙散之時必置身於安地然後有以濟天下之渙九以陽剛之才由四而居二處得其中足以有為冝其心之汲汲不容於緩也故言渙奔其機機二也初隂在下為足而二橫於其上乃機之象也悔亡者以陽居隂故有悔然得其中則悔亡矣六三渙其躬無悔三與上應而上不當位九五當位而與三非應則三乃不當濟渙之任者也三既無責任而自處不中正能無悔乎若能渙去其身之惡則雖不任事亦可以無悔矣六四渙其羣元吉渙有丘匪夷所思蘇明允曰渙之六四曰渙其羣元吉夫羣者聖人之所欲渙以混一天下者也蓋六四能渙小人之私羣成天下之公道此所以元吉也是言也朱子深取之蓋六四近君之臣當濟渙之任天下之渙也常由人心之畔上而各締其私交然後王命壅而下權張六四當渙之時而下無應與是能散其私黨而專以事上者故元吉也夫私黨既散則公道行矣故其散而復聚者勢合於一如丘陵之髙所謂散其小羣以成大羣也若是者豈常人思慮之所能及哉或曰以六居四非陽剛之才也而何能若是曰大臣之善是不一槩以九居二為剛中之臣固多善矣以九居四則勢淩於君故多以上陵為戒也如六四者承九五之君乃柔順之臣也臣之柔順不專其權而唯杜絶私邪以布公道其為善亦大矣尹吉甫之稱仲山甫曰夙夜匪懈以事一人豈非渙六四之心乎九五渙汗其大號渙王居無咎人君當渙之時所冝散者莫大於號令與居積也能散其號令則萬姓因王言之大而知王心之一矣能散其居積則財散於上而民聚於下矣天下之大勢其有不合於一乎九五巽體號令之象也陽爻中實居積之象也上九渙其血去逖出無咎逖當作惕上九居渙之極乃出渙之時也故渙其血傷則血傷可以去渙其憂惕則憂惕可以出坎為血卦為加憂而上九與六三應故有血惕之象渙其血惕者言當離去隂險而不冝復入也兊下坎上節亨苦節不可貞凡節皆有亨之道也節者節人欲以存天理也如節財用節事為節言語節飲食皆是矣節而當理則可以亨節之不當斯為咎矣節之當者中正也過於中正者苦節也貞常也苦節而以為常雖欲亨亦安得而亨乎初九不出戶庭無咎節之外卦為坎乃險難之在前也初九陽剛得正去險尚逺而能不出戶庭時止則止此節之當者也無咎之道也九二不出門庭凶九二大臣之位也其與九五雖非正應然五陽所當以同德往助其出險乃人臣之節也今二以初之在下不出戶庭亦且效之是知節而不知通矣當蹇蹇之地而髙不仕之心能無凶乎二本剛中而其失至此當是位而得是占者亦盍自省矣六三不節若則嗟若無咎六三不中不正當節之時而不知止説以犯險自取災危故為不節之嗟而無所歸咎也六四安節亨安者和順而無所勉之意四以隂居隂為得其位又順承九五為得其所從故處之安裕而自然有節也節而能安其亨冝矣九五甘節吉往有尚五陽剛中正固能節者況在險中則深自修省其節必當故謂之甘節甘者苦之反也節之如是則動必有功可嘉尚矣甘節即所謂當位以節也往有尚即所謂中正以通也盡節之道其唯九五乎上六苦節貞凶悔亡上居節極又為險極故其節之過而至於苦所謂苦者為人之所難為不度時勢而過乎中正者也貞固守此以為常行能無凶乎然以義言之則節之過者終賢於不及故亦可以亡其悔也兊下巽上中孚豚魚吉利涉大川利貞卦之為中孚者以全體言之則中虛二體言之則中實中虛者以無欲而信中實者以實理而信又下説以應上則心誠愛其君上巽以順下則心誠愛其民皆孚信之意也豚魚者中二隂之象豚躁魚冥皆無知之物至難感者也人之孚信能感於豚魚則天地之大人心之微果何幽之不通而何逺之不達乎利涉大川者木在澤上則乘木之象也外實內虛則舟虛之象也以卦爻觀之二五皆陽剛得中以同德相信君臣如此唯無往則已往則無不濟矣然所以為信者必利於正苟為不正則尾生白公亦謂之信也而可以感物乎可以有為乎信而能正則事皆天理所謂誠者天之道也非聖人其孰能與於此初九虞吉有他不燕初九與六四為應四近於君而柔順不盈乃可信者也為初者當虞度其可信而信之則吉矣若舍其正應又有他志則為失其所從而不得安矣蓋六四柔爻則疑於非賢而初九陽剛或難於自屈故勉之以從四則吉而戒其他從則凶也九二鳴鶴在隂其子和之我有好爵吾與爾靡之物之相愛者無如母子之同心而人之所慕者無如王爵之可貴中孚之二以實感乎五而五亦以實應乎二其至誠之感通為何如哉然天下之理有感然後有應故以二為鶴而以五為子以感之者二也二能感之而不能必其應五能應之而所應復為感夫好爵者二豈有求於五哉蓋積誠以感君則在於二而隆爵以待賢是在於五五之應二者亦以誠而已矣而好爵者特誠意之發見也非恃此以致賢者也二以誠感而五以誠應則其君臣之合蓋有非常情之所及者矣卦爻中虛無所間隔誠之相通尤可見也六三得敵或鼓或罷或泣或歌信由中出者也三與上應皆過中失正則非以誠相與矣故不言孚而謂之得敵或鼓或罷動止無常也或泣或歌哀樂無常也如是者雖不言凶而凶可知矣六四月幾望馬匹亡無咎五中孚之主能有孚以接下四柔順之臣能謙抑以事上是亦以誠而相比者也月幾望者言不至於盈滿也馬匹亡者言不結強援以陵上也夫大臣位近於君寵祿過盛苟盈滿而不戒必至於傾覆結黨以固位必至於上陵六四以柔居柔又在巽體是巽順之至也故其事君也深自貶損如月之幾望不盈滿而亢陽又能絶去初陽之應如亡其馬匹焉蓋馬者人恃之以行若自亡其馬則不復前進矣四能如是冝為君之所信矣又何咎乎九五有孚攣如無咎五以孚誠得下之心如拘攣之固而不可解此孚之至也彖辭所言者九五盡之矣上九翰音登于天貞凶上九處中孚之極是以信而有聲聞者也然君子貞而不諒道苟合於中正雖不期於信而未嘗不信也若過中失正而拘拘焉固守其小信則信非其信矣如上九之不中正而以有信聞其有信之名而無信之實者乎雞曰翰音巽之象也上為天位之上是雞之音登聞於天也雞不能飛而音聞於天聲聞之過情亦甚矣貞固守此安得而不凶乎艮下震上小過亨利貞可小事不可大事飛鳥遺之音不冝上冝下大吉卦四隂二陽隂多於陽小者過也又二陽雖少而在內四隂雖多而在外則隂過於陽者乃小過而非大過也此二者皆小過之義也隂雖過陽然陽在於內隂皆順之故可以亨然以隂過陽必利於正不正則不能亨也隂之正者以順為正也二五皆隂故但可小事三四皆不中正故不可大事大事者非陽剛得位則不能也卦有飛鳥之象故言飛鳥遺之音二陽內實鳥之身也四隂外虛鳥之翼也鳥遺之音者鳥飛太速音尚在而身已去也鳥飛而冝下言髙翔而去速則凶下集而知止則吉蓋以隂過於陽非大有為之時也初六飛鳥以凶初六隂柔在下而上應九四不量其力以小而圖大不知其止欲上而不下其凶冝矣六二過其祖遇其妣不及其君遇其臣無咎四五皆上體而四陽為祖五隂為妣五尊位為君四近君為臣二與五相應者然當過之時而過四之陽遇五之隂則是過祖而遇妣非隂順於陽之道矣若反而與四相遇則不及五之君而遇於四之臣是隂順於陽乃其正道此其所以無咎也九三弗過防之從或戕之凶小過之時陽為隂所過而九三以陽剛不中下防二隂而不使之過則必為二隂所戕矣弗過者阻隂之過也防之者欲防間乎隂也隂多於陽必過陽矣陽欲防之雖中正有不免於害而況於過剛不中乎九四無咎弗過遇之往厲必戒勿用永貞九四以陽居隂不極其剛又逺於下之二隂而不為所害故無咎二陽相比而四為重剛則下之二隂不能過之矣故又云弗過然下之二隂雖不能過陽而上之二隂乃復相遇故又云遇之往厲必戒者四臣位而九陽剛五君位而六隂柔以陽剛之臣而逼柔弱之君往則危矣故必當戒也勿用永貞言當用柔順之道不可長守其剛貞也六五密雲不雨自我西郊公弋取彼在穴六五雖在尊位而當隂過之時上而不下故不能下從二陽相與成事如雲之已密而其勢上進隂雖先倡而陽不肯和是隂陽之不和也亦安能成雨乎在穴者隂物也六五既不順二陽則其進也唯與上六相比耳兩隂相比雖欲有為豈能大乎上六弗遇過之飛鳥離之凶是謂災眚隂過之時而居於上則其進太鋭故不遇於陽而已過之如飛鳥之速而離去之逺豈非凶乎言凶而又曰災眚者所以見凶禍之甚皆其自取也離下坎上既濟亨小利貞初吉終亂亨小當作小亨卦之為既濟者火在於下而能炎上水在於上而能潤下是水火相交而各得其用也又卦凡三隂三陽各居其位而相應是六爻之位各得其正也此二者皆既濟之義其為小亨者既濟之時亨之大者已過矣而小事尚可以亨也利貞者卦之剛柔皆得其正而占者亦必利於得正也初吉終亂者離為內卦而柔麗乎中為文明之時是初吉也坎為外卦而陽之道窮為險難之際是終亂也既濟之時與泰豐二卦相類皆盛極而將衰之時也初九曳其輪濡其尾無咎坎為輪在離體之前坎為水離與之相近初以陽剛在下上應六四而見險能止如人之欲行乃倒曳其輪而不進狐之欲濟見濡其尾而即止其謹戒如是可無咎矣六二婦喪其茀勿逐七日得二柔順之臣也故以婦言之夫以文明中正之德上順陽剛中正之君冝可以有為者然既濟之時五之志得意滿不復下求賢才以盡其用故二之不行如婦人欲出而喪其車之茀則無以障蔽而不可行矣然隂性柔順若枉道以徇於上則非也唯守其中正而不為隨逐則時久而變道自行矣九三髙宗伐鬼方三年克之小人勿用離為甲胄為戈兵而以九居三又過於剛者故為髙宗伐鬼方之象鬼方逺國也既濟之時中國安泰則人君之所事者唯在於治四塞通異域而已昔商髙宗之中興亦既濟之時意其嘗伐鬼方之國故爻以為言也三年克之言久而力憊也小人勿用言不可以小人用事也人君恃其強盛而勤於逺略非義舉矣而又勞民之久委任小人豈不甚矣乎為是事而得是占亦可以戒矣六四繻有衣袽終日戒繻當作濡四坎體故取漏舟之象夫既濟之時治安之久苟怠而不戒則罅漏必生四以柔居柔故能終日戒懼而豫備不虞如坐漏舟之中而能用弊敗之衣以塞其罅漏如四者又安有覆溺之患哉九五東鄰殺牛不如西鄰之禴祭實受其福時之既濟所當戒者盈滿也故殺牛盛祭也而反不蒙福以時之既過而滿招損也禴祭薄物也而乃實受其福以時之方來而謙受益也自人言之東鄰殺牛其妹邦之商紂乎西鄰禴祭其岐豐之文王乎紂當時之既濟雖使其謙損如文王猶懼其福之或艾也而況有貫盈之罪哉酒誥曰越殷國滅無罹弗惟德馨香祀登聞于天殺牛之不如禴祀豈非以其德馨之不足乎上六濡其首厲既濟之極以隂居上在於險體而溺於淫樂如狐之涉而濡其首安得而不危乎坎下離上未濟亨小狐汔濟濡其尾無攸利卦之為未濟者以水火不相交而六爻皆失正也然雖未濟而有亨之道惟遇其時而得其人則可以亨矣卦之六五有柔中之德而下應九二為剛中之才上以文明而知人下以出險為已任則其未濟者安有不濟哉小狐汔濟者勇於濟也狐之老者多疑而善聽則不輕涉以陷於險若小狐之勇於濟者不度其時不量其才故至於濡尾而無所利矣以人言之則必有老成之德然後可以濟天下之難若少年不經事者則昧於時勢進鋭退速其身且不保矣而何以濟天下乎初六濡其尾吝彖辭言小狐汔濟者初六是也濡尾之吝其能免乎九二曳其輪貞吉九二應文明之君當濟險之任而能安重審愼不輕犯險如人之欲行而倒曳其輪必需時而後進則得其正而吉矣蓋未濟者時未可以濟也九二以剛居柔易以知險乃識時之俊傑此其所以終吉也彼小狐之濡尾者豈知此邪六三未濟征凶利涉大川以隂柔而不中正當未濟之時有征行之志乃凶道也但涉川出險以免其身之難則為利耳此爻之占蓋可以免難而不可以有為也九四貞吉悔亡震用伐鬼方三年有賞于大國未濟九四即既濟九三之反故皆以鬼方言之然既濟九三之伐乃既濟之時其兵貪兵也故三年則憊而又有用小人之戒未濟九四之伐乃未濟之時其兵義兵也故三年則有賞而其事得貞則為吉蓋其得失既殊而吉凶亦異矣六五貞吉無悔君子之光有孚吉五當未濟之時而有險在下不可不愼也故戒之以貞則吉而無悔然為文明之主故有君子之光而其中德之盛可知也德既光矣則又必有孚然後可以濟若無其孚誠則在下之賢臣不免於解體矣又安能濟乎六能有其光而又有其孚其自明而誠之謂歟上九有孚于飲酒無咎濡其首有孚失是上九以無位之爻當未濟之時唯信於自樂可也若信於有為不可也故有孚于飲酒則為樂天知命而可以無咎若如狐之汔濟而濡其首則其自信者失其當然矣蓋濟天下者必剛中之才而為君所任然後可濟也若上九者體剛用柔不在其位而欲輕身以犯難於出處之道豈為得乎周易參義卷二
