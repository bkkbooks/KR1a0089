body:
  text: 周易參義卷九元梁寅撰文言傳元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也天之四德無非善也而元者生物之始則豈非衆善之長乎四德無不嘉美也而亨者生物之通則豈非衆美之所㑹乎四德無非義也而利者生物之遂則豈非義有自然之利而極其和者乎四德無非造化之事也而貞者生物之成又豈非衆事之所賴而立者乎此四者皆天德之自然也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事人之仁義禮智即天之元亨利貞也夫孰無仁也而唯君子能以仁為體而天下之疴癢疾痛舉切於其身則夫尊爵者吾有也生物者吾心也而於長人之道何不足之有亦孰無禮也而唯君子能嘉其所㑹而嚴敬以行之備物以飾之則夫禮儀三百威儀三千無一之不美而於禮也何不合之有義亦孰無也而君子則獨能利於物而理財正辭禁民為非使夫有生者無不各止其所各遂其性而於義也何不和之有知亦孰無也而君子則獨能貞正而堅固故周乎萬物而旁行不流則所以成天下之務如木之幹而枝葉附焉是其於事也又何不立之有此四者皆人事之當然也君子行此四德者故曰乾元亨利貞以君子之至健而行此四德則既全體乎乾道而又能不息焉所謂人而天者也此曰乾元亨利貞者其即君子之元亨利貞歟初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也如初九之所云蓋君子之有龍德而潛隱者也其介如石不變於世俗深藏若虛不成乎名譽惟不變於世俗故雖逃遁於世而無悶焉惟不成乎名譽故雖衆人見非而亦無悶焉道合於時而心之所樂則時行而行非奔競也道與時違而心懷其憂則時止而止非潔身也其行其止卷舒有道確然自樹不可移拔豈非潛龍之德乎九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也九二者有龍德而正當隱顯之中者也此正中非以中正之德言者若以德言之則自初之潛至五之飛皆聖人隨時而中正者也豈獨九二哉朱子以正中為不潛未躍之時其意可見矣常言亦信常行亦謹所謂動容周旋中禮盛德之至也既處無過之地矣然猶曰間邪存其誠則無射亦保之意也聖賢之心兢兢業業者蓋如此乎不見有餘之在已故善著於世而不自矜伐正已而物正故德之所施者博而下民無不化若是者雖未處君位而豈非君德乎九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣君子之進德修業即終日乾乾之工夫也忠信者誠之於心使為善之念無少懈怠所以進其德也修辭以立誠者誠之於言使言之與行不相背馳所以居其業也進德者進而不己之意居業者守而不去之意也知至至之為進德之事知終終之為居業之事蓋知至者見其所當至而至之者心至於其處故云可與幾幾者先知其精微之辨也知終者見其至之極而終之者行至於其極故云可與存義存義者凡義理皆存而不失也君子之乾乾者如此則無所處而不善居於上位則樂善忘勢而不驕在於下位則樂天知命而不憂其無咎宜矣九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九四處不中正而或躍或處疑於失其道也故夫子特明之曰其上下無常者非為邪枉也進退無恆者非離羣類也蓋君子於九三之時終日乾乾而進德修業學已至矣至於此則亦欲及時而進為故無咎也然其欲進為亦進退隨時而不必於進也所謂用舍無與於已而行藏安於所遇者其唯九四乎九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也本乎天者如日月星辰以其行度之同而親於上本乎地者如蟲獸草木以其形氣之同而親於下上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也五居尊位而上復處其上故雖貴而無位雖髙而無民當之者如天子父天子師皆是也以此爻言之則九五得天位行天道乃天下所利見而上九在其外衆不歸之故在下之賢人雖多而無有為之輔者其如末世之君當天命已去之時乎潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則此二節皆申明六爻之義猶象傳也乾元者始而亨者也此申明元亨之義見元之與亨非為二道既有其始則必至於亨乃理勢之自然而有不容於己者矣利貞者性情也此明利貞之義四德無非性情也然始而亨之時乃造化之性情至於利貞之時則一物各具一性情矣觀萬物之性情不觀之於誠之通而觀之於誠之復以其收斂歸藏而有以見生生之實也復見天地之心於其動而見利貞者萬物之性情於其靜而見非知道者孰能識之乾始能以美利利天下不言所利大矣哉乾知大始而萬物資焉是以美利利天下也然利在於物物自以為利耳天何言哉其不言所利而萬物無不利此其利之所以大也莊周曰天地有大美而不言信矣哉大哉乾乎剛健中正純粹精也聖人贊乾之大不一而足也其曰大哉乾元以其為天地之大始也又曰不言所利大矣哉以其有生物之大功也此又曰大哉乾乎蓋又以其為天之全德也然前以元亨利貞為天德則其流行之始終可見也此以剛健中正為天德則其全體之本然可見也乾之大者以其剛健中正而已是故發育無間者其剛也運行不息者其健也行之無過不及者其中也立之無所偏倚者其正也觀此四者乾之德亦備矣然使其雜焉而未精猶不足以見其大也故必純而不雜於隂柔粹而不雜於邪惡然後見剛健中正之至極而純粹也又以精言之則精也者又純粹之至極也天德之大豈不於是而見之乎六爻發揮旁通情也乾德之大唯易能該之故六爻之發揮乾德者有以曲盡其情也時乘六龍以御天也雲行雨施天下平也易於天道備矣而聖人體天道以治天下非取諸易乎故乾之六龍者潛見飛躍各以其時而聖人之進退亦必隨時而不過是聖人之出乃乘此六龍以當天之運也然不曰當天而曰御天以見其進退遲速之在我耳夫天之生物也雲行雨施而萬物遂其性聖人之平天下則覆幬以至仁霑濡以大利亦無一民之失所焉聖人之功用豈異於天乎君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也為行之行去聲君子以成德為行所謂行者在身之行也日可見之行則謂行其道以成其事業也君子之德既成則其行本於德如形之有影如木之有枝自有不容於掩矣然其道可以行而其時未得以行故未免隨時而潛也潛之為言身則隱處而未見道則欲行而未成是以其占謂之勿用言君子於是時未可以有為也君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也前於九三言學而此於九二言之者以見乾之六爻皆聖人非有淺深之異其稱君子而言學者聖人之心未嘗自聖而亦未嘗不學也學以聚之理之㑹也問以辨之理之通也此二句皆致知之事寬以居之德之𢎞也仁以行之德之毅也此二句皆力行之事致知而㑹通力行而𢎞毅大人之學備矣九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎此二節言重剛者重乾也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎況於鬼神乎天地日月四時鬼神皆形氣也而其為德為明為序為吉凶則所謂道也大人之與合者亦合其道耳既與造化之道合則凡所舉動或先於天而天不能違以吾之心即天之心也或後於天而奉天時以天之心即吾之心也先天而天弗違者如禮雖先王未之有而可以義起之類蓋天所未為而人為之苟其當然即天之所欲為也後天而奉天時者如天叙有典天秩有禮之類蓋天理之自然而人必奉行之固不敢有違於天也大人與天為一而天自不違矣彼人與鬼神烏能違之哉亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎乾諸爻皆聖人也而上九獨非聖人乎蓋善處而不至於悔則聖人也若終亢而致窮則下愚而已坤至柔而動也剛至靜而德方坤之體雖柔而動則剛體雖至靜而用則有方剛謂應乾不違乾行而坤亦行未嘗有息也方謂生物有常如飛潛動植之各以其類也後得主而有常主下脫利字居後有得而所主者利此坤之常道也含萬物而化光即含𢎞光大品物咸亨之意坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也坤之直者以其正之主乎內也坤之方者以其義之形於外也君子體坤之道於是主敬以直乎內守義以方其外直者直上直下之意言無一毫之私曲也方者截然方整之意言事之一定而不易也敬義二者並立不廢則體用相涵表裏交正其德盛大而不孤矣若有敬而無義則無以揆其外而敬或非其敬有義而無敬則無以主乎內而義或非其義皆所謂孤也敬義立而德不孤則盡坤之道不待學習而自無不利其所行者將沛然其莫之遏矣而焉有疑乎隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃周易參義卷九
