body:
  text: 周易參義卷四元梁寅撰彖下傳咸感也咸之義皆也而謂之感者兩物對待則自然相感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也兌柔在上艮剛在下而交相感應又艮止為感之專兌說為應之至又艮以少男而下於兌之少女此三者皆交感之道也柔上剛下感應相與釋亨也物必相感應然後能亨也止而說釋利貞也艮止而非私媚則為感之正兌說而非勉強則為應之正又凡以止而說則其說不過皆得其正者也男下女釋取女吉也男先於女而女順從之乃倡隨之常道故吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣論感通之義而又推極言之也觀之天地則天氣下降地氣上騰而天地相感應二氣交感而化生萬物則天地又與萬物相感應聖人猶天地也故能以一人之心感天下之心而天下之心又莫不應之者是則天下之和平由聖人有以感之也然情者性之動也天下之理動而後感感而後應則感之與應皆屬乎動也故又曰觀其所感而天地萬物之情可見矣其不言聖人之情者葢聖人之情即天地之情萬民之情即萬物之情故但言天地萬物而人之情者可以包之也恒久也剛上而柔下雷風相與巽而動剛柔皆應恒震上巽下陽大隂小得其常分也雷震風發交助其勢能常相與也内順外動能順理而動乃常行之道也一卦六爻剛柔皆相應乃隂陽相求之常也此四者皆理之常故卦名曰恒恒亨无咎利貞乆於其道也天地之道恒久而不己也恒固可亨而无咎矣然必得其正然後為乆於其道若不得正則雖曰能乆而乆非其道矣世之人固有遂非自用而不變者然乆非其道亦何以亨而无咎哉觀之天地其恒乆而不已者亦曰乆於其道爾天地之乆於其道則其正可知也利有攸往終則有始也凡事終必有始静必有動非終无以始非静无以動故必先乆於其道而後利有所往乆於其道終也静而常也利有攸往始也動而變也日月得天而能乆照四時變化而能乆成聖人乆於其道而天下化成觀其所恒而天地萬物之情可見矣此推言乆於其道之意也日月之麗天者以其常而得正故能乆照乎下土四時隂陽之變化者以其常而得正故能乆成乎萬物聖人之體道者亦以其常而得正故天下化之而有以成其治觀其恒乆於道者如此則天地之情可見矣而聖人之情又豈異乎哉遯亨遯而亨也剛當位而應與時行也小利貞浸而長也時雖當遯然五以陽剛當位而二與之應尚可隨時消息故云與時行也小利貞者言尚可以小而正之所以然者以隂之浸長而尚未盛也遯之時義大矣哉處遯之時而合遯之義者在下位則身退而道亨為大臣則隨時而匡救其或進或退各盡其道非時中而㡬於聖者不能也故贊之曰大矣哉言處之難也大壯大者壯也剛以動故壯隂小陽大而四陽過盛是大者壯也以剛而動者其所以壯也在人則為君子盛長之時而其所以盛長者以其動皆天徳也若其非徳而動則時雖大壯而其行非壯矣大壯利貞大者正也正大而天地之情可見矣其曰大者正也言陽之大者以其正也能正且大則可以合乎造化矣故曰正大而天地之情可見矣言天地之所以大者亦不過乎正大也大壯之大以陽言而正大以理言大壯者大之名也正大者乃其所以大也以君子而比之小人則固為大矣然君子之所以大者以其心之正大也若其心不免於私邪而狹小則亦小人矣其何以得大之名乎晉進也晉有二義進也明也傳獨以進言盖能進則明盛可知矣明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也卦上離下坤乃日出地上之象也坤為順離為麗為明是以順徳之臣而附於大明之君也卦自觀而變六四之柔進而上行以至於五是以柔順進而居君位也卦有此三者故為錫馬三接之象夫有功之諸侯孰不欲承乎天寵者然使在上者非大明之君則屯膏吝賞安能有路車乘黄之錫予乎使在上者非柔順之徳則剛愎少恩又安能有嘉賓式燕之禮意乎今以康民安國之侯而遇大明柔順之君則其錫予之厚接見之勤固有非常情之所及矣明入地中明夷内文明而外柔順以蒙大難文王以之卦徳内文明外柔順君子當明夷之時而能如是則雖近傷地而可无傷矣然非大徳之人不能也故曰文王以之文王有緝熈之敬非文明於内乎有天下三分之二而服事商非柔順於外乎其羑里之拘囚也又豈非所謂蒙大難者乎其難雖大而卒以自免非幸而免也以其内文明而外柔順耳利艱貞晦其明也内難而能正其志箕子以之明夷以上六為暗主則六五者近暗主之臣也箕子近於暗君者故六五爻辭言箕子之明夷而彖傳亦以箕子之事釋卦辭利艱貞而言晦其明者盖迫近暗君而易於見傷故不可以明自矜耀也箕子為紂近親而見囚所謂内難也然紂既殺比干箕子知其不可諫而不復諫又佯狂以免其患而不與之同惡此非能正其志者乎盖晦其明者謂外晦而内明也必能正其志而後謂之晦其明若不能正其志則一於晦而无復明矣象傳曰君子以莅衆用晦而明亦此意也家人女正位乎内男正位乎外男女正天地之大義也卦之九五居外而中正男正位乎外也六二居内而中正女正位乎内也然先言女正者順卦辭而釋之盖欲正家者必由内始也男女之各正則合天地之大義矣天陽位乎上地隂位乎下而男女之正位有似焉天地一男女也男女一天地也家人有嚴君焉父母之謂也嚴君者所尊嚴之君長也母本慈也而亦謂之嚴者盖不嚴則不足以正乎内也九五剛而中正有父之道六二柔而中正有母之道故特發其義父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣卦畫上居上為父初居下為子五三陽為夫四二隂為婦五居上之次為兄三居五之次為弟前以九五為父者以隂陽之正位言之也此以上九為父者以卦畫之上下言之也父子兄弟夫婦各得其道則家道正矣至於國之所以治天下之所以平則皆舉此而措之非有異道也故曰正家而天下定矣睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉以卦徳言則說而麗乎明也以卦變言則自離自中孚自家人皆柔進而上行也以卦體言則六五應九二是得中而應乎剛也然卦有此三者而止於小事吉何也盖睽乖之時天下之事有難為者必剛中之君任剛中之臣然後志同道合而有以回既乖之事勢合既散之人心今六五雖得中而隂柔不正當睽之時君臣疑阻亦安能大有為乎天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉天下之理有睽必有合故又推極言之以明睽之可合也睽之可合者以物理之本同也天髙地下其體睽矣而交感化生其事有不同乎男陽女隂其體睽矣而相說相求其志有不通乎生物萬殊其體睽矣而真精妙合其事有不類乎盖睽者其體也合者其用也人能合其睽則有以盡其用矣故又贊之曰睽之時用大矣哉言處睽之時盡睽之用其事至大也蹇難也險在前也見險而能止知矣哉卦徳外險内止是險在於前而能止也見險而能止明於處險之道矣故贊之曰知矣哉蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣哉曰往得中者盖坎中爻變則為坤而五居尊位為坤之主是往而得中也又卦自小過而變陽進而居五亦為往而得中也曰其道窮者西南平易則其道可亨東北險阻則其道自窮也曰往有功者濟天下之險非聖賢不能而九五剛健中正有大人之徳故其往則必有功也往謂進而有為也曰當位貞吉以正邦者卦自二以上五爻皆當正位則是得其正而可吉故可以正其邦國也初六以隂居陽雖不當位然處於卑下亦隂之正也其贊之曰蹇之時用大矣哉盖當蹇之時而盡乎濟蹇之道其用為至大也解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也曰往得衆者西南坤方而平易人之處解者能安静不煩擾則衆心之所歸也又卦變自升而來三往居四入於坤體坤為衆是亦得衆也曰乃得中者九二剛而得中故能來復其所也曰往有功者言如九二之才若難之未解則可以進為而有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣哉損損下益上其道上行卦為損者以其損下卦之陽而益上卦之隂也以為其道上行者非謂得其道也盖當此之時上益則下損上得則下䘮其道但利於上而不利於下也損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行損而有其孚信則元吉以下四者皆其效也有孚謂當損則必損不當損則不損是乃損過以就中非損下以益上者也二簋之用有時者言損益當隨其時也夫損末而存本損文而存實固美意也然文飾未過而損之與損之至於過甚則質勝而野矣儉而不中於禮矣故曰二簋應有時言二簋之用亦應有其時不專以儉薄為美也天下之理剛者常過而柔常不及凡損過益不及者皆損剛以益柔也然時之當過則過亦未害時當不及則不及亦未害故損剛益柔者行之當有時也聖人之於事或損或益或盈或虚亦順時而已順時而損益所謂損而有孚也益損上益下民說无疆自上下下其道大光損上卦之陽益下卦之隂自上卦而下於下卦之下此所以為益也人君能損上以益下則民說之无窮矣又能自上而謙恭以下下其道豈不大顯乎利有攸往中正有慶利涉大川木道乃行曰中正有慶者卦之九五六二皆行中正君臣同徳以益天下則固其身之福慶而亦天下之福慶也曰木道乃行者震東方屬木巽之象亦為木當涉川之時而獲舟楫之用則利於涉而木之道行矣益動而巽日進无疆天施地生其益无方凡益之道與時偕行此極言益道之大也卦之徳内動外巽是動而巽順於理也動而順於理則其益日進於廣大而无有疆限矣觀天地之益萬物則天道資始地道資生而其益之大无有方所此天地之動而巽也觀聖人之益天下則當益而益順時而行而其益之大同乎天地此聖人之動而巽也夬決也剛決柔也健而說決而和卦之徳内健而外說健決而說和此其所以能決也為君子者无其剛健固不可然徒剛而不和則善類不應人心不附亦安能決乎揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也曰柔乘五剛者小人之罪莫大於以邪而陵正一柔而乘五剛此其罪之大者也為君子者以是聲言之則善惡著明而人心說服矣曰其危乃光者盖必盡誠以呼其衆危厲以戒其事然後可以去朝廷之闇濁而致公道之昭明也曰所尚乃窮者盖欲正人之罪必先於自治若不能自反則己且有瑕矣而何以治人乎是則尚徳義者其道固不窮而專尚威武者不免於窮也曰剛長乃終者言一變則為純乾也盖君子之進必无一人之不用然後事功成小人之退必无一人之不去然後患害息故當此之時五剛雖盛而猶必益進其朋類然後除惡之事終也若君子未盡用小人未盡去則正不勝邪而邪復傾正者有之矣又安得謂之善終其事乎姤遇也柔遇剛也勿用取女不可與長也曰不可與長者言取如是之女則其淫姣悍戾将惟家之索矣其可與之長乆乎天地相遇品物咸章也以一隂而遇五陽不可言也故又别取義而言天地之遇焉一隂始生而與陽相遇固天地相遇之義又上乾陽為天下巽隂為地亦天地相遇也天地相遇則二氣交感而萬物化生故言品物咸章也章明也言萬物之生洪纎髙下莫不自形自色而粲然可見也剛遇中正天下大行也又言君臣之遇也卦之五二皆以陽爻而得中位是各以剛陽而遇乎中正也然五又遇乎二二又遇乎五君得剛中之臣臣遇中正之君此又君臣之交相遇也君臣之所遇與其交相遇者如此則其道可以大行於天下矣姤之時義大矣哉贊姤之時與義皆甚大也遇以其時而合於義則功化興焉遇不以時而不合於義則乖戾生焉天地聖人之道无不然也以此推之相遇之道可不謹乎萃聚也順以說剛中而應故聚也卦徳為能順以說卦體九五剛中而二應之皆所以為萃也以人事言之能順於義理而說服人心又處以剛中而得其應助則其所萃可知矣王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也王者之至於有廟所以致其孝享也致者極致之義祭必極其誠敬然後鬼神享之也利見大人而亨者以大徳之人能聚以正也盖聚必以正然後可亨聚不以正則人心之聚者違道干譽爾貨財之聚者剥下奉上爾如是安得而亨乎用大牲吉利有攸往皆所以順乎天命也夫天命者天理之當然而己時當交物以厚則厚為順理而儉為不順理時當進以有為則進為當理而不進為失其理謂之順天命豈容私於其間哉亦盡其理而已矣觀其所聚而天地萬物之情可見矣當萃之時而盡萃之道皆天理也故觀人之所萃則天地萬物之情可見矣天地之發育氣之萃也萬物之化生形之萃也其所萃如是乃其情理之可見者也柔以時升坤本在於下者然巽既體卑而居下坤乃順時而上升此柔以時升也又卦自解而變六三之柔上居於四亦柔以時升也巽而順剛中而應是以大亨卦徳内巽而外順卦體九二剛中而五應之此所以大亨也自人言之能内順於義理而接物亦以順又有剛中之徳而獲乎上安往而不亨乎用見大人勿恤有慶也南征吉志行也卦之五二皆大人也九二用見六五六五亦用見九二二見五則升於位而其道行五見二則升於徳而天下治既見大人則不憂其不升矣故臣得行其道則臣之福慶也君得成其徳則君之福慶也君臣道合化行天下天下之福慶也南征吉而志行者得遂其升則其志可以行於時也困剛揜也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也人之處險而能說是雖困而不失其亨也或曰傳文當從所字絶句亨字乃卦辭當自為一句言能處險而說則雖當困時而不失其所故可亨也曰以剛中者盖欲吉无咎非得正則不能而得正者又必剛中之大人也卦之二五皆剛中之大人也曰尚口乃窮者兊之徳為說而其象為口當困之時而接物以媚說又爭之以口舌乃取窮之道也巽乎水而上水井井養而不窮也以巽木入坎水之下而上出其水有井之象焉故卦之名曰井而其曰井養而不窮者言井之及物其用不窮此則井之義也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也改邑不改井言邑可改而井不可改也釋改邑不改井无喪无得往來井井而曰乃以剛中者言如九五之剛中乃能安於常而不改也能安於常則汲之而不竭存之而不盈往來者皆得其用矣汔至亦未繘井言汲井将至而未及於用則與未繘井同也未繘井言未垂綆於井也井以及物為功今汲而未用同於未繘是未有功也羸其瓶而曰凶者盖汔至亦未繘井但利澤尚未及於物爾非有凶禍也至於敗其瓶則非但无功而凶亦甚矣詳味彖辭及傳文兩未字則汔至亦未繘井者非凶但羸其瓶者為凶也朱子以亦未繘井羸其缾為一句故謂未有功者亦凶此又一義也革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡夫有所變革必已日乃孚者言變革之初雖云至當人亦未信必丁寜反覆以曉告之然後人信也文明以說為大亨以正者盖人心之說順則可以大亨而文明以燭理則能得其正也以革而當為悔亡者惟革之不當故有悔若革而當則其悔亡矣天地革而四時成湯武革命順乎天而應乎人革之時大矣哉又極言革道而贊其大也觀之天地則隂陽迭運推遷改易然後四時成觀之聖人則順天應人撥亂反正然後天下定以是言之革之時豈不大哉時當革而不革不可也時不當革而革之亦不可也故曰變通者趣時者也苟徒知變通而不知趣時豈為善於革乎鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢卦下隂為足二三四陽為腹五隂為耳上陽為鉉乃鼎之象也下木上火以木巽順於火所以亨飪乃鼎之用也卦有鼎之象又有鼎之用故名鼎享上帝養聖賢又推鼎之用而極言之也巽而耳目聦明柔進而上行得中而應乎剛是以元亨卦下巽為巽順於理上離為目而五為耳乃耳目聦明之象又卦自巽而變柔進而居五又凡離在上者皆云柔進而上行盖柔本在下者乃居尊位是進而上行也又卦體六五得中而下應九二是能用乎剛陽也卦有此三者所以元亨也震亨震之義為動為恐懼為有主動則能進而有為恐懼則能自修省有主則能保其大若此者皆亨之道也震來虩虩恐致福也笑言啞啞後有則也當震驚之來而能恐懼修省可以致福慶矣故曰恐致福也笑言啞啞者人乍喜而恐懼未平之意也其曰後有則者言由其先能恐懼故後能自處有法也大抵人當震驚之時而不知恐懼則必至撓亂失常而致咎惟能自恐懼然後能安於常度而致福也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也程子朱子皆云邇也之下脫不喪匕鬯一句然𫝊釋卦爻之辭多或舉上句而兼釋下句竊疑此亦但舉震驚百里一句而所謂驚逺懼邇者乃兼不喪匕鬯而釋之也盖震驚百里者驚逺也不喪匕鬯者懼邇也若有國者當震驚之時雖其禍之尚逺而能心懐畏懼視之已如近灾焉則可以不失其所守矣故傳既釋卦辭又推言主器之義曰出可以守宗廟社稷以為祭主也言慎守如是則可以繼世而主祭矣艮止也時止則止時行則行動静不失其時其道光明艮止與行止之止小不同艮止之止乃止於義理也行止之止乃止而不行也時止則止静而止於義理也時行則行動而止於義理也人之止於義理唯其時也當静而誘於外物失静之時矣當動而思慮昬亂失動之時矣唯動静皆不失其時然後本心瑩然隨事燭理而其道可以光明也艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也止之所以取義者以卦體言之内外之卦隂陽敵應而不相與也不相與謂兩卦各止其所而不相顧也人之不顧其私則内不見已外不見人動静之間惟理是視而自无過咎矣漸之進也女歸吉也進得位往有功也進以正可以正邦也釋利貞之義也卦自二至五隂陽各得正位此所以進而有功也進得位以位言進以正以道言得位之正而不以正道則國不可治能以正道而不得正位則功不可成位也者成功之基也道也者正人之本也其位剛得中也上言進得位以自二至五四爻言之也此又言其位剛得中以九五言之也九五以剛陽居中正則正位正道皆得矣人君立天下之正位行天下之正道以倡率其臣下則凡羣下之進者又莫不各得正位而行正道信能如是則功有不成乎邦有不正乎然則正邦而有功雖由於諸爻之正而九五之中正者其所係尤重歟止而巽動不窮也以卦徳言漸進之義也卦之徳内艮止為安静之象外巽順為和順之義人之進也内不能安静則必有貪欲之心外不能和順則必有冒犯之戾此二者皆躁進而自取困窮者也君子之進必以漸其中安静而其外和順此其行之所以无不達也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也此言婚姻之常道以釋卦之名義也男女之配合如隂陽之交感故曰歸妹者天地之大義也言人之道即天之道也天地之氣不交則无以致萬物之興昬姻之理不行則无以垂萬世之嗣故歸妹者乃人之終始也所謂終始者盖有夫婦然後有男女有男女然後有父子前者既終則後者復始以卑承尊以少繼老生生相續无有窮已也說以動所歸妹也前釋卦名義既以㛰姻之正者言之矣然卦辭言征凶无攸利則歸妹乃不正之卦故傳又曰說以動所歸妹也言其以說而動者盖以其所歸者少女也以少女而從長男故非正也征凶位不當也无攸利柔乘剛也卦爻自二至五皆不得正是位不當也二五皆以柔居剛上是以柔乘剛也以婦人之義言之待媒妁之言者正也若越禮淫奔則非正矣其能不凶乎婦順其夫者道也若庸奴其夫則非道矣其又何利乎豐大也明以動故豐豐者盛大之義也卦之徳内明外動以明而動此其所以盛大也自人言之則明者明其理動者措諸事明動相資而徳業成矣王假之尚大也勿憂宜日中宜照天下也王假之尚大也言王者至此豐大之時則所尚者皆大事也盖豐大之時制作則必欲其備儀文則必欲其稱凡其所施設无非盛美之事是所尚者大也然盛極則必衰故又當勿憂而宜如日中以照天下盖能謹飭使常如日中之時則可以照天下而保其大矣夫日中則昃乃理之常豈有常中而不昃者乎然自人言之則道之在我者亦所當自盡而不可盡歸之天也日中則昃月盈則食天地盈虚與時消息而況於人乎況於鬼神乎此又發明卦辭外意言不可過中也夫日中盛極則必昃昳月既盈滿則必虧缺由是論之天地之盈虚尚且隨時而消息而況於人事之无常者乎況於鬼神之不可測者乎人有見於此則知天命之无常而人道之當盡庻能戒謹恐懼以保其大矣旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅者失其所而非常居故可小亨而不可大亨也然以柔居中則不過剛以取禍順乎陽剛則得強援以為主止於其所則安常分而不妄求麗乎文明則明義理而達事變此四者皆羈旅之正而致亨之道也旅之時義大矣哉重巽以申命巽之象為風風之吹物无處不入无處不動而命令之施有似焉故以巽為命令也命令之出必丁寜反復以致其意如書言若兹多誥史言三令五申皆重複之意故又取重巽之義而謂之申命也剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人以陽剛順於中正而其志得行此所以亨也然巽以隂為主而隂柔必順於陽剛然後能就事此所以但為小亨而不能大亨也利有攸往以五與二言利見大人以初與四言兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉卦辭為說亨而利貞而卦體則剛中而柔外人能剛中則中心誠實能柔外則接物和柔故其說可以亨而又得其正矣說而能正則上順天理下應人心將何事之不可為乎說以先民而民忘其勞无往而非亨也說以犯難而民忘其死无往而非貞也孟子言以佚道使民雖勞不怨其說以使民者乎又言以生道殺民雖死不怨殺者其說以犯難者乎王者之說道順天而應人可謂大矣天下之人固將皥皥然莫知誰之使然者而又安有不知勸者乎渙亨剛來而不窮柔得位乎外而上同渙之成渙由乾之九來居二而得中坤之六往居四得隂之位而上同於九五又卦變自漸九來居二而得中六往居三得九之位而上同於四故曰剛來而不窮柔得位乎外而上同其謂之不窮者以其居二而得中故也若居初而在下則窮矣王假有廟王乃在中也王乃在中者言處得其中也九五有中徳則天下之散者无不可以合以臨民而民心歸以祭祀而鬼神格以濟難而禍亂定焉往而不用夫中哉然合其散者莫重於祭莫難感於鬼神非極其誠敬不能也故卦辭以王假有廟言而傳復明之曰王之至於有廟者以其能處乎中也處乎中則其心不偏倚事无乖謬其為誠敬可知矣鬼神之微而不測猶无不格也而況於人乎利涉大川乘木有功也木在水上舟楫之象故言利涉大川者以乘木而有功也然乘之得人則有功也乘之非人将胥及於溺而己而何望其功乎以六爻觀之如九五之渙汗其大號六四之渙其羣九二之渙奔其机其皆善於乘木之人歟以濟渙之才而成涉川之功渙之亨者可知矣節亨剛柔分而剛得中節之所以亨者以三隂三陽剛柔平分而二五皆剛而得中也苦節不可貞其道窮也聖人大中之道隨時而變如權衡之校物低昂屢變而不害其為同也又安有窮乎若任其獨見而過於中道則為詭異之行非隨時之義豈惟人不可以取法乎雖其身之所行亦有時而窒矣故苦節之不可固守者以其道之有窮也説以行險當位以節中正以通人有所說而不知止者多矣節之行險而能止者以其二體皆剛中也不窮極其說能困險而止則可謂有節矣又以九五言之五居尊位為節之主則其節也得乎中正而不過苦又豈非節而能通乎坎為通人之於事如水之流通則其道不窮可知矣天地節而四時成節以制度不傷財不害民天地之節於四時而見乃自然之節也聖人之節於制度而見乃因其自然之節以為節也天地之化四時循環終而復始亘乎古今而未嘗間也聖人觀天地四時之節於是設為政教大而君臣上下之分定小而鳥獸草木之禁明皆所謂節也故聖人之制度一定則不傷於財不害於民而天下治矣中孚柔在内而剛得中說而巽孚乃化邦也柔在内為中虚中虚者信之本也剛居二體之中為中實中實者信之質也上順巽於下下說從其上則說而巽者又信之接於物也卦有是四者故名之以中孚其孚如是乃能化於邦國也豚魚吉信及豚魚也利涉大川乘木舟虚也信及豚魚言物之難感者信亦及之也夫豚之與魚冥昧无知之物也然飼之以信則應期而集而況於人乎信之能及於豚魚則幽而鬼神顯而民物无不以吾誠而貫之其吉可知矣涉大川而曰乘木舟虚者唯其舟之虚故能浮能載而川可涉也人以剛中之才而乘虚中之舟亦何險之不濟乎中孚以利貞乃應乎天也信而能正則事皆天理是應乎天也以人而應天非天下之至誠孰能與於此小過小者過而亨也過以利貞與時行也柔得中是以小事吉也過以利貞而曰與時行者時當過而過則雖過亦正也然卦以二五為主而二五皆柔故止於小事吉而已剛失位而不中是以不可大事也剛失位者以三四言之然言隂陽之位則三為得位唯四失位耳傳意所指盖謂失二五君臣之位非隂陽之位也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也隂過之時不可大事矣故如鳥之高飛則逆時而凶下止則順時而吉時行則行時止則止於飛鳥猶然也可以人而不如鳥乎既濟亨小者亨也既濟之亨者小事之亨爾故謂之小亨利貞剛柔正而位當也卦之六爻皆得其正而當其位故彖辭云利貞貞其固有非設戒也然為占者言之故謂之利貞言利於如是之貞也初吉柔得中也内卦為文明而二以柔順中正為之主此其初之所以吉也終止則亂其道窮也終止則亂者外卦為坎險而五以陽剛陷於險之中終於止而不能出是其道之窮困矣豈非終亂乎未濟亨柔得中也既濟柔得中在下卦則初吉而終亂以文明己過而坎險繼之也未濟柔得中在上卦則始未濟而終亨以出乎坎險而正當文明也六五以柔得中為文明之主果何事之不亨乎其與既濟之小亨者異矣小狐汔濟未出中也濡其尾无攸利不續終也小狐者以象少年輕進之人也小狐之勇於濟宜其濟之易矣然未能出乎險中者以其不知時而冒進也不續終者言進銳退速而不能繼續以終事也雖不當位剛柔應也未濟六爻雖不當位然其剛柔皆相應與又以九二而應六五五文明二剛中君臣得位而剛柔相應則其濟天下之險又豈小狐之比哉周易參義卷四
