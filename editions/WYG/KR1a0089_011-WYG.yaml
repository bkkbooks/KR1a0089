body:
  text: 周易參義卷十一元梁寅撰序卦傳有天地然後萬物生焉乾坤獨不稱名而謂之天地者於以見乾坤即天地也天地為萬物之父母而乾坤為諸卦之父母也盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也天地以生物為心而生物之盛多而盈塞者无甚於草木故乾坤之後即受之以屯者所以象草之穿地而始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟人之紛爭常始於醉飽之過故飲食必有訟而書酒誥之所以丁寜反覆者亦深戒於飲豈苟言哉訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履物之畜聚而无禮以辨其分則必至於爭亂矣履而泰然後安故受之以泰泰者通也人之踐履皆由於理則舒泰舒泰則身安矣而其道豈不亨通乎物不可以終通故受之以否物之欲終通者其情也而不可以終通者其時勢然也物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也蠱壞之時乃事之所由起也有事而後可大故受之以臨臨者大也以陽臨隂則陽益盛大矣故臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也物之苟合而不賁飾則質而不文君子小人安所辨乎致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復復則不妄矣故受之以无妄復者反身而誠故无妄有无妄然後可畜故受之以大畜所畜聚者皆真實而无偽此其所以為大畜也物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯咸恒為下經之首而夫婦者亦人之父母故尊之亞於乾坤也夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物无屈而不伸之理故君子雖遯而終必復壯也物不可以終壯故受之以晉晉者進也天下之理未有壯而不進者亦未有不壯而能進者故大壯繼之以晉也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也天下之事急則合緩則散故難之解散謂之緩盖以緩而漸散也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也夬之於此則遇之於彼是隂柔不能終絶也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不巳必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也以長子而主天下之大器則必其陽剛之動然後能不失也若柔靜者安能勝任乎物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽巽者入也入而後説之故受之以兊兊者説也説而後散之故受之以渙渙者離也人心和説之極則漸入於怠緩怠緩則散矣物不可以終離故受之以節離散而能節則其散者可合矣節而信之故受之以中孚節之而當則人信之矣有其信者必行之故受之以小過有過物者必濟故受之以旣濟必有過人之事然後能濟也物不可窮也故受之以未濟終焉旣濟之極則必窮故旣濟之後承之以未濟以為六十四卦之終焉所以見易道之无窮也右下篇周易參義卷十一
