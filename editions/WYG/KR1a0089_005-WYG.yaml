body:
  text: 周易參義卷五元梁寅撰象上傳天行健君子以自強不息胡翼之曰天者乾之形乾者天之用天形蒼然南樞入地下三十六度北樞岀地上三十六度状如倚杵其用則一晝一夜行九十餘萬里而君子法之以自強不息焉竊甞論之人禀隂陽之氣具健順之性其天者未嘗不存也然常人者拘於氣禀汨於物欲則其健者亦有時而息故雖大賢如顔子亦或違於三月之後也唯聖人者徳同乎天而純亦不已其於天行之健固不待拘拘焉以法之而其健已至矣聖人之贊易以法乾為君子之事則所謂自強不息者其至則聖人也而未至則賢者也葢自強者聖賢之所同而不息者聖人之所獨是故不能自強者常人也能自強而不能不息者賢人也能自強而又能不息者聖人也聖人之自強即天之徤也聖人之不息即健之行也天唯健故不息聖人唯自強故不息人之於天雖小大之異而其道一也君子者能法天之健而自強則人而天矣潛龍勿用陽在下也見龍在田徳施普也見龍在田者以言在下之大人也而其曰徳施普者何也葢大人者正孟子所謂正巳而物正者也故雖未得位而上下已皆化之矣所謂徳施者豈必博施濟衆乃謂之施乎葢聞其風而興起者无非其徳之施也終日乾乾反復道也或躍在淵進无咎也九四進退无恒則其進其退皆无咎也而傳獨言進无咎者葢君子之出處以躁進而失者常多以恬退而失者常少今九四之進亦且无咎則其退之无咎不言可知矣飛龍在天大人造也亢龍有悔盈不可乆也用九天徳不可為首也地勢坤君子以厚徳載物地之髙下相因而其勢順者以其厚故也君子之法乎坤者以重厚之徳而容載事物則其順於理者可知矣然厚非順也唯厚所以能順耳履霜堅氷隂始凝也馴致其道至堅氷也六二之動直以方也不習无不利地道光也爻言直方大而傳止言直方者盖由内直外方而盛大則大者直方之所致耳故但取韻協而曰直以方也不習无不利為地道光者盖徳盛之極則光輝外見也含章可貞以時發也或從王事知光大也言以時發者内含章美而發於事業必以其時也時當發而閟與當閟而發者皆咎矣或從王事而无成有終則其發之以時者智也不為物先者亦智也其存於中也為章美之藏而發於外也為光大之智非三之以隂居陽惡能如是哉括囊无咎慎不害也黄裳元吉文在中也龍戰于野其道窮也用六永貞以大終也陽為大隂為小坤用六則柔變為剛是其始雖小而終則大也雲雷屯君子以經綸以陽蒸隂隂氣騰而為雲以隂包陽陽氣鬱而為雷雲雷皆作而尚未成雨乃屯結之時猶世道方雜亂而未寜也雨之未成也雲雷經綸之世之未寜也君子經綸之故君子之經綸斯世者觀雲雷之象以有為者也雖磐桓志行正也以貴下賤大得民也其磐桓者非終不進也但其進不可以遽耳故雖磐桓而其志在於行其正道也六二之難乘剛也十年乃字反常也隂陽相求乃理之常也二本與五為應而乘初之剛故為所難然難乆必通而正應終合是得以復其常道也故謂之反常即鹿无虞以從禽也君子舍之往吝窮也求而往明也四以隂柔而往求於初之陽剛可謂明矣屯其膏施未光也泣血漣如何可長也山下出泉蒙君子以果行育徳山下之泉方出未至於充盈而流行此人之未學而蒙昧之象也然始雖未盈積之則盈矣始雖未行決之則行矣故君子觀之以果決其行而養育其徳焉徳者得於心行之本也行者見諸事徳之發也然不曰育徳果行而曰果行育徳盖君子以成徳為行而必見之行者故此主於行而言而又以徳為之本也行之果決則有以周乎外是如水之必行也乃坎之通也徳之養育則有以充乎内是如水行之以漸也乃艮之止也君子之取於水者如此夫利用刑人以正法也子克家剛柔接也勿用取女行不順也困蒙之吝獨逺實也實者陽也卦之四隂初與三皆近於九二而五則為正應獨四居其中而逺於二故云逺實也童蒙之吉順以巽也利用禦寇上下順也上九以剛居卦外如将帥任閫外之寄者若其能禦寇而不為寇則上順於君而下順於民矣雲上于天需君子以飲食宴樂雲上于天未雨之時也然俟其蒸鬱之極則雨矣此卦之所以為需也君子當需之時則不容妄有作為而必期其效唯飲食宴樂以需其時之自至耳或曰屯則君子以經綸而有為需則君子以宴樂而无事何不同也曰屯内卦為震乃陽動之始而其難未易於解也故時當以有為需内卦為乾乃陽剛之盛而其難将自去也故時當以需待然其需之而宴樂也豈真肆志縱欲而忘其所事哉亦曰從容不迫居易以俟命而己矣需于郊不犯難行也利用恒无咎未失常也需于沙衍在中也雖小有言以吉終也以游衍而處中所謂從容中道者也故雖近險而不至於陷矣以吉終者始雖不吉而終則吉也需于泥災在外也自我致寇敬慎不敗也宼自我致固敗之道也然臨事而敬慎猶可以不敗況能敬慎於平日則寇又安得而至哉需于血順以聽也酒食貞吉以中正也曰以中正見其飲宴者非過於耽樂也不速之客來敬之終吉雖不當位未大失也上雖隂位然以隂居九五之上是不當位也然其不當位而未大失者以其不能害陽之進而猶能敬以待之也天與水違行訟君子以作事謀始天之性上水之性下天傾西北水傾於東天水之行兩相違異此訟之象也君子觀天水之違行則知人之不能以无訟故凡有所為必謀其始始之能謀而防其流弊杜其爭端則自无訟矣孔子曰聽訟吾猶人也必也使无訟乎作事謀始其使民无訟之道歟然謀始者非取法於天水之始也乃因天水之違而思謹其始爾不永所事訟不可長也雖小有言其辯明也不克訟歸逋竄也自下訟上患至掇也食舊徳從上吉也從上吉者言順從於正應而不與之抗則吉也復即命渝安貞不失也訟元吉以中正也以訟受服亦不足敬也地中有水師君子以容民畜衆地中有水水伏而不見也然遇險而出則浩乎其沛然矣籍農為兵兵散而不見也然上有徴發則所向无敵矣故君子觀地中有水而寓兵於農以容民而畜衆古之王者以寛得衆役使之以時賦税之有法懼傷民之力也民之力傷則雖赤子亦仇讐矣吾又安得而用之故寛以容其農民者乃所以畜聚其兵衆也師出以律失律凶也在師中吉承天寵也王三錫命懐萬邦也大臣為将而處得中道非為欲以受天寵也然既得其道而有其功則天寵不期而自至矣人君之寵錫其臣非所敢私故謂之天寵猶曰天位天禄也王三錫命為懐萬邦者盖優禮大臣而崇徳報功則諸侯歸心是其錫命者乃懐服萬邦之道也師或輿尸大无功也左次无咎未失常也長子帥師以中行也弟子輿尸使不當也大君有命以正功也小人勿用必亂邦也地上有水比先王以建萬國親諸侯地上有水則水必比於地萬民有王則王必比於民然王之比於民不得而盡比也故必建萬國之諸侯使之比民而王之所比者諸侯耳其比諸侯者即所以比天下也比之初六有他吉也比之自内不自失也比之匪人不亦傷乎外比於賢以從上也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也比之无首无所終也衆隂皆比陽而上六以隂居上獨不比之則其始雖妄尊大而終能免於禍乎風行天上小畜君子以懿文徳復自道其義吉也牽復在中亦不自失也夫妻反目不能正室也有孚惕出上合志也有孚攣如不獨富也五之富厚固能以其鄰然无其鄰之助則五亦无以拒乎隂是不能獨富也既雨既處徳積載也君子征凶有所疑也有所疑者疑隂之害陽也上天下澤履君子以辨上下定民志天運乎上澤潤乎下其上下之懸隔邈然其不及未嘗有滔天之禍也君子觀上天下澤之為履於是嚴其禮制峻其禁防使尊卑之分貴賤之等如天上澤下而不可陵犯故天下之人各有定志安其素守而絶其覬覦靡然如水之就下而知天險之不可升此豈非禮制防閑之效哉故辨上下之分者乃所以定民之志也素履之往獨行願也夫貪榮好進者人之常情也而君子者獨安其卑下之素不急於求進此豈其好惡之有異於人哉盖君子之志窮則獨善其身達則兼善天下其行止去就固非常人之所知亦非常人之所及乃獨行其志願而己矣幽人貞吉中不自亂也眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也愬愬終吉志行也夬履貞厲位正當也元吉在上大有慶也天地交泰后以財成天地之道輔相天地之宜以左右民天地之位各安於上下而天地之氣有時而升降天之氣降而地之氣升是二氣相交而萬物亨通故卦為泰也天地者萬物之父母而元后者又民之父母故因天地之交而有財成輔相之事焉盖天地交而萬物通然後聖人有以致其用若天地不交萬物不通聖人雖欲財成輔相其可得邪天之道為日月星辰四時寒暑地之道為山川丘陵墳衍原隰然地既滯於形氣則其道未免於過也故聖人為之治厯明時使分至啟閉之不差春夏秋冬之有序為之畫井經野使城郭郊原之有制道里封疆之各定是皆財成天地之道而不使之過也春生秋殺日烜雨潤為天之宜高黍下稌淵魚藪獸為地之宜然既任其自然則其宜又未免於不及也故聖人教民播種灌溉漁獵薪樵使之順生養之氣以成其功隨土地之産以盡其用是皆輔相天地之宜而補其不及也然聖人何如是過計哉盖天地能生物而不能遂其生乃以其責而付之於聖人故聖人之財成輔相非為天地慮也乃所以為吾民慮也聖人之慮民亦豈能家賜而人益之乎唯參贊天地之化育使民順天之時因地之利各有以養其生而安其業是聖人之財成輔相乎天地者乃所以左右乎民也為乾坤之宗子而以天地萬物為一體其唯處泰之元后乎拔茅征吉志在外也包荒得尚于中行以光大也无往不復天地際也无平不陂无往不復乃天地交際之常理故當其時者不可以不戒翩翩不富皆失實也不戒以孚中心願也三隂皆虚故為失實皆欲下復故中心願以祉元吉中以行願也城復于隍其命亂也以其命之亂而不治故泰為否也天地不交否君子以儉徳辟難不可榮以禄天地交泰言后天地不交否言君子何也盖泰之時非元后不足以當之而否之時則又非所以言元后故但言君子辟禍之道而己儉徳者藏其美而晦其明使不形於外故小人之禍不能及而朝廷之禄位亦不可以加之也君子處此之時欲加之禄且猶不可而況肯枉道以從人乎天地閉而賢人隱義固如此拔茅貞吉志在君也大人否亨不亂羣也小人雖􅊶承乎君子然君子豈可遂入於其羣乎故大人之處否而亨者以其能不亂於小人之羣也􅊶羞位不當也有命无咎志行也大人之吉位正當也否終則傾何可長也天與火同人君子以類族辨物天與火本異也然天在上而火炎上則其性同也故君子法之以類族辨物則能審異而致同盖族以其類而分之固異也而究其初則同也物以其種而辨之固異也而原其理則同也族之與物既審其異而知其同則人之與人其初亦一人之身也同胞吾與之念豈不由是而生乎出門同人又誰咎也同人于宗吝道也伏戎于莽敵剛也三歲不興安行也乘其墉義弗克也其吉則困而反則也同人之先以中直也大師相遇言相克也同人于郊志未得也火在天上大有君子以遏惡揚善順天休命火在天上而照見萬物所以為大有若不能照則雖云大有而亦不能以見矣是烏足以有其有乎君子之大有者必觀火在天上之象而極其明以照之故雖所有之大而瑕纇之微不能以逃焉夫常人之不能燭理者善惡混殽无以辨白故惡者以熾而善者以微君子則能明照也故遏絶其惡黨揚明其善類其謂之順天休命者盖天命有善而无惡人之去善為惡則逆天者也今遏其惡而揚其善豈非順天乎大有初九无交害也大車以載積中不敗也中實則積中也剛健則不敗也公用亨于天子小人害也君子獻其有於君而盡忠小人私其有於已則自為害耳匪其彭无咎明辯晳也謂之明辯而又謂之晳者見其明智之極也厥孚交如信以發志也威如之吉易而无備也大有上吉自天祐也地中有山謙君子以裒多益寡稱物平施凡鳥獸草木之生焉者皆山也山嶽之高有莫之能並者矣然幽深之谷卑下之地未嘗无鳥獸草木焉是亦山也君子觀地中之有山則知人之處世不可以自高而卑人故有持平之心焉是所謂謙也於其多者裒而損之以増益其寡者是所以稱物之宜而均平其施予也舉一隅而莫不然矣如損高以益卑損厚以益薄損大以益小皆稱物而平施也夫矜才􅃷能樂高喜勝人之常情也而君子者其心有異焉是故聦明睿智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙若是者其心何如也豈非惡已之獨多而裒之以益於人乎謙謙君子卑以自牧也自牧者自守也鳴謙貞吉中心得也人之勉為謙者其外雖謙而中心不自樂如六二之柔順中正則其謙者乃其素志而非強為之故其中心自得也勞謙君子萬民服也萬民服者其心服也夫以權力而脅制者非服也以私恩而致其悦者非服也如九三之服人以其莫大之功而處之以謙遜則天下之人莫不尚其功而美其謙是雖无意於服人而人自服矣若是者豈可以聲音笑貎為之哉无不利撝謙不違則也利用侵伐征不服也鳴謙志未得也可用行師征邑國也雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考有氣斯有形有形斯有聲氣和則形和形和則聲和此天地自然之理也方雷藏于地則萬物未生而形聲俱寂及其出地而奮發則氣與形聲相須並出而天地之大和於是見矣雷出地奮而卦謂之豫豈非取其聲氣之和哉先王觀雷出地奮而聲氣和於是因人心之和以制音樂之和樂記謂樂由陽來又謂樂者象天地之和詎不信歟樂之和如是則其徳之盛大者因可以見是作樂者乃所以襃崇其徳也如大韶大武之類皆所以象其功徳者也王者之作樂近而閨門逺而邦國顯而人事幽而鬼神无不用之也而其極盛則尤在於郊廟盖萬物本乎天人本乎祖故周之郊祀后稷以配天配以祖也宗祀文王於明堂以配上帝配以考也薦上帝配祖考皆用樂以致其來格焉此書所謂神人以和者也聖人作樂之極功盖如此初六鳴豫志窮凶也不終日貞吉以中正也盱豫有悔位不當也由豫大有得志大行也彖傳曰剛應而志行盖由四以陽剛為羣隂所應故其志得以大行也然四之志行豈專權自恣乎亦曰順理而動以躋斯世於泰和之域爾六五貞疾乘剛也恒不死中未亡也中未亡者在中之徳已失而在中之位猶存也冥豫在上何可長也澤中有雷隨君子以嚮晦入宴息雷陽之動者也然以四時言之則春夏出而秋冬藏以晦明言之則隂晦出而晴明藏亦隨其時也其藏也固不一於藏而動豈一於動乎君子觀澤中有雷而知隨時之義故晝則動作而晦則宴息焉卦爻言隨時而動象傳言隨時而息動息隨時无非天理隨之義盡矣官有渝從正吉也出門交有功不失也係小子弗兼與也係丈夫志舍下也隨有獲其義凶也有孚在道明功也人能有其孚誠而在於臣道此明察之功也盖徒知有孚在道而不能以明則信非其信而道非其道矣是則有孚在道以明雖為三者而尤以明為重歟故曰有孚在道明功也孚于嘉吉位正中也拘係之上窮也山下有風蠱君子以振民育徳山下有風則草木皆為之撓亂此蠱壊之象也君子觀其象則知蠱壊之時必有救弊之道而救弊者莫先於正大經而善民俗也振民者聳民之觀聽育徳者養已之明徳言振民而及於育徳者以明徳為新民之本也振民者樹之風聲其如風之動物乎育徳者道積於躬其如山之育物乎治蠱之道无大於是矣幹父之蠱意承考也幹母之蠱得中道也幹父之蠱終无咎也裕父之蠱往未得也幹父用譽承以徳也不事王侯志可則也上九之志可為法則是固不離於中庸之道也如彼潔身亂倫而索隱行怪者未免於過矣又豈可為人之則乎澤上有地臨君子以教思无窮容保民无疆澤上有地則澤卑地高而地臨於澤故卦為臨也君子觀地臨於澤之象而以臨其民則教導之意思无有窮極容保民之心无有疆限而君人之道盡矣教思无窮澤潤地之象容保民无疆地容澤之象咸臨貞吉志行正也咸臨吉无不利未順命也卦以二陽臨四隂而二得中則初乃聽命于二者故二為臨隂之主未順命者四隂黨盛尚未順命於陽也甘臨位不當也既憂之咎不長也至臨无咎位當也大君之宜行中之謂也五居尊位能臨人以知而合義者以其能行中道而隨時處之也敦臨之吉志在内也内謂自五以下上六以敦厚之徳居上臨下是其志在於正身以率下也風行地上觀先王以省方觀民設教先王之廵守者所以省其方土觀其民俗然後設其政教盖不周行四方則无以知民俗之各異不徧觀民俗則无以知政教之所宜故省方者非泛行也将以觀其民俗耳觀民者非虚誇也将以施其教令耳卦之象為風行地上省方觀民如風之周及於物也設其教令如風之順而入之也初六童觀小人道也闚觀女貞亦可醜也觀我生進退未失道也觀國之光尚賔也觀我生觀民也觀其生志未平也雷電噬嗑先王以明罰勅法雷電當作電雷用刑而取電雷之象者盖申明其刑罰勅正其法令使民知所畏避而不至觸犯乃所以法電雷之明威也屨校滅趾不行也噬膚滅鼻乘剛也遇毒位不當也利艱貞吉未光也貞厲无咎得當也何校滅耳聦不明也山下有火賁君子以明庶政无敢折獄山下有火則能照乎山上見其草木之生各止其所故君子法之以明照羣下而思不出位其明於庶政者以離明在内而必致其察也无敢折獄者以艮止於外而各有職司也周書言文王罔攸兼于庶獄庶慎盖亦无敢折獄之意歟舍車而徒義弗乘也賁其須與上興也永貞之吉終莫之陵也六四當位疑也匪寇㛰媾終无尤也六五之吉有喜也白賁无咎上得志也山附於地剥上以厚下安宅山至高大而附於地上地不以為重山不以為危何也以地之廣厚有以承藉乎山也為人上者觀山之附於地則以厚䘏其下而安其居宅然後免於頽剥之患若侵削其民以自封殖則如隆其居室而掘其基址也其得謂之安乎剥牀以足以滅下也剥牀以辨未有與也未有與者言上无陽剛為之應與故隂得以肆其志若五為陽剛則隂受制於陽而不敢如是矣剥之无咎失上下也剥牀以膚切近災也以宫人寵終无尤也君子得輿民所載也小人剥廬終不可用也雷在地中復先王以至日閉關商旅不行后不省方震為雷雷者陽之動也而乃在於地中盖當陽之方復故欲動而未動也於是之時所當閉藏安静以俟時而奮發未可輕動也若非時而動則隂陽失節矣先王觀象而隨時和燮故以冬至之日閉關而息商旅安居而不省方所以順乎天道當陽之始生而安静以養之也或曰隂陽天地之氣也而人事何與焉是未知天人感通之機也致中和而天地位萬物育和氣致祥乖氣致異此必然之理也以人之逆天而動而望天時之順其可得乎然此為人君言之也若自人一身而言則昏迷之極善端方萌是亦陽之欲動也於是之時尤當莊敬以持養之然後善念達於外而益以廣不然萌蘖之生而牛羊牧之其良心之發能无夭閼乎不逺之復以修身也休復之吉以下仁也二在初之上而能親於初以復其善乃位高而不恥下問者故謂之下仁頻復之厲義无咎也中行獨復以從道也敦復无悔中以自考也中以自考言以其有中徳故能自考其善不善也迷復之凶反君道也天下雷行物與无妄先王以茂對時育萬物天之生物也鼓之以雷霆而萬物莫不震動焉此發生之始也然不曰天下有雷而曰天下雷行者見雷之宣行其令於天下无不周徧也物與无妄者物物與之以无妄也雷行者氣也无妄者理也天道流行發育萬物而氣以成形各一其性其所賦予者寜有一物之不得乎天下雷行乾道變化也繼之者善也誠之通也物與无妄各正性命也成之者性也誠之復也天下雷行則物與无妄而无所私王者觀其象而順天之時體天之道則其對時育物者亦因其所性而安利之使各得其所而已矣對時而謂之茂對時者以為盛大之事而不敢忽也育物而謂之育萬物者以萬物為一體而无一之或遺也大傳曰顯諸仁藏諸用鼓萬物而不與聖人同憂天下雷行物與无妄者豈非造化之鼓萬物者乎茂對時育萬物者又豈非造化不憂而聖人代任其憂乎聖人以天地之心為心於是見矣无妄之往得志也不耕穫未富也未富者言未嘗以豐富為心也行人得牛邑人災也可貞无咎固有之也无妄之藥不可試也无妄之行窮之災也上九非有妄者但以處窮極之地故遇其災爾然非己所致亦无可奈何安於命而已矣天在山中大畜君子以多識前言往行以畜其徳天至高大也而安有在於山中乎盖於此但以氣論而不以形觀也天之體雖高而在上而其氣常行於地中地之所載則莫大於山嶽而雷雨風雲皆畜於其中則畜之大者孰有加於山之畜天乎君子觀山能畜天之氣故多識前言往行以畜聚其徳焉夫人之修徳莫大於謹言行能多識前人之言則理明於心吾之言皆前人之言也多識往哲之行則動而有法吾之行皆往哲之行也言行如是則徳畜於身其言也為有徳之言其行也為成徳之行是於山之畜天者何異乎有厲利已不犯災也輿說輹中无尤也利有攸往上合志也六四元吉有喜也六五之吉有慶也何天之衢道大行也山下有雷頤君子以慎言語節飲食山之下空洞而幽深雷藏於其中乃隨時静處以安養其氣也君子之養徳者莫先於謹言語養身者莫切於節飲食言語能慎則可免於禍飲食能節則不至於疾亦如雷在山下而不妄發則不至於反天之令也然言語飲食舉其一而言耳推而論之如人君之教令皆所當慎也國家之財用皆所當節也觀我朶頤亦不足貴也六二征凶行失類也初上皆非二之應與而二往求焉是行而失其類也十年勿用道大悖也顛頤之吉上施光也四求於初而以之養人則其在上之恩施可以光顯矣居貞之吉順以從上也由頤厲吉大有慶也澤滅木大過君子以獨立不懼遯世无悶木之生於澤畔木本高而澤本下也今澤之盛長乃至于滅没其木此澤水之大過也然其為木者挺然高立而敷榮自若澤雖大過安能為之病乎君子觀其象處大過之時而為大過之行故以世道之險人情之異而獨立不懼焉時之相違道之不行而遯世无悶焉夫子曰勇者不懼仁者不憂此豈非大過之行乎藉用白茅柔在下也老夫女妻過以相與也棟橈之凶不可以有輔也剛強而好自用人不可以輔之也棟隆之吉不撓乎下也枯楊生華何可乆也老婦士夫亦可醜也過涉之凶不可咎也其行雖過而於義无媿故不可以咎之水洊至習坎君子以常徳行習教事水重洊而至故為習坎君子觀之以常乆其徳行則如川之不息而有以成已矣以閑習其教事則如水之就下而有以成物矣習坎入坎失道凶也求小得未出中也來之坎坎終无功也樽酒簋貳剛柔際也坎不盈中未大也上六失道凶三歲也明兩作離大人以繼明照于四方天无二日而日之升也今日既升而明日復升焉此明兩作之義也作起也言其明相繼而起也大人者觀重離之象於是以明相繼而照臨四方如人君有緝熙之敬而光明无間固繼明也世世以明相繼如書之所謂重華重光亦繼明也大人與日月合其明盖如此云履錯之敬以辟咎也黄離元吉得中道也日昃之離何可乆也突如其來如无所容也六五之吉離王公也王用出征以正邦也周易參義卷五
