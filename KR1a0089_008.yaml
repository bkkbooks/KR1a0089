body:
  text: 周易參義卷八元梁寅撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣八卦既成則或橫而列或圓而列而隂陽之象無不可見矣因而重之則三畫之上復加三畫而卦各六爻為六十四矣然卦之成列者由太極而兩儀由兩儀而四象由四象而八卦乃以漸次而成非聖人因見三才而連畫三爻以象之也因而重之者由八卦而十六由十六而三十二由三十二而六十四乃以漸次而重非聖人又連畫上三爻以為六十四也剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推者謂剛柔交錯而成卦爻變在其中者即所謂變化之道也繫辭焉而命之者謂因其爻之當否而繫之辭以命其吉凶動在其中者則專指當占之一爻也吉凶悔吝者生乎動者也吉凶悔吝雖備於辭亦必因卦爻之動而後見然卦爻之動靜即人之動靜卦爻之吉凶即人之吉凶人之動有當否而吉凶類應之如影響之於形聲也可不慎乎剛柔者立本者也變通者趣時者也剛柔者立本乃不易之體即所謂闔户闢户也變通者趣時乃變易之用即所謂往來不窮也吉凶者貞勝者也天下之理吉凶二者常迭相勝而不已故非吉勝凶則必凶勝吉蓋吉凶生於隂陽隂陽者常相勝故吉凶亦常相勝也人觀於此則處凶者固可以轉而為吉而處吉者亦可不豫防其凶乎天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也天運乎上地處乎下而未嘗變易者以其常於示人也日見於晝月見於夜而未嘗廢息者以其常於臨照也天下之動紛錯萬變而卒於有定者以其常於一理也此三句重在天下之動貞夫一其言天地日月者蓋引之以明貞一之意也夫乾確然示人易矣夫坤隤然示人簡矣夫乾確然而健於上非有他也唯示人以易而物自資始矣夫坤隤然而順於下非有他也唯示人以簡而物自資生矣所謂天地之貞觀者蓋如此爻也者效此者也象也者像此者也爻之竒偶所以效乎乾坤也卦之消息所以像乎乾坤也竒效乾之易故凡陽爻有剛決之義焉偶效坤之簡故凡隂爻有柔順之義焉卦之陽長隂消則所以像乾之易也卦之隂長陽消則所以像坤之順也爻象之竒偶消息足以盡乾坤之理矣爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭爻之竒偶卦之消息變動於蓍卦之內於是爻之當否卦之小大可以見矣爻有當否卦有小大而吉凶見於蓍卦之外則卦之大而爻之當也為吉亨無咎卦之小而爻不當也為凶咎悔吝亦無不著矣爻象既動則謂之變也而人之為功業者其得失成敗之兆豈不於是而見乎吉凶既見則謂之辭也而聖人所以教民卜筮者其諄諄懇懇之情豈不於是而見乎爻象動乎內則象可見也吉凶見乎外則占可見也功業見乎變則變可知也聖人之情見乎辭則辭可知也所以學易用易者唯象占辭變而已矣天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義夫天地設位而隂陽五行發育萬物乾男坤女生生不窮是天地之大德在於生物而已然天能生物而無以治之則民物不得以遂其生故必篤生大聖之君授以至尊之位使之君臨天下而治其爭亂是聖人之大寶在於尊位而已然聖人有其位固所以為民若以位為樂而不恤其民則民心不免於涣散大位亦無以自保故聖人之守位者唯在於得民也然四海至廣兆民至衆苟衣食之不足其生之不遂則亦不能親戴於君上故聖人之聚人者唯在於財也然財者人之所同欲若但能富民而不能教民則民唯私利之是徇不知公義之所在是雖曰欲利而不能保其利矣故理財以防其侵奪正辭以辨其是非禁民之非邪以歸於中正是則所謂義者也此一節文意自源而流其義相須蓋天地不可無聖人聖人不可無萬民萬民不可無財財不可無義而聖人者上承乎天地下統乎萬民凡造化人事皆由之而立者也右第一章古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情凡麗乎天者略見其象而無形可執故仰則觀其象凡麗乎土者其形堅實而有法可取故俯則觀其法觀鳥獸之文如鯉三十六鱗為隂龍八十一鱗為陽是也觀地之宜如山為陽而川為隂東北為陽而西南為隂是也近取諸身如乾首坤腹之類也逺取諸物如乾馬坤牛之類也通神明之德如健順動止之性也類萬物之情如雷風山澤之象也作結繩而為罔罟以佃以漁蓋取諸離以離之象言則兩目相承有似於罔罟以離之德言則物相附麗乃魚獸之在於罔罟也然聖人非先見於離而後制為罔罟也蓋亦見魚獸之屬思有以取之故制為罔罟以牢籠之而偶合離之象故云蓋取諸離蓋之為言適然有合之意也下諸爻放此包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤聖人之化天下非後世所及者有二焉曰隨時也曰無為也自神農以前王天下者方憂夫民生之未遂而所急者食貨所先者用器其教民之意雖寓於養民之中而其為治者固未大備也逮神農既沒而黃帝堯舜氏作則當世道極盛之時正生民殷庶之日於是不得不異於前代矣蓋民之倦於其故則時當變矣聖人於是通其變而使民自不倦則變通之道即隨時之義也民之安於其習則憚於有為矣聖人於是以神道設教而使民自宜之則神化之術即無為之治也然徒知變通而不知神化不能以變通也徒知神化而不知變通不能以神化也易之為道窮則必變變則必通通則必久時當變通焉則固不可違也既變通矣則自天祐之乃自然之祐也吉無不利乃自然之利也聖人豈有心於其間哉黃帝堯舜之時一丕變之時也天下之民樂於其變而囿於其化方自歡然於泰和之域聖人之心又將何為哉唯垂衣裳於萬民之上以享其無為之效耳其曰取諸乾坤者以乾坤變化而無為也卦莫大於乾坤而德莫大於黃帝堯舜以黃帝堯舜之治天下而取諸乾坤豈非聖人與天地同其大者乎刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙九州四海為一之時所以遷有無而遂民用者唯舟車之利為大故致逺以利天下於渙隨二卦皆言之服牛乘馬引重致逺以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過人之於事過則有害唯送死者人子之至情雖過厚不害所謂君子不以天下儉其親也上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬上古鴻荒之世風氣未開民淳事簡故止以結繩治之至於後世則風氣開而民事繁矣故聖人慮之不得不易之以書契言之易忘則書以記之事之可疑則契以信之於是百官以書契而布治萬民以書契而明察其有合於夬者豈非以其明決乎右第二章是故易者象也象也者像也彖者材也爻也者效天下之動者也如萬物之紛紜萬事之變態皆天下之動也而卦爻皆有以效之是故吉凶生而悔吝著也吉凶因象彖爻而始生悔吝因象彖爻而始著右第三章陽卦多隂隂卦多陽其故何也陽卦竒隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也以陽統隂正也故為君子之道以隂統陽非正也故為小人之道陽雖統於隂然其尊自若也故曰二君而一民然天下豈有二君一民之理哉右第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮夫子因咸九四有憧憧之思而曉其人曰天下之事何以思慮為哉所以行者同於歸也但其塗之殊爾所以思者其致一也但其慮之異爾以是言之人之妄行者莫若安於坦塗人之多慮者莫若委之自然如是則廓然而大公物來而順應而其從與否則在彼而已又何以思慮為哉日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉觀之日月寒暑日往則月來月往則日來日月相推而其明自生日月非有心於生明也寒往則暑來暑往則寒來寒暑相推而嵗功自成寒暑非有心於成嵗也蓋其往者為屈來者為信乃往來之自然也屈信相感而其利自生非有心於利也而人之感人者獨何思慮之憧憧耶尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也觀之於物尺蠖之屈不終於屈蓋將以求信也龍蛇之蟄以藏其身亦有時而出也豈唯物哉人之於學也亦然故精研其義而極其深至於入神而不可測此屈之至也然以出而致用則其利用安身者莫非精義入神為之本而其屈者有信焉利其施用而得其宜無適不安而順其理此信之至也然又入而崇德則其精義入神者又因利用安身為之助而其信者有屈焉內之所存有以發於外外之所行有以資於內其交相養而互相發亦豈非自然之機乎過此以往未之或知也窮神知化德之盛也人之精義利用特下學之功耳然上達之天理非離於下學之人事也學者但當用力於精義利用而勉勉循循以至於欲罷而不能則無所容力忽不自知遊於聖人之天矣故曰過此以往未之或知也未之或知者不容於有思不容於有為雖已亦莫知其所以是亦往而屈之意也至於真積力久而德盛仁熟則神為不測而吾之心有以潛通焉化為難知而吾之心有以默契焉故曰窮神知化德之盛也德之盛而通神化猶誠無不明修已以敬而聰明睿知出皆自然致之者是亦來而信之意也然下學之至自然上達則非有二致也其神化者亦豈出於精義利用之外哉其始有待於思為則曰精義利用其終無待於思為則曰窮神知化蓋所造有淺深而理則無精粗也此章因言憧憧往來而泛論其理終乃歸之於學以至於天德之自然蓋以見感應之無私者必如是而後能之也其旨深哉易曰困于石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪石不可移而必欲移之則力困矣蒺藜不可據而必欲據之則身傷矣然如是者皆其自取也欲免於凶亦反其所為而已矣易曰公用射隼于髙墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也有其器而無其時則其藏為虛藏有其時而無其器則其動為輕動既有其器又有其時斯足以盡器之用矣此其所以動無窒礙而所向有功歟子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶爾惟德罔小萬邦惟慶可以小善無益而不為乎爾惟不德罔大墜厥宗可以小惡無傷而不去乎子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑常自恐其危者乃所以安其位也常自恐其亡者乃所以保其存也常自恐其亂者乃所以有其治也孟子所謂生於憂患者蓋如此子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望豫之九二言介于石不終日蓋謂守之堅而去之決也而夫子深以知幾贊美之蓋君子者固貴於節操而尤貴於知幾也夫知幾者能審善惡之未形其神明之至乎以交際言之常人之交於上者易失之諂也而君子則審之於微故雖恭巽而不至於諂焉常人之交於下者易失之慢也而君子則審之於微故雖和易而不至於瀆焉若是者豈非知幾乎夫幾者欲形未形之間乃動之微也吉與凶之先見者也君子之知幾豈唯交際乎其於去就之際尤貴於見幾故能去之決而不俟終日也易曰介于石不終日貞吉亦由其安而能慮故其去之決而正且吉也夫其節介如石者安靜之至也其審度去就又何待於終日乎蓋雖事之未形而斷然可識矣君子者既知其微又知其彰既知其柔又知其剛是於天下之事無一之不明也此其所以卓然自立而為萬夫之望與子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉有不善未嘗不知其知過之明也知之未嘗復行其改過之速也天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也天地之化醇氣化也男女之化生形化也然絪緼構精皆氣之始也化醇化生皆形之始也言男女構精者損之為卦艮三索而得男乾道之所成也兑三索而得女坤道之所成也凡物兩相與則專一三則雜矣三而損一為兩一而得友亦為兩必如此然後能致一也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶右第五章子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德易之為書所以該天地之道者也然其該之也亦陽竒隂偶變化不窮而已故曰乾坤易之門言乾陽坤隂二者對立而易之變化由是以出也然隂陽者以靜為體以動為用觀乎其靜則乾陽坤隂各為一物而變化未見是乃分隂分陽兩儀立焉不易之易也觀乎其動則二物交錯相得有合而卦爻剛柔之體於是可見是乃一動一靜互為其根變易之道也易之剛柔交錯則造化備矣故隂陽之象如雷風山澤之類皆形而下者也天地之事也而易則有以體之焉隂陽之性如健順動止之類皆形而上者也神明之德也而易則有以通之焉此一節以乾坤易之門一句為之綱領而自乾陽坤隂至剛柔有體則見其體分而用合天地之撰神明之德則見其象著而理微皆以卦畫言之也其稱名也雜而不越於稽其類其衰世之意邪以卦爻之辭觀之其稱事物之名雖紛然雜出然未嘗有越於理者蓋卦爻之交錯即隂陽之變化而萬物萬事無不出於隂陽者故聖人之繫辭亦摹擬其變化之自然爾而又何有差繆乎然稽考其事類則亦已詳矣當上古之時民淳事簡聖人豈如是之諄諄哉易之費辭如是是亦衰世之意爾蓋文王之演易世道益以降矣以大聖之德而遭羑里之難其經常事變亦多矣則其辭之費也豈非著其憂患之意以教後世邪吁聖人之慮深矣夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣易之為書也彰其既往而於造化之大無不該察其未來而於吉凶之幾無所昧於事物之顯者則微其辭使人究乎理於義理之幽者則闡其意使人驗於事且其開而散之則名之必當貴賤尊卑有不得而紊物之必辨大小精粗莫不有其類明正其言則是非得失未嘗有隱斷決其辭則吉凶悔吝無不明著以是觀之易之廣大悉備者豈非聖人之精藴皆見於此乎其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報凡易所言事物之名固多微小然莫非取法於隂陽是其稱名雖小而取類則大也所言性命之旨固若髙逺然莫不粲然而有章是其旨雖逺而其辭則文也言之委曲詳盡疑於附會矣然其委曲者未嘗不中於理焉事之雜然肆陳疑於淺陋矣然其雜陳者未嘗無隱微之意焉蓋易之為辭也因人心之疑二而決之以濟斯民之行事而明失得之報應爾豈託之空言而無益於實用者邪右第六章易之興也其於中古乎作易者其有憂患乎易始作於伏羲之世猶上古也及其大興於文王之世則為中古矣然文王以處憂患而作易故其辭亦多教人處憂患之事也言此以起下文九卦之意是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也上文既言文王為憂患而作易矣於是厯陳九卦以言反身修德之意蓋處憂患者莫先於自修也人之踐履皆由於禮則身處於實地故履者德之基也人能謙退以下於人則可以常執守故謙者德之柄也能自反於善而不至昏迷則進修有漸故復者德之本也能立心有常而不遷於欲則所守益堅故恆者德之固也能每事抑損則懲忿窒欲而不辱其身故損者德之修也能務於日益則遷善改過而內美充實故益者德之裕也能處困而亨則身之善否有以自驗故困者德之辨也能如井之不動而用周於人則應變不窮故井者德之地也能巽順於義理而心與事相入則有以處斷故巽者德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱和者疑於苟且而履之和則無非天理之極至自尊者多取辱而謙之尊則自然而光榮微小者無分辨而復之小則自異於羣隂雜處者多令人厭而恆之處雜則久愈敬而不厭艱難者多不遂意而損之難則先難而後易欲其充長者多強有作為而益之長裕則自然而無施設窮者多窒塞而困之窮則其道自亨通居其所者僅自守而井之居其所則有以及於物稱物而平施者多暴露而巽之稱物則潛隱而不露此如書之九德皆無其弊而有其效者也履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權尊卑有序則上下和故履以和行禮自卑而尊人故謙以制禮有不善未嘗不知故復以自知終始惟一則日新故恆以一德人道惡盈而好謙故損以逺害百姓足而君足故益以興利不怨天不尤人故困以寡怨安而後能慮故井以辨義禮無不順故巽以行權此章三陳九卦第一節言九卦之義第二節言九卦之效第三節言九卦之用也右第七章易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適易之所該者皆造化之大人事之要故不可逺也然其道也屢遷故竒偶之畫變動不居而常周流於六虛之位或上或下本無常處一剛一柔交相變易以爻義觀之有當位而吉者亦有當位而凶者有有應而吉者亦有有應而凶者是豈可以為常典乎亦唯其變之所適而已矣自變動以下皆言屢遷之意其出入以度外內使知懼以二體言之則或出居於外或入居於內雖出入無常而亦有其節度矣然義當居內則在外為失位義當居外則在內為失位是又可以不知懼乎又明於憂患與故無有師保如臨父母易之為道又明於人之憂患與其所以致憂患之故故使人觀之雖無師保之嚴而常若父母臨之於上是雖欲不戒懼安得而不戒懼哉初率其辭而揆其方既有典常苟非其人道不虛行其始率循其辭而揆度其道則吉以吉告凶以凶告固有典常矣然苟非其人則吉亦凶是其人則凶亦吉易之為道豈虛行乎故曰神而明之存乎其人也右第八章易之為書也原始要終以為質也六爻相雜唯其時物也易之為書原其初爻之始要其上爻之終自始至終六爻皆具然後成一卦之體質也然六爻之中剛柔間雜未嘗有定何哉亦隨其時與物而已矣時謂六位之時物謂隂陽二物也其初難知其上易知本末也初辭擬之卒成之終初為本則其質未明而難知上為末則其質已著而易知故初則費於擬度而卒則但成其終而已若夫雜物撰德辨是與非則非其中爻不備初則過卑上則過髙而二五乃君臣之位三四又為下之上上之下故剛柔相雜以具其德而辨其是非者必待中四爻而後備也噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣居可知猶言斷然可知也知者觀其彖辭則思己過半矣而又要其存亡吉凶於六爻則豈有不可知者乎二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也二與五相應四位近於五皆大臣而位相逺故為同功而異位也然雖同為大臣而所處之善則四不如二蓋二應於五則為五所信四逼於五則為五所疑此所以二多譽而四多懼也夫二與四皆柔位也柔之為道本不利於逺而二之多譽無咎者以其用之柔而得中也然此亦大槩言之爾若考之諸卦則二亦有凶四亦有吉不可執一也下言三五者亦然三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪五為一卦之主而三亦居下卦之上故為同功而異位然五君位而三臣位故三則多凶五則多功也五雖多功然以柔處之則不勝其任而或危殆唯陽剛中正以居尊位則可以勝其隂邪之害爾右第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也以三畫言之則三才已具而隂陽未分乃太極函三而為一也以六畫言之則三才已分而隂陽各具乃三才各一太極也上傳所謂六爻之動三極之道即兼三才而兩之者也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易之為道變動不居故謂之爻爻也者效天下之動也爻或剛或柔其小大有等差故謂之物物者隂陽二物也隂陽二物相間雜而成章故謂之文文者隂麗於陽其美外見者也以陽居陽以隂居隂則為文之當以隂居陽以陽居隂則為文之不當當與不當又豈非吉凶之所由生乎右第十章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也文王演易於羑里乃危懼之時也故其辭亦危懼焉易之為道者人能危懼則使之安平若其慢易則使之傾覆然非易使之也天實使之也易之道即天之道故天所禍福者即易所禍福也且其道甚廣大天下百物莫不該備蓋無非以象與事示夫人也人之學易者能自知戒懼而慎始慎終焉則要之可以無咎矣易之為道蓋如此乎右第十一章夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻健順者乾坤之德也易簡者乾坤之行也知險阻者乾坤之處變也乾唯其健也故其德行恆以易然其在於平時則易爾若遇險之時則又能艱難慎重而不陷於險此其行之所以不窮而為健之至也坤惟其順也故其德行恆以簡然其平時則簡爾若遇阻之時則又能詳審擬度而不觸於阻此其行之所以不窒而為順之至也蓋知險者自髙臨下而見險之在下知阻者自下趨上而見阻之在上能如是則可以免乎憂患矣能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者説諸心研諸慮者體易也定吉凶成亹亹者用易也能説諸心則凡易之象辭天下之事變皆有以默契而怡然理順矣能研諸慮則象之變辭之占與凡事物之應接莫不有以研其幾微而審其當否矣此豈非體易於心乎既説諸心則義理素明故遇事而筮則吉凶以定而無所疑於心矣既研諸慮則幾微必察故既筮而決則行之亹亹而無所怠於事矣此又豈非用易以處事乎按朱子以説諸心屬乾以研諸慮屬坤蓋承上文之意然疑皆斷簡未必相屬也是故變化云為吉凶有祥象事知器占事知來易書之中如隂陽之變化人事之云為無不悉備而吉凶之事自有祥兆祥如春秋傳是何祥也之祥言其先兆也但言吉事而不言凶姑舉其一而因可見爾然唯易於變化云為理無不具故人事之象之者知其已有之實事唯易於吉事凶事皆有祥兆故人之占而值之者知其未然之休咎蓋上二句以易書言下二句以人之學易者言也天地設位聖人成能人謀鬼謀百姓與能天設位於上地設位於下雖其變化未嘗不行而參贊以成其功能者又必待於聖人也聖人之成能其大者無如作易之功也然聖人豈恃其一已之私智哉其有所為則謀之臣民謀之卜筮雖百姓之愚亦可以與其功能矣與能之與成能雖大小不同然皆為有補於造化而所以致是者亦莫非聖人之功也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣八卦以象告謂卦爻之象示人以意也爻彖以情言謂卦爻之辭各究其理也剛柔雜居而吉凶可見謂卦爻之變明著其占也變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝愛惡相攻吉凶生逺近相取悔吝生即吉凶以情遷也情偽相感利害生即變動以利言也凡易之情隂陽之爻近而相惡則大而致凶害小而取悔吝矣將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈此為掌卜筮者言之也蓋於筮之時而審察其問者之言辭則不待蓍策而先知其邪正矣若其人之不正則豈唯蓍策有所不告乎吾之掌筮者雖不為之筮可也繫辭下篇自十一章以下文意多不屬疑其為聖人之遺言而簡編斷絶乃傳易者掇拾以附於後非一時成章之言也右第十二章周易參義卷八
