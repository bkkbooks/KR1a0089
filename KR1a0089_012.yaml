body:
  text: 周易參義卷十二元梁寅撰雜卦傳乾剛坤柔比樂師憂臨觀之義或與或求雜卦言卦之反對而推明其義與本卦之名義或異或同不必其合也比樂者上下親比故樂也師憂者兵凶戰危故憂也或與或求者以我臨物則上與乎下也物來觀我則下求於上也屯見而不失其居蒙雜而著屯動乎險中故見陽居下得民故不失其居蒙者幼穉故雜五二志應而有聖功故著震起也艮止也損益盛衰之始也人君損下以益上則始雖自益而終則自損故損為衰之始損上以益下則始雖自損而終則自益故益為盛之始大畜時也无妄災也萃聚而升不來也升不來者唯務上進而不能自反也謙輕而豫怠也謙輕者自輕其尊貴豫怠者自怠而逸樂噬嗑食也賁无色也有色之為賁尤不若无色之為賁也兊見而巽伏也隨无故也蠱則飭也隨者大亨之時故為无事蠱者壞亂之時故當戒飭剥爛也復反也晉晝也明夷誅也井通而困相遇也通者澤可以及物相遇者值險難之時咸速也恒久也涣離也節止也解緩也蹇難也睽外也家人内也睽者二女志在外家人者女正位乎内否泰反其類也大壯則止遯則退也君子時當大壯則止於朝以行道時當遯則退於野以全身大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也人處豐之時則多故舊處旅之時則少親友不言旅寡親而言親寡旅者取其韻協也離上而坎下也離明言君上之德坎險言臣下之難小畜寡也履不處也小畜以一柔畜五剛故寡履所以行而進故不處需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也旣濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也蔡氏曰自姤以下有亂簡按雜卦例皆反對協韻為序今以其例改正大過顚也頤養正也旣濟定也未濟男之窮也歸妹女之終也漸女歸待男行也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也周易參義卷十二
