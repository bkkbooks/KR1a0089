body:
  text: 周易參義卷七元梁寅撰繫辭上傳天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣聖人之作易與天地凖而天地之道皆備於易故此條上一截言天地下一截言易盖觀於天地則見易也陽成形之大者為天尊而居乎上隂成形之大者為地卑而居乎下易書之作純陽之卦定名曰乾純隂之卦定名曰坤豈非取法於天地乎大之為天地小之為萬物有髙而陳列於上者有卑而陳列於下者易之六爻則陽爻為貴隂爻為賤五上為貴初二為賤又豈非法於天地萬物乎陽為剛健其動有常隂為柔順其靜有常而易之剛以斷其吉柔以斷其凶亦如隂陽之動靜也事之所向善惡各以類而聚物之所生醜好各以羣而分而易之占決之辭吉有吉類凶有凶類亦如事物之有分也象者形之精華如日月星辰之屬皆成象於天者形者象之體質如山川動植之屬皆成形於地者而易之蓍䇿卦爻隂變為陽陽化為隂亦如象形之變化也有造化之易則有易書之易而造化之易因象而見理易書之易亦因象而見理至哉聖人作易之功乎是故剛柔相摩八卦相盪此言易卦之變化乃聖人之所以體法乎隂陽者也卦爻之始剛柔兩畫謂之兩儀以兩儀而生四象以四象而生八卦又以八卦而生六十四卦皆下體不動而從上加之由二而四由四而八如兩物摩戞而成故謂之相摩由八而十六由十六而三十二由三十二而六十四如圜轉推盪而出故謂之相盪然摩之與盪雖有廣狹之殊而皆變化自然之妙也鼓之以雷霆潤之以風雨日月運行一寒一暑鼓物者雷霆潤物者風雨日月之代明寒暑之錯行此所謂乾道變化也乾道成男坤道成女人與物得陽之性者則健而成男得隂之性者則順而成女此所謂各正性命也上一節為變化之成象者此一節為變化之成形者而其象與理皆於易卦見之也乾知大始坤作成物大始者有氣而无形故乾知之以運行所謂萬物資始也成物者形因氣而具故坤作之以發育所謂萬物資生也邵子曰陽不能獨立必得隂而後立故陽以隂為基隂不能自見必待陽而後見故隂以陽為倡陽知其始而享其成隂效其法而終其勞也乾以易知坤以簡能上云乾知坤作言乾坤之成化各有職也此云乾易坤簡言乾坤之成化本无心也乾健而動惟主於生物而未嘗艱難險阻焉此以易而知也乃乾之无心也坤順而靜惟在於成物而未嘗煩擾作為焉此以簡而能也乃坤之无心也以无心之化盡父母之職非天地之大德乎又曰龍興雲致虎嘯風生乾始物之易者如是也風霆流行庶物露生坤成物之簡者如是也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業上言乾坤之易簡此則言人之易簡也人之易簡所以法乎乾坤也有親可久為賢人之德以其心之存主者言之有功可大為賢人之業以其事之施為者言之然德業如是而但謂之賢人者盖言可久可大則僅可而已非其至也至下文言成位乎其中則為聖人矣易簡而天下之理得矣天下之理得而成位乎其中矣德可久而无所閒斷此易之至也日新之盛德也業可大而无所偏滯此簡之至也富有之大業也易簡之工夫至於如是則天下之理无一之不得矣豈非盡性之聖人乎故又曰天下之理得而成位乎其中矣成大君之位於天地之中所謂與天地參者也於此觀之聖人即乾坤也乾坤即聖人也右第一章聖人設卦觀象繫辭焉而明吉凶聖人設卦言始畫卦也庖犧仰觀俯察逺取近取而八卦成列矣然有其象而未有其辭也至於文王則觀全卦之象而繫之以彖辭周公繼之則又觀六爻之象而繫之以爻辭盖无非明著其吉凶也卦之始設吉凶之理具矣然繫之以辭則吉凶愈著是吉凶因辭而後明也剛柔相推而生變化隂陽剛柔一也然隂陽本於造化剛柔近於人事隂陽者氣而已剛柔則有形質也故易言剛柔者為多焉剛柔相推言卦爻剛柔迭相推盪也柔旣推剛剛復推柔而一變一化徃來不窮卦爻之與蓍策莫不然也是故吉凶者失得之象也悔吝者憂虞之象也此一節言觀象而繫辭也易書之辭有吉凶悔吝所以應人事之變人事之變有失得憂虞必決於易書之辭故人之得不自見也而觀於易之吉非得之象乎人之失不自見也而觀於易之凶非失之象乎人之憂虞亦不自知也而觀於易之悔吝又豈非憂虞之象乎人之得失憂虞有以驗乎易易之吉凶失得有以應乎人人於其吉而加慎焉於其凶悔吝而深戒焉則可謂善於用易矣變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也此一節言剛柔相推而生變化也易之六爻柔變而趨剛剛化而趨柔此卦爻之動而未定也而隂進為陽陽退為隂其象於此而見之變之極為剛化之極為柔此卦爻之靜而已定也而隂之為夜陽之為晝其象於此而見之然六爻之中又有以寓三極之道焉六爻隂陽為至著之象則動靜皆可見三極為至㣲之理則必動而後見故初二之爻動則地之道見矣三四之爻動則人之道見矣五上之爻動則天之道見矣然隂陽之運不外乎三極三極之道不離乎隂陽故三極必具於六爻盖非兩則不能立也是故君子所居而安者易之序也所樂而玩者爻之辭也人所居之位有上下而易之六位亦有上下君子善於體易則居上位而盡為上之道居下位而盡為下之道是其所居之安者以其順六爻之序也凡卦爻之辭該天下之理君子之修已治人處常應變辭无不備焉故於无事之時玩而得於心則於事來之際有以見諸用是可樂而可玩者无如六爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利象者六爻之象辭則卦爻所係之辭也變者一爻之變占則變爻所值之辭也君子靜而學易則觀象玩辭有以明六爻之理動而用易則觀變玩占有以盡一爻之時若是則是非善惡旣素明於心吉凶得失復无疑於事其行其止无一不合於易矣然易即天道也合乎易即合乎天也人不違天天亦不違人矣故天之降祐皆出自然而无一之不吉无一之不利君子之體易者盖如此右第二章彖者言乎象者也爻者言乎變者也彖謂全卦之辭爻謂六爻之辭全卦非无變也然取象之意多故曰彖者言乎象六爻非无象也然取變之意多故曰爻者言乎變吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也此言易有以盡人事之變也人之用易者能省其失得則有吉而无凶不然則不免於凶矣能謹其小疵則无悔吝不然則悔吝至矣能補其過則无咎不然則有咎矣是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭陽貴隂賤固異矣然以六位觀之二四則四貴而二賤五三則五貴而三賤上初則上貴而初賤是則列其貴賤者存乎六爻之位也陽大隂小固異矣然泰小徃而大來否大徃而小來有大畜必有小畜有大過必有小過小之與大未嘗不並立是則齊其小大者存乎已成之卦也卦之與爻有吉有凶固不同矣然有卦吉而爻凶者有卦凶而爻吉者有爻當位而反凶者有爻不當位而反吉者易之辭皆有以辨之是則辨其吉凶者存乎卦爻之辭也憂悔吝者存乎介震无咎者存乎悔以吉凶悔吝四者言之則吉凶易見悔吝難知惟明者察之於未形謹之於欲動然後可以不至於悔吝故憂悔吝之至者在於辨善惡之分界也所以无咎者以其善補過也然必先悔過而後能補過故能震動其補過之心者在於先自悔其過也是故卦有小大辭有險易辭也者各指其所之卦之大者如復泰之類其小者如睽困之類大卦之辭平易小卦之辭艱險其或險或易各隨其善惡之所向而已右第三章易與天地凖故能彌綸天地之道天地之大覆載萬物无不畢具而聖人之作易三才之道亦无不備此易之為書所以與天地齊凖也易旣與天地凖則天地之有所不及者易能彌綸之此又易之所以參天地而贊化育也仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物游魂為變是故知鬼神之情狀易之所言者隂陽也然天地幽明者隂陽之形體始終死生者隂陽之循環精氣鬼神者隂陽之聚散是三者皆於易而見之故聖人以易之書而明其理則在天者有象在地者有形仰觀於天見天有晝夜上下之文而天之幽明之故可知也俯察於地見地有南北髙深之理而地之幽明之故可知也天地之化循環不窮有始必有終有生必有死故推之於前而見夫氣之始則人物之所以生者其説可知也要之於後而見夫氣之終則人物之所以死者其説可知也隂精陽氣合而成物則自无而有自隱而顯魂遊魄降散而為鬼則自有而无自顯而隱自无而有神之情也自有而无鬼之情也顯而為物神之狀也隱而為變鬼之狀也鬼神之情狀豈不因氣之聚散而知乎此一節言窮理之事與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛易與天地凖者易之配於天地也與天地相似聖人之配於天地也夫天地之廣大也而聖人能似之天地之變化也而聖人不違之盖唯其能似之是以不違之也聖人之心如是果何異於天地之心乎然天地之道知仁而已故聖人之道亦知仁而已聖人之知周乎萬物而无一物之不知其知之大而无外也道濟乎天下而无一物之不體其仁之大而无外也然其周萬物者非私知濟天下者非小惠故不至於過差而為知仁之極至也旁行者應變无方故不流於變詐而能守其正樂天知命者理悦於心而順受其正故不至於憂而无入不自得此則知之常而无間也安土敦仁者隨寓而安而厚重不遷故能愛而不忘其濟物之心此則仁之常而无間也然其不流也不憂也能愛也是亦皆見其知仁之極至也此一節言聖人盡性之事而與天地相似一句為之綱下文言知仁之兩盡則皆與天地相似之事也範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神无方而易无體聖人以天地之心為心然後天地之妙用可見也故天地之化无窮聖人則範圍之不使其或過萬物之生不一聖人則曲成之不至於或遺此其所以贊化育者也晝而為夜夜而復晝屈伸徃來道无不在而聖人又以兼通而黙契焉此又其所以知化育者也聖人為天地立心者如此則夫至神之妙无有方所易之變化无有形體又豈不因是而後見乎盖神者造化之神也有時在隂有時在陽兩在而不測其可以方所求乎易者造化之易也隂變為陽陽化為隂徃來而不窮其可以形體拘乎然神㣲无方易顯无體人知為造化之妙爾而不知聖人之大有功於天地也使聖人範圍之或過曲成之或遺而又不能兼通乎晝夜則神妙不著變化不行其无方者有方无體者有體造化非造化而聖人非聖人矣此一節言聖人至於命之事右第四章一隂一陽之謂道天地之間无徃而非一隂一陽也大之為四時小之為一息徃來之機未嘗有間是孰使之然哉曰道也道非器不形器非道不立自人觀之則有先後有精粗然本非可以先後言亦非可以精粗判故但曰一隂一陽之謂道盖聖人於隂陽之運行處指以示人以明道之全體也繼之者善也成之者性也程子嘗言動靜无端隂陽无始此言繼之者善成之者性盖亦姑從動處言之耳其實動以前又有靜靜以前又有動也繼之者氣之動善則理之隨氣而發見者也所謂萬物資始也元亨誠之通也无極之真二五之精妙合而凝也成之者形之靜性則理之隨形而各具者也所謂各正性命也利貞誠之復也乾道成男坤道成女也然繼之成之即隂陽之迭運而分言也曰善曰性即天道之流行而賦予也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣道之全體繼之則為善成之則為性在天者不異於人在人者不異於天所謂不為堯存不為桀亡者也然有是隂陽之氣而人物之生各殊則其氣禀未免於各異而其所見未免於一偏也故仁者但見發生流動處以為仁而不復知有知知者但見斂藏貞靜處以為知而不復知有仁是各得道之一隅而自謂之全體也若百姓之愚不肖則日用之間道无不在而鮮能知之是又居仁知之下者矣仁知者旣如彼而百姓者又如此則明夫道之全體者誰乎故曰君子之道鮮矣所謂鮮者鮮能知之由之也顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉天道者一誠之通復而已矣論其發育則雖若有心而實无心論其成功則雖若可名而實難名是故仁本在内而發見於外此顯諸仁也元亨誠之通也用本在外而收藏於内此藏諸用也利貞誠之復也然其發育也謂之鼓萬物則天下雷行物與无妄若有心矣而又謂之不與聖人同憂則四時自行百物自生豈非本无心乎其成功也曰盛德大業則日新而久富有而大若可名矣而又贊之曰至矣哉則上天之載无聲无臭又豈非難於名乎盖顯仁藏用乃造化之運行不與聖人同憂則顯仁藏用之自然盛德大業之至則顯仁藏用之成就也富有之謂大業日新之謂盛德富有者大而无外其生物之不測乎日新者久而无窮其至誠之无息乎生生之謂易一闔一闢徃來不窮造化之易也變動不居周流六虚易書之易也其生生者隂陽也而所以生生者理也成象之謂乾效法之謂坤生生之謂易與此二句皆兼造化與易書言之也成象者畧成乎懸象乃法之未定者效法者呈見其條法乃象之已形者盖乾主氣之始坤主形之成合而言之即生生之易也生生之謂易猶言一隂一陽之謂道成象效法猶言繼善成性也極數知來之謂占通變之謂事極蓍策之數而知來則為占此事之未定者也通天下之變而不窮則為事此占之已決者也隂陽不測之謂神隂陽非神也隂陽之不測者神也一隂一陽變化不窮果孰使之然哉盖神之所為也惟神无方故易无體无方者即不測之謂也无體者即生生之謂也若為有方則非不測之神而其生生者亦有時而窮矣右第五章夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣言易之廣大者贊美之辭也廣言其无不包大言其无不貫此易之體統如是也自其逺而言之則變化之神无在不在而未見其盡自其邇而言之則觸事觸物莫非至理而寂然貞一自天地之間而言之則盈乎六合林林職職而萬物皆備此易之廣大所包貫者如是也夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉凡陽皆乾也凡隂皆坤也易書所言乾坤各有靜有動靜其體而動其用也乾體之靜則專確用之動則直遂此大之所由生也謂之大者乾一而實故以其質言之也坤體之靜則翕聚用之動則開闢此廣之所由生也謂之廣者坤二而虚故以其量言之也聖人曰乾坤易之緼又曰乾坤易之門易之廣大悉備豈出於竒偶二畫之外乎廣大配天地變通配四時隂陽之義配日月易簡之善配至徳易道之大觀於天道人事可見矣易之為書廣大悉備也有似於天地之發育故觀諸天地而易之廣大可見也易道窮則變變則通也有似於四時之推遷故觀之四時而易之變通可見也易之陽竒隂偶義无不具也有似於日月之徃來故觀之日月而易之隂陽可見也此三者皆以易而配天道也易之乾易坤簡皆至善也而有似於聖德之至極故觀之至德而易之易簡可見也此一句又以易而配人事也右第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地易其至矣乎將言聖人之體易而先贊美易道之極至也盖易書者所以具天地人之理而人心之易即天地之易也故聖人以易而崇德廣業則觀象玩辭而知无不明其德崇矣觀變玩占而行无不順其業廣矣知无不明則識見之超卓故曰知崇行无不順則踐履之篤實故曰禮卑然其知禮者雖非拘拘於法天地而自與天地似故又曰崇效天卑法地也天地設位而易行乎其中矣成性存存道義之門有天地之易則有人心之易故此特舉天地以明人心也天位乎上地位乎下此對待之體也不易者也隂陽變化徃來不窮此流行之用也變易者也不易之體旣立則變易之用不窮矣而以觀於人心則本成之性得於天也存而又存在於人也盖成性即知禮也存而又存即知崇禮卑也知禮存性則道義由是出矣自我所禀受而言則曰成性自人所共由而言則曰道義成性為體而道義為用也然以性存為道義之門者可見此心常存則知禮對立而衆善之出莫不由是也有天地之位而後易行有知禮之門而後道義出人心之與天地其體用之同如此云右第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象天下之物雜亂而並見不可勝窮也而聖人獨有見於此於是畫卦以擬度其形容倣象其物宜而名之曰象是凡卦畫之交錯无非萬物之形似也聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻天下之事紛紜交錯未嘗一定也而聖人獨見於其動於是觀萬事之㑹通以行其常道而繫辭於爻以斷吉凶故名之曰爻以㑹與通對言之則㑹者衆理之所集通者一理之可行以㑹通與典禮對言之則㑹通者通其變典禮者守其常盖能變然後能常也言天下之至賾而不可惡也言天下之至動而不可亂也物之雜亂誠可厭惡也然雜亂之中有至㣲之理存焉是安可以惡之乎事之變動固易惑亂也然變動之中有一定之理在焉是又何至於亂乎擬之而後言議之而後動擬議以成其變化觀象玩辭而以之發言則時然後言而言无非道也觀變玩占而以之處事則動惟厥時而動无非道也言動无非道則變化之妙不在於造化而在於吾身矣故擬之議之者所以成吾之變化也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎鶴鳴子和我爵爾靡言誠信感通之道也然誠信感通莫大於言行故夫子特明之夫人之居於一室其言之善則逺猶應之也而況於近者乎其言之不善則逺猶違之也而況於近者乎言出乎身而加乎民言之不可掩也行發乎邇而見乎逺行之不可掩也自君子觀之人之言行如門之有樞如弩之有機樞機之發或當或否而榮辱皆由之言行而善雖天地之大无不感通也是可以不慎乎言行之慎即誠之謂也君子之心无不感通者亦誠而已矣同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭君子之於人其行不同而心則同也故以其行言之則或出或處或黙或語是未必同也以其心言之則二人同心物莫能間雖金之至堅可斷矣同心之言深有意味雖蘭之至馨不過矣是則君子之所同者豈常情之苟合乎初六藉用白茅无咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以徃其无所失矣物錯諸地而得其安已為慎矣而又藉之以白茅則慎之至也天下之事過則有患唯過慎則不為患故无咎也夫茅之為物雖薄而用之可重況所藉者深厚而非止於薄物乎以是慎重之心而應夫天下之事將无所處而不當矣勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也不出戸庭无咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身㡬事不密則害成是以君子慎密而不出也節之初九言不出户庭乃行之有節也而夫子於此又以言之有節者發明之盖能謹行而不能謹言亦非全身之道也子曰作易者其知盜乎易曰負且乗致寇至負也者小人之事也乗也者君子之器也小人而乗君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乗致寇至盜之招也右第八章天一地二天三地四天五地六天七地八天九地十此天地之數五十有五即河圖之數也以生數成數言之則一二三四五為生數六七八九十為成數其生於天者成於地生於地者成於天也以竒數偶數言之則一三五七九為竒數二四六八十為偶數竒為陽而屬乎天偶為隂而屬乎地也卦止於八而數必至於十者八為隂陽數而十為五行數也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此一節又推明天地之數也天數五者五竒數也地數五者五偶數也五位相得者竒數與偶數相得也各有合者生數與成數各有合也五竒之積為天數二十五五偶之積為地數三十成變化者陽竒隂偶之所成也行鬼神者鬼神行於陽竒隂偶之中也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後掛大衍之數五十即河圖之虚五者然河圖者天地自然之數大衍乃人用之以揲蓍求卦者也謂之大衍者參天兩地以為五小衍之為十兩其五也大衍之為五十十其五也其用四十有九者置其一不用以象太極而四十九者合七七之數然後有以成蓍策之變化也分而為二者以四十九策分置兩手也象兩者以左右手象天地也掛一者取一策懸於左手小指之間也象三者所掛之一策以象人而配天地是象三才也揲之以四者先釋右手之策而以右手四四而數左手之策又釋左手之策而以左手四四而數右手之策也象四時者以四數而象之也歸竒於扐者兩手之策四四之後必有竒零或一或二或三或四左手者扐其竒於第四第三指之間右手者扐其竒於第三第四指之間以象閏者如積分而成閏月也五嵗再閏者前後閏大畧三十二月在五嵗之中而揲蓍之法始掛一次揲左次扐左之竒次揲右次扐右之竒是一變之中凡五節必再扐然後别起一掛故以象五嵗之再閏也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日乾坤二篇之策以掛扐之外見存策數言之也揲蓍之法凡三揲掛扐通十三策而見存三十六策為老陽之爻三揲掛扐通十七策而見存三十二策為少隂之爻三揲掛扐通二十一策而見存二十八策為少陽之爻三揲掛扐通二十五策而見存二十四策為老隂之爻然此言乾坤之策數者盖易以變為主故但據老隂老陽言之耳若以二少計之則少陽一爻二十八策六爻為一百六十八少隂一爻三十二策六爻為一百九十二合之亦三百六十也二篇之策萬有一千五百二十當萬物之數也上下經之卦爻隂陽各半陽爻百九十二每爻策三十六總六千九百十二隂爻百九十二每爻策二十四總四千六百八若以少隂少陽計之數亦不異也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣天道之妙不得而見也然有易之辭以告於人而後福善禍淫之道寓於吉凶悔吝之占是天之道因辭而後顯也人事之常未見其妙也然有數之神以決其疑而後動靜舉措之間无非天理自然之妙是人之行以數而後神也夫卦爻之辭蓍策之數有如是則可以酬酢萬變而人謀无不遂可以祐其神化而鬼謀无不協易之用大矣哉子曰知變化之道者其知神之所為乎隂變為陽陽化為隂者變化也所以變化者道也其變化之不測者神也神固不離於道矣而道非神也故曰知變化之道者其知神之所為乎右第九章易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占道之在天下无一物之有間也而該其道者唯易書盡其道者唯聖人而已然不曰聖人有易之道四而曰易有聖人之道四者盖易之道无不備而唯聖人能盡之則雖謂之聖人之道斯可也道大矣不可悉數矣今曰有四焉則四者果足以盡道乎盖易之為書不越乎四者則道之至大亦不出四者之外也夫聖人之言以易而言也故有尚於其辭則其英華發外者皆指其所之之理而言无非道矣聖人之動以易而動也故有尚於其變則其與時偕行者皆化而裁之之妙而動无非道矣聖人之制器以易而制之也故有尚於其象則其用器中度又皆象其物宜者而制器有非道乎聖人之卜筮以易而筮之也故有尚於其占則其開物成務又皆極數以知來者而卜筮有非道乎以者以易之書也尚者配而合之也聖人於易道之四各有合焉則以易之道為聖人之道豈為過哉然易有象而後有辭筮有變而後有占象變一類也辭占一類也而此先言尚辭何也盖自聖人而言之以言動器卜為序而不以象辭變占為序也是以君子將有為也將有行也問焉而以言其受命也如嚮无有逺近幽深遂知來物非天下之至精其孰能與於此此言尚占之事而辭則未占之前固當玩之矣夫君子之有為有行則其問之於蓍必有命之之言而蓍之受其命也如器之嚮應故雖萬里之外有以灼見而何間於逺近雖鬼神之心有以明知而何間於幽深其知來物者如是非天下之至精乎參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此此言尚象之事而變則象之未定者也夫求數之始或三數而變或五數而變參之伍之更相反覆以不齊而要其齊此所謂變也數之未定者也究而極之則以六對九以七對八乃左右相交而錯其數六上生七為陽九下生八為隂乃上下相生而綜其數此所謂數也變之已定者也是故通三揲兩手之策即參伍以通其變也旣通其變則隂陽之老少於是可見而天地之文遂成矣然僅一畫則未成六爻動靜未見故止謂之文文者象之未定也究七八九六之數即錯綜以極其數也旣極其數則卦爻之動靜於是可見而天下之象遂定矣旣成六爻則爻有變動吉凶始著然後謂之象象者文之所成也此合象變而言之而又獨以為至變者盖象者變之已成變者象之未定象非難知而求其變為難故以為非天下之至變不能與也易无思也无為也寂然不動感而遂通天下之故非天下之至神其孰能與於此易具四者之道而无所思慮无所作為其體之所以立用之所以行亦无心而已矣故其未用也言在於册象在於畫蓍在於櫝雖至虚至靈而退藏於宻其體寂然未嘗妄動是其靜而无心者可知也及其用之也揲蓍以變而受命如嚮所問者善則應之以善所問者惡則應之以惡而天下之故无不感而通焉是其動而无心者可見也靜而无心則廓然而大公未嘗動於私也動而无心則物來而順應未嘗滯於一也盖其寂然不動之中固有以包含天下之動而其感而遂通之際則其中之至靜者又未嘗與之俱徃焉故其寂然者无時而不感其感通者无時而不寂此豈非至神之不測者乎若或寂專於寂而感偏於感吾見其物則不通而已而何以神妙萬物邪然此以蓍卦言之耳若推而論之則如天地之大人心之㣲其一體一用亦安有不然乎夫易聖人之所以極深而研幾也易之深也於天下之理无不備而聖人則觀象玩辭有以極其深易之幾也於天下之事无不明而聖人則觀變玩占有以研其幾極深者究覈其精𤣥研幾者審察其㣲昧盖聖人之體乎易者如此也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至夫聖人之深有得於易之深也則能以一人之心而為天下之心聖人之幾有得於易之幾也則能以一人之慮而周天下之事然其通志也所感在此而所應在彼有不知其通其成務也物各付物各得其所有不知其成是果何為而然哉曰其心之神爾夫人之速也未有不疾其力者而神則不疾而自速矣人之至也未有不由於行者而神則不行而自至矣唯深唯幾唯神始也在於易而今也在於聖人聖人之心其即易矣乎子曰易有聖人之道四焉者此之謂也右第十章子曰夫易何為者也夫易開物成務冐天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑聖人之易為天下而作亦為天下而用也盖上古之世風氣未開大樸未散斯民迷於吉凶之途而莫知所趨故聖人為之作易而教之占以開明其心志成就其事業而其為書也大而天地之化小而動植之宜逺而四海之治近而一身之修其為道盡寓於卦爻之中而无一或遺者此所謂冐天下之道也然又曰如斯而已者見道之止於是而无他也其為書旣廣大悉備則无所用而不周无所處而不當矣故觀之天下其嚮背之不同者人心也而易足以通之其難成而易敗者功業也而易足以定之其事變之萬殊者未免於疑也而易足以斷之盖唯易有以開物故用之則足以通志唯易有以成務故用之則足以定業而斷疑唯易有以冐天下之道故用之以通志則曰天下之志用之以成務則曰天下之業天下之疑嗚呼吾於易之全體大用見聖人之為天下者至矣而或言易不主卜筮者則自謂見易之大也而不知適以小乎易也是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於宻吉凶與民同患神以知來知以藏徃其孰能與於此哉古之聰明睿知神武而不殺者夫蓍以七為數則七七四十九而屬乎陽是未成卦而未有定體故其德圓而神卦以八為數則八八六十四而屬乎隂是因蓍成卦而已有定體故其德方以知至於六爻之變易則周流六虚唯變所適然其告人者善以吉告惡以凶告亦未嘗不明著也聖人之心全體此易而三者之德无一不備故其靜也方寸之潔淨即易之潔淨而渾然此理未嘗形於事此所謂洗心而退藏於宻也及其動也以天下之休戚為吾身之休戚而用蓍之神則得失之幾无不判決用卦之知則吉凶之理无不素明此所謂與民同患而知來藏徃也然若此者豈一毫私知之所能與哉盖聖人之至誠如神而明於吉凶得夫蓍卦之理而无藉蓍卦之用如古之聰明睿知之君雖有神武而不尚誅殺也以是論之卜筮者聖人固為天下而設也若聖人之於事則先天而天弗違也後天而奉天時也彼蓍龜者又安能違聖人之心乎是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫聖人之聰明睿知獨首出乎天下者也故明於天之道而知造化之大必待我而參贊察於民之故而知天下之事必由我而成立於是天生神物有蓍可筮有龜可卜聖人則興其神物以為卜筮焉民眩於事而泯泯棼棼莫明吉凶聖人則教民卜筮以導其用焉夫作易者非聰明睿知之聖人固不能也而至於用易者非聖人之極其誠敬亦何以盡其用乎聖人平居之時已无不誠敬矣而於諏筮之際則尤致其齋戒焉盖齋則湛然而純一戒則肅然而警惕此誠敬之至也然至誠則如神誠者神之本神者誠之用也其誠敬如是則其本心之德豈不神明之至而有以知來乎其兩以明言之者明察則窮理之明也神明則臨事之明也是故闔户謂之坤闢户謂之乾一闔一闢謂之變徃來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神易之為道大矣在於造化者此道也在於萬物者此道也在於生民者亦此道也故此一節自造化之運推而至於萬物之生又推而至於聖人之教亦猶中庸首章言性道教之意也原其初而論之太極之本體亦漠然至靜而已故動靜雖无端而亦必以靜為之始以由靜而後動也當其靜也如户之闔而陽氣未動萬物未生則謂之坤及其動也如户之闢而氣已亨通物已昭蘇則謂之乾有靜斯有動如戸之有闔斯有闢則謂之變靜而復動動而復靜一徃一來循環不窮則謂之通此四句皆言造化之運也然其運行而發育也於其氣之始聚而可見則謂之象於其形之已成而貞固則謂之器此二句言萬物之生也萬物旣生則造化之能事畢矣而裁成輔相者又有待於聖人故因造化之功萬物之生而制為政今以盡其用者則謂之法法旣立矣斯民之日用或出而或入无不賴是以安利而其讙欣鼓舞有莫知其然者是則謂之神此二句又言聖人之教也然造化之大萬物之多人事之異亦安有出於易書之外乎是故易有太極是生兩儀兩儀生四象四象生八卦易有太極者以一為本也乃生生之理也太極生兩儀而至於八卦者以兩為用也乃生生之序也所謂易者即兩儀四象八卦也首言易有太極則隂陽函太極也復言生兩儀四象八卦乃太極生隂陽也觀太極於兩儀未分之前則統體一太極也觀太極於兩儀四象八卦之中則隂陽各一太極也至於周子言无極而太極與易豈異乎盖言易有太極則見理之與氣有則俱有本无先後也然論其次第亦必先有是理然後有是氣故周子首之曰无極而太極盖指其理之不雜乎氣者言之也然由太極而分隂陽由隂陽而分五行此造化之序也由太極而兩儀兩儀而四象四象而八卦此畫卦之序也周子因大傳之意以明造化之妙盖又自為一説矣而推明畫卦之意者其唯邵子加一倍之法乎八卦定吉凶吉凶生大業八卦旣成則卦有小大大為吉而小為凶爻有當否當則吉而否則凶此吉凶之所以定也吉凶旣定則人之卜筮者吉則行之凶則避之此大業之所以生也是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜天地之大者形體也四時之大者變化也日月之大者光明也富貴之大者爵位也聖人之大者制作也蓍龜之大者吉凶也詳言數者之大而終之以蓍龜且言之又加詳焉則上文取譬之博者无非以明卜筮之大也是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易之合於造化者其象數不同而理同也夫聖人之作易其觀於天地之間何徃而非易也而造化之易則其取法之大者耳是故天之生物而百莖之蓍有應於和平此植物之神者也聖人之作易則隂陽之老少者其法於是乎天道之運而隂陽寒暑徃來之不窮此變化之大者也聖人之作易則卦爻之動靜者其效於是乎在於天而其象著則日月星辰者是也而其行有順逆則其應有吉凶故聖人又取其象以明人事焉出於地而其數具則河圗洛書者是也而其生成竒偶者亦相為經緯故聖人又則其數以為八卦焉合而論之則蓍之數四十有九河圖之數五十有五洛書之數四十有五此其數之本不同也而聖人之易皆則焉何也以其理之同也隂陽寒暑者氣行於地而生百物日月星辰者象成於天而為三光此其象之本不同也而聖人之易皆效焉何也亦以其理之同也然其理同矣而象數者果不得而通乎夫河圖之虚五為大衍之數洛書之五含五亦大衍之數則三者之數未嘗不相合也隂陽寒暑之始終循環所以成四時日月星辰之疾徐贏縮亦以成四時則天地之象未嘗不同運也聖人之易俯仰逺近所取之各殊辭變象占發揮之不一然一言以蔽之曰擬造化之易而已矣易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易之始作也有其象而亡其辭則示人以意而已然蚩蚩蠢蠢之民或不能觀象而見意也故後聖人懼之而又繫之以辭焉所以告其得失也定之以吉凶焉所以斷其從違也聖人教人之意於是盡矣右第十一章易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也大有之上九曰自天祐之吉无不利其所以吉者盖以上九能信而順也天之助順人之助信亦各舉其一耳其實天亦助信人亦助順天之與人同此理同此心未有人從而天違者也六五一隂而五陽應之上九能下從六五則信順可知矣盖五之交孚信也而上能履之謙退不居順也而上能思之則上之孚信恭順皆因下於五而見之也且上能下於五豈唯信順而已哉是又得尊尚賢者之道也其獲天之祐而吉无不利盖有不期而自然者矣信順如是尚賢如是天且佑之矣而況於人乎況於賢者乎是盖不言可知矣按此錯簡恐當在下傳第五章盖前第七章所釋者七爻皆不稱易曰下傳第五章所釋者十八爻則皆稱易曰故當以類而從也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神立象設卦繫辭言作易之功也變通鼓舞言用易之妙也然此五句之義其所重者尤在於盡之一言夫意有未易盡也而聖人之作易則先立之象於是擬諸形容象其物宜而意无不盡矣情偽未易盡也而聖人從而設其卦於是位有貴賤卦有小大而情偽盡矣言有未易盡也而聖人又從而繫之辭於是當名辨物正言斷辭而言无不盡矣然此作易也至於用易則又有至妙者存焉故利者難於盡也而聖人有變通之道焉則其於卜筮也化而裁之推而行之而天下之利安有不盡乎然五者之盡獨於繫辭曰盡其言何也其之一字非指聖人言之歟意者易之意也情偽者天下之情偽也利者天下之利也神者易之神也而言則聖人之言也書不盡言言不盡意意非言可盡則立象以盡矣言非書可盡而又謂繫辭盡其言何也曰言止於是而已矣而意之无窮聖人固貴於象也故特首之曰立象以盡意嗚呼吾知聖人之言有不得已而言之也乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣乾坤者非止於乾坤二卦凡陽皆乾也隂皆坤也如言乾坤易之門者亦然然彼以造化言此以易書言其意固異也自易道體統而觀則乾陽坤隂一動一靜乃易書之所包畜者故曰乾坤其易之緼邪自乾坤成列而觀則易之為道又不在乾坤之外故曰乾坤成列而易立乎其中矣盖易之包乎乾坤者易以已成之卦言之而乾坤以竒偶之變化言之也易立於乾坤之中者易以竒偶之變化言之而乾坤以卦之成列言之也易即乾坤乾坤即易故謂爻為乾坤可也謂卦為乾坤亦可也謂爻為易可也謂卦為易亦可也然有一隂一陽則必交變然後成卦也若隂止於一隂不復能為陽陽止於一陽不復能為隂則乾坤毁滅而无復成卦矣故曰乾坤毁則无以見易也易旣不可見則卦畫不立而陽竒隂偶不能變化所謂動而无靜靜而无動物則不通而已矣故曰易不可見則乾坤或幾乎息矣聖人論隂陽之成易而反覆以明之所以見有此隂陽則必有此易造化之妙自有不容於隱者其意至矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業夫易之所具者隂陽而已然形而上者隂陽之理也形而下者隂陽之事也其以形而上下言之者見道之與器本不相離爾盖形者動而可見之時也自此而上者无體故謂之道自此而下者有體故謂之器以易觀之則象也爻也辭也皆器也而象之意爻之情辭之所指是乃道也聖人之作易精粗一致无不備矣而其用之於天下何徃而非是道邪故因其自然之化而裁制之則謂之變變者所以見時事之殊也因其變之可行者而推行之則謂之通通者所以合時事之宜也變而通之可謂趨時矣盡利矣使民不倦矣則舉而措之於天下四海之廣兆民之衆无所用而不周无所處而不當其謂之事業也亦宜哉盖事業本於變通變通本於隂陽隂陽本於道道與隂陽易之該乎造化者也變通事業易之見於人事者也造化人事吾舍易其何以觀之是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭易之作也以卦畫之交變而窮盡天下之紛雜以六爻之繫辭而鼓舞天下之動作則天下之萬變舉不出乎易之外故謂之存乎卦存乎辭也化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎德行易之用也因其自然之化而裁制之者存乎變變者變革之道而未見於事也因其變之可行而推行之者存乎通通者不窮之義而已見於事也然易之道大苟非其人亦不能用之矣故神而明之則存乎其人盖必其心之至神然後能明於易而知來也黙而成之不言而信則存乎其人之德行盖必其心之至誠然後能如神之前知也合前一節而論之卦之與辭言其粗也而不遺乎精變而通之見於事也而必本於心盖有易書之易則必有人心之易用易而不本之於心則夫人而能用也而何待於聖人哉右第十二章周易參義卷七
