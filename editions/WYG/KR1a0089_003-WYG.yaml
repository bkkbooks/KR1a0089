body:
  text: 周易參義卷三元梁寅撰彖上傳大哉乾元萬物資始乃統天乾之彖辭曰元亨利貞言占者當得大通而利於正耳而夫子之𫝊乃析元亨利貞為天之四徳又别一義也乾者天之道也故專以天道明之大哉乾元者首贊美乾元之大也其曰始物者以乾元對坤元而言之所謂乾主始物者是也其曰統天者以乾元對亨利貞而言之所謂元為四徳之首而貫乎其始終者是也乾元之所以大以其能始物而又能統天爾大抵易之論造化者或以二氣言或以一氣言以二氣言之則乾陽之動為萬物之父坤隂之静為萬物之母故以乾為始物也以一氣言之則四時之循環實一元之无間而陽之大也得以兼乎隂之小故又以乾為統天也然二氣之分亦一氣之有動静耳非判然而為二也程子曰四徳之元猶五常之仁偏言則一事專言則包四者元之始物猶偏言之仁也元之統天猶專言之仁也此一節釋乾之元也雲行雨施品物流形雲行雨施猶所謂神氣風霆也品物流形猶所謂庶物露生也方其氣之運也騰而為雲散而為雨有以見流行之妙及其形之成也飛潛動植林林職職有以見賦予之均於是之時豈非造化亨嘉之㑹歟此一節釋乾之亨也大明終始六位時成時乘六龍以御天乾道之終始即所謂統天者也而大明之者聖人明之也聖人之於乾道於何而明之邪曰以易而明之也自作易言之則觀諸天道以畫六爻自用易言之則觀之六爻而見天道故聖人大明天道之終始者以卦之六位各以時成也六位時成者以六位之成因天之時也初九與九二之半即元也九二之半與九三即亨也九四與九五之半即利也九五之半與上九即貞也聖人明乎此而其心與天合矣故能乘此六陽以行天道焉龍者陽之象而天者其理也聖人之合天亦合其理而已故觀潛見飛躍之象而得隠顯進退之宜則動不違天而天在於我是以人而當天也其取象於龍則其隨時而不測者固可以見而又言時乘以御天焉是尤有以見其進退遲速之在我也聖人之體乾者葢如此此一節釋聖人之元亨也乾道變化各正性命保合太和乃利貞變化者隂變為陽陽化為隂也而此曰乾道變化則二氣之分實一氣之運而陽得以兼隂於是見矣物所受為性天所賦為命性之與命固有分矣然孔子之本意則但以性命為一而自物之所受言之也保合大和言物之保合其生理也朱子以為冲和之氣者以其理與氣合也乃利貞言保合其性乃為利貞也若不能保合則非利貞矣此一節釋乾之利貞也首出庶物萬國咸寜聖人之治天下體乾之道也故彖傳既言乾道而又歸之於聖人首出庶物者兼位與徳言之也盖有聖人之位則必有聖人之徳其位與徳皆超然於億兆之上則萬國之咸寜有不期而自然者矣此一節釋聖人之利貞也至哉坤元萬物資生乃順承天坤元之所以為至者以其能生物而順以承天也至之為義不若大之義矣盖大者尊之之辭至者親之之辭所謂尊天而親地也乾資始坤資生者乾主始物而坤作成之也乾統天坤承天者陽得其全而隂得其半也此一節言坤之元也坤厚載物徳合无疆含𢎞光大品物咸亨坤厚載物則資生之功見矣徳合无疆則承天之道盡矣然其厚而能載者即其合天之徳也含𢎞者坤徳之本體光大者坤徳之發見品物咸亨者坤徳之效騐此一節釋坤之亨也牝馬地類行地无疆柔順利貞君子攸行坤本順也而亦未嘗不健以牝馬為地類見其本順也牝馬而行地无疆見其雖順而能健也若然則柔順而利貞者固坤之徳也而豈非君子之所行乎其曰貞者即剛健之意也此一節釋坤之利貞也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶隂先於陽則迷而失道處陽之後則順而得常以見隂必從陽而順承天施也西南得朋乃與類行後順而得常也東北喪朋乃終有慶先迷則失道也東北雖喪朋然反之西南則終有慶乾主其始而坤主其成是終有慶也安貞之吉應地无疆隂之性常躁其所以躁者以其欲先動而不能也若能從陽以動而安其柔順之貞乃吉之道也人能如是可以應坤之无疆矣屯剛柔始交而難生卦之所以為屯以震之剛柔始交而坎之難生也始交謂一索而得男也難生謂一陽陷於二隂也剛柔始交而即遇難生乃萬物受隂陽之氣當發生之初而鬱結於下未能通暢此所以為屯也動乎險中大亨貞震之徳為動能動則可以大亨坎之徳為險遇險則宜於貞固故云大亨貞彖辭曰元亨利貞而傳不言利者乃用文王本意以釋經非復論四徳也雷雨之動滿盈天造草昧宜建矦而不寜此釋利建矦之意也震雷坎雨之交作而鬱塞乎兩間天下未定之象也當是之時天運方艱而雜亂冥晦為大君者豈能獨立哉所宜建置諸矦以為輔助而後可以濟屯也然矦固建矣又當憂勤惕厲不遑寜處然後可不然則雖衆建諸矦而君道不立天下固无由而治也蒙山下有險險而止蒙山之象暗蔚水之象深險而水在於山下比蒙之地也險在内則其心不平止在外則其行未達此又蒙之意也卦有此二義故其名為蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙之能亨者以亨行而又時中也以亨行者以可亨之道行之也時中者發之當其可而得其時之中也九二當發蒙之任者以亨行而時中非九二乎志應也初筮告也瀆則不告也蒙以養正也其皆亨行而時中歟夫二雖不求五而五自求二此二五之志相應也天下之理有感而後有應二有可行之道故足以感乎五而五應之五以誠求於二故又足以感乎二而二應之為二者守正以感乎五可也若不待其應而往求之則非也初筮告者以問者誠一則在所當告也然二之能告而有節者以其剛而得中也再三煩數而不誠一則彼之問者固瀆而我之告者亦瀆矣若此者所不當告也不當告而反告之則不足以發蒙而適以瀆蒙矣瀆䙝慢也謂言之不行而徒為䙝慢也蒙以養正為聖功者言當其蒙昧之時必先養之以正養之以正而至於開明則可以有作聖之功也作聖之功謂可入於聖也此一句釋利貞之義需須也險在前也剛健而不陷其義不困窮矣時當需待者以險難之在前也以剛健而遇險則雖健而不陷矣夫以乾健之性宜其冒險而進也而乃能知險而不陷焉此其所以為健之至歟若乃妄行而陷於險則反不足以為健而不免於困窮矣曰其義不困窮者言處之有道故自不至於困窮也需有孚光亨貞吉位乎天位以正中也利涉大川往有功也孚光亨貞吉五字為五義而以孚與貞為重九五坎體中實為有孚之象以陽剛中正居尊位則得正之象故言有孚光亨貞吉者以其居天位而正且中也中則為有孚故光明而亨通正則為得貞故无往而不吉其曰往有功者言有孚而得正則往必有功无險之不濟矣坎水為險上文言不陷於險者專以乾三陽言之此曰利渉者亦當兼指三陽而言也曰有孚曰得正曰剛健皆利渉之道也訟上剛下險險而健訟上剛而下險以兩人言之也内險而外健以一人言之也訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利渉大川入于淵也訟之所以吉者以其有孚而窒塞能懼而得中也九五中實有孚也上无應與窒塞也坎為加憂能懼也剛來居二得中也然是四者又以中為本若處得其中則三者皆得不得其中則皆失矣此彖傳所以獨言剛來而得中也其曰剛來者謂訟本自遯而變為三來居二也終凶指上九言也大人指九五言也九五以中正居尊位故訟者之利見所以尚其中正也如虞芮之質成於文王可謂尚中正矣不利涉大川而入于淵者言以剛健而履坎陷是自取不測之禍也需之乾不陷於險得乾之道矣訟之乾自陷於險則失其道者也聖人之戒深矣師衆也貞正也能以衆正可以王矣師貞者行師之道利於得正也師而不正則出不以律不能勝也雖能勝亦幸而已非所謂正也若能以其衆正則得用師之道可以王天下矣夫王者之師先自正而後正人也能以衆正者自正也可以王者正人也剛中而應行險而順以此毒天下而民從之吉又何咎矣九二以剛中之才而六五志應之雖行於險而能以順動此所謂文人者也凡用兵者或將非其人或君不專任皆難以成功矣故必曰剛中而應然兵凶器戰危事若无名而妄動其可乎故又必曰行險而順用兵而如是則雖勞毒其民而其民亦從之以其義動故也昔周公東征有破斧之患宣王北伐違興師之時其民之勞亦甚矣然未嘗有怨者亦以其事之順而不容已也為君将者每如是其吉而无咎亦冝矣吉者必克也无咎者合義也比吉也比輔也下順從也比吉也言比有吉之道也比輔也言比之為義則輔也下順從即比輔之意原筮元永貞无咎以剛中也不寜方來上下應也後夫凶其道窮也夫再筮以審其徳而无咎者以九五剛而得中也陽居尊位元也居中无悔永也以正比下貞也元永貞三徳剛中足以盡之矣九五比於五隂而五隂亦比五此上下之志相應也上謂九五也下謂五隂也小畜大有言上下應之又與此異矣後夫凶者下四隂皆比於五而上六獨居後有後夫之象其道窮者明非時之塞也聖明在上而己獨不比之乃自取困窮之道耳小畜柔得位而上下應之曰小畜四以隂居隂為得其位而上下五陽无不應之故謂之小畜健而巽剛中而志行乃亨卦内健而外巽二五皆剛中而其志行此所以亨也不言故亨而言乃亨者乃緩辭也陽為隂所畜其致亨甚難也若小失其道則不能亨矣卦以隂畜陽為名而論亨之道則不主於隂者此聖人抑隂之意也然陽為隂所畜矣而猶可亨者何也盖陽大隂小陽衆隂寡以小畜大以寡畜衆此陽之志所以得行而隂不能制也然非其健巽而剛中亦豈能亨乎人之當此時者又必有可行之道然後足以致亨也密雲不雨尚往也自我西郊施未行也此又以四而言也主陽言之則陽為君子隂為小人主隂言之則凡柔者皆是非獨小人之謂矣密雲之不雨而尚往者言一隂不能畜五陽而陽氣猶上進也陽氣之上進以雲之興者自我西郊之隂方而其施未行也前既言志行而又言施未行者何也盖志行者主二五而言謂陽志得行而亨也施未行者主六四而言謂未能畜陽而成雨也履柔履剛也說而應乎乾是以履虎尾不咥人亨以兊之和說應乾之剛健是下順乎上隂承乎陽理之正也故雖履虎尾而不見咥其亨宜矣履也者禮也大傳曰知崇禮卑夫謙恭巽順禮之本也人之所履者能極乎恭順則雖遇剛暴之人患可免矣而況其不剛暴者乎乾體剛健非專為暴者而象之以虎所以極言和說之无患也然如兊之所履亦順其正理而己固非邪媚以免禍者也如人臣之事暴君賢者之遇惡人皆履虎尾者也君子於此豈有他道乎亦盡其禮而已矣剛中正履帝位而不疚光明也此又以九五推言亨道也和說以事上者下之所以亨也剛中以臨下者上之所以亨也人君以剛中正履帝位則不至於疚矣此其所以光明也光明者徳盛而輝光也徳而如是乃天徳矣其言不疚而必曰剛中正何也盖剛健者固君道之所貴也然一於剛健則非中正而反為病矣故必剛而中正然後為不疚見君道尤以中正為貴也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也此言小往大來之義也前一節則以上下為往來上尊而下卑也後一節則以内外為往來内先而外後也以上下言之則天地之氣一上一下而君臣上下之交有似焉以内外言之則隂陽健順一内一外而君子小人之辨有似焉是故天本上也而其氣下降地本下也而其氣上騰君本上也而禮下其臣臣本下也而上事其君此君臣與天地同一往來之義也凡陽為健者常為先為始故處内隂而順者常為後為終故處外為君子者善而正故處内為小人者惡而邪故處外此君子小人與隂陽健順同一往來之義也聖人以卦體而明卦辭其義盡矣否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也同人柔得位得中而應乎乾曰同人同人由六二而取義故主二而言之五以陽居陽二以隂居隂是二之位應於五也五剛而中正二柔而中正是二之徳應於五也五為上乾之中則二之得位得中者乃上應於乾也卦之為同人者以此也同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志同人于野而利涉大川皆乾之所行也乾之徳公而无私故可以致同人之亨乾之才剛而有斷故可以濟天下之險然剛而有斷非公而无私者不能也其同人也利涉也又必得正然後可以離之文明而燭理以乾之剛健而勝私二以中正而應於五五以中正而應於二此皆所謂正也其正如是唯君子能之故以為君子之正君子能通天下之志者以其至公也至正也夫天下之心雖殊而天下之理則一常人之心昧於理而局於私故无以盡大同之道君子則明理而无私也故能知千萬人之心猶吾之一心而又能推吾之一心以為千萬人之心此所謂通天下之志也通天下之志而盡大同之道則其曰君子者雖謂之聖人可也謂之天徳可也大有柔得尊位大中而上下應之曰大有卦之所以為大有者以六五居尊得中而獲上下之應也夫柔而居尊則能以貴而下賤柔而用中則能舍己以從人若此者皆得衆之道也其徳剛健而文明應乎天而時行是以元亨卦之徳剛健而文明六五應乎天而時行此所以元亨也夫大有者所有之大也然既有以致其大則必有以保其大六五以柔尊處得中道固有以致其大矣然使其不能剛健則過柔而失其尊不能文明則闇昧而失其中不能應天而時行則上下亦莫有應之者矣如是則雖欲元亨不可得也而何以保其大乎謙亨天道下濟而光明地道卑而上行謙之所以亨者以其能自卑下也觀之天地之道則天之氣下交於地故能發育萬物而其道光明地之勢本自卑下故能順承天施而其氣上行天之下交地之處卑此其謙也天道光明地道上行此其亨也天地之亨猶必以謙也而況於人乎其以天地言謙亨者艮陽卦居下天道下際之象也坤隂卦居上地道上行之象也天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也此釋君子有終之義而先論謙之常理也天下之道其謙者必盈盈者必損一損一益皆自然之理也以天道言則盈盛者虧退謙虚者加益故日往則月來寒往則暑來以地道言則盈滿者傾變卑下者流聚故或髙岸為谷或深谷為陵言乎鬼神則盈滿者禍之謙損者佑之故作善降之百祥作不善降之百殃言乎人道則疾惡於盈滿好與於謙巽故志自滿則九族離徳日新則萬邦懐凡此者皆自然之常理故聖人詳言之所以戒盈而勸謙也為君子者思有終之道而安處乎謙巽則其居尊也益至於光顯其居卑也亦不得而踰之君子之所以有終者其不以此哉大傳曰徳言盛禮言恭謙也者致恭以存其位者也夫謂之存其位則信乎其有終矣豫剛應而志行順以動豫豫之為卦以四之一陽為羣隂所應而其志得行又其徳内順而外動有順理而動之意此卦所以名豫也夫豫者和樂之義也為人上者或違衆志而獨行逆天理而妄動則人心之不樂亦甚矣其何以合豫之道哉豫順以動故天地如之而況建矦行師乎豫之為道順動而己天地之化且必順而動也而況於建矦行師乎以天地言者震陽坤隂天地之象也天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉又極言天地聖人之順動而贊其道之大也天地之運以順而動此天地之所以為豫也故日月之度不過差四時之行不愆忒而歲功以成矣聖人之事以順而動此聖人之所以為豫也故重刑輕罰无不清簡天下之民无不心服而教化以洽矣夫順以動者所以盡乎豫之道而己而其氣化之不忒治功之大成則皆其自然之應也既論順動之道矣然其言有盡而意无窮也故又贊之曰豫之時義大矣哉君子當乎豫之時則必盡乎豫之義是豫之時與義皆甚大也豫之義者即豫之道也隨剛來而下柔動而說隨以剛下柔己能隨物也此動彼說物隨於己也大亨貞无咎而天下隨時聖人舉事合時措之宜而天下皆隨之是天下隨聖人之時也言天下隨聖人之時則聖人隨天下之時可知矣隨時之義大矣哉夫隨於時者必隨於義隨時而不隨義則其隨時者因循苟且之為也非聖人之隨時也聖人之隨時唯義之與比如義當揖遜則揖遜者時也義當征伐則征伐者時也言隨時之義而贊之曰大矣哉以見時之當其義者為難也能是道者其時中之君子乎其通變之聖人乎蠱剛上而柔下巽而止蠱艮上巽下而上下不交下卑巽而上苟止此所以為蠱也二者乃致蠱之由非治蠱之道也蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也此言蠱極則必治而治蠱必有道也蠱元亨者蠱之既治也不先言治蠱之道而乃先言其效者以明亂之可治也利涉大川方治蠱之時也故謂之往有事先甲三日後甲三日即所謂有事也先甲三日先於事之始而究其所以然也後甲三日則後於事之終而慮其将然也以終則有始為天行者言治蠱者所以順天之道也天之道有始必有終既終復有始聖人知天道之如是故其所以慮事者既原之於其始而又要之於其終其用心如此此其所以元亨也臨剛浸而長說而順剛中而應大亨以正天之道也為卦内說而外順九二剛中而上應六五唯其如此是以大亨而得正也大亨而得正乃可以合乎天道也以人言之凡所臨者莫不貴於和說而恭順然和說而非剛中則為邪媚恭順而非正應則為苟合故能說而順者又必剛中而應然後可大亨而正也且常人之情惟其有欲也故不能同乎天若能和順而剛正則一於理而无欲矣其不謂之天徳乎至于八月有凶消不久也闕大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣此極言觀道之自然也卦辭但言聖人之為觀而此以天道言之者盖聖化自然之妙非天道不足以為喻也卦辭本言聖誠之化而此又言神道者盖誠者言其所存神者言其妙用惟其誠之極是以神之至也合彖傳而論之其意若曰聖人之大觀在上者以其有順巽中正之徳也然其徳如此曷嘗有一毫之私乎亦至誠而己矣故其曰觀盥而不薦有孚顒若者言聖人能積其誠敬則天下之民得之於觀感而自化初未嘗以智力之私為之也聖人之道亦如天而已觀天道之至神而四時自不忒聖人以神道設教而天下亦自服是果有待於智力之私邪盖徳而非誠則事多虚假而不足以為徳誠而非神則所謂誠者亦㡬乎息矣故誠者徳之實也神者誠之著也聖人之大觀與造化同其大其以此歟頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也剛柔分以下皆噬而嗑之之道也剛柔分者卦三隂三陽如人之剛柔相濟而不過也動而明者下動而上明如人之動而能察也雷電合而章者雷電相須如人之威照並行也柔得中上行者以卦變言之如人君以柔中之徳居尊位也六五以柔居尊雖不當位然合威與明而得中固能盡用獄之道也賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也謂之天文者其剛柔交錯一往一來更相賁飾皆自然而成文如天之文也大傳曰物相雜故曰文物相雜者剛柔交錯之謂也文明以止人文也内離為文明外艮為止於其所文明而各得其分此人道有倫序之象也故謂之人文觀乎天文以察時變觀乎人文以化成天下觀者觀之於卦也夫日月星辰之錯列寒暑隂陽之代變此天之文也而卦之剛柔交錯有似焉故聖人觀之於卦以察四時之遷改則厯以治矣君臣上下之位序制度儀章之品節此人之文也而卦之文明以止有似焉故聖人觀之於卦以革天下之風俗則化以成矣所謂參贊天地之化育經綸天下之大經其聖人用賁之道歟剥剥也柔變剛也柔變剛者以柔而易剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也不利有攸往而曰小人長者以小人道長則君子道消故不可有為也順而止之謂之觀象者盖君子知不可有為順時而止乃觀卦爻進退之象而法行之也君子尚消息盈虚謂之天行者盖天下之理此消則彼息此虚則彼盈乃天道之常也君子觀象則知小人方盛君子必衰君子既衰亦必復盛其進退之隨時无非天道也復亨剛反動而以順行是以出入无疾朋來无咎卦之徳為動而順是動而以順行也未可動而動或動而不以順皆不免於疾咎也若可動而動則動无不時以順而行則行无不達故已之出入既无疾而朋類之來亦无咎此復之至善者也反復其道七日來復天行也利有攸往剛長也復其見天地之心乎此一句之義程朱備矣今惟引其文而釋之程子曰一陽復於下乃天地生物之心也先儒皆以靜為見天地之心盖不知動之端乃天地之心也夫天地之心即所謂仁也天地无心而成化而必曰天地之心者盖天地以生物為心乃无心之心也天地之心亘古今无間也而以為必因復而後見則亦有不可見之時矣其不可見者非天地之心有時而无也盖自人之所見者言之也自人觀之方至靜之時則茫乎其无端寂乎其无朕天地之心何由而見哉及既動之後則陽徳之烜赫萬物之暢茂其天地之心者又散漫而難見矣故欲見天地之心者唯在於方動之端也又曰復非天地心復則見天地心者盖復者陽之方動以氣言之也天地之心者天地生物之仁以理言之也當陽之方動而生物之仁因是可見耳非謂復即天地之心也又曰聖人未嘗復故未嘗見其心者此以善惡之復言之也復有二義有動靜之復有善惡之復以動靜言則寂然不動感而遂通聖人之復猶天地之復也以善惡言則昔也昏迷而今則開悟乃常人之復耳豈謂聖人之如是哉朱子曰積隂之下一陽復生天地之心㡬於滅息而至此乃復可見其言㡬於滅息者天地之心非真有滅息也以其不可見而有似於滅息爾又曰在人則為靜極而動惡極而善所為靜極而動即聖人動靜之復也惡極而善即常人昏迷之復也其引邵子之詩曰冬至子之半天心无改移者盖冬至在十一月之半而又在於夜半子時然夜半以前已屬子時則夜半乃子時之半也數每從此始而略不差移此所以見天心也又曰一陽初動處萬物未生時者此乃指欲動未動之間而言之即所謂子之半也又曰𤣥酒味方淡大音聲正希者一陽初動而萬物未生无聲臭氣味之可見如祭祀之明水其味至淡薄如清廟之朱絃其音甚希䟽此皆所以贊復之妙也故又結之曰此言如不信更請問庖犧无妄剛自外來而為主於内動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉卦由訟而變九自二來而居初是剛自外來也卦以内卦為主而内震又以初爻為主是剛自外來而為主於内也卦徳震動而乾健卦體九五剛中而應六二陽剛為主動而能健剛中而應皆无妄之道也大亨而以正乃天命之當然也天命即天道也夫能大亨者以其正也其或非正則為有過誤而不利於往矣故曰无妄之往何之矣言不宜妄往也其所以不宜往者盖以動不合天故天命不祐也又曰行矣哉言其必不可行也大畜剛健篤實輝光日新其徳内乾剛健外艮篤實輝光人能如是則内外合徳而日新矣其藴畜豈不大乎剛上而尚賢能止健大正也剛上謂上九以陽剛居尊位之上也以卦變言此卦自需而來九自五而上以卦體言六五尊而尚之此剛上而尚賢之義也又卦徳艮止而乾健是以艮之止而止乾之健也尊尚剛徳之賢止乎至健之道二者非大正則不能此大畜之所以利貞也不家食吉養賢也養賢者亦取尚賢之象自剛上而言則謂之尚賢所以盡其禮也自不家食而言則謂之養賢所以重其禄也尚賢者有尊崇之意養賢者有親愛之心非六五之中順安能若是哉利涉大川應乎天也應天亦主五言也五應於乾之中爻是順應乎天也以大畜之君臣相應以濟斯世非順天之時協天之道亦何由而成功乎頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也頤之貞吉言所養者正則吉也觀其所養者觀其所養之道觀其自養者觀其所以養身之術其字指所養之人觀則自他人觀之也觀其養徳而以正則必有以成其徳養身而以正則不至於傷其生若此者皆吉之道也天地養萬物聖人養賢以及萬民頤之時大矣哉養之為道非徒養徳養身而己也故又推極而言之如天地之養物聖人之養人无適而非養之道而其所養者亦无適而非正也天地之大而萬物生育於其中聖人之治天下而養賢才以及萬民夫養育賢才使之治夫民是養賢者即所以養萬民也天地聖人之所養者如此此頤之時所以為大也不曰時義時用而止言時民物之生與養以時為大也天地失其時則萬物不遂聖人違其時則庶事不立養之得其道而又順其時非天地聖人之功用乎大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨當大過之時而能處之以剛中行之以順說則時雖過盛而理不過差其有往而亨冝矣哉大過之時大矣哉處大過之時者其事為甚難也苟非有大過人之才亦安能救大過之弊乎習坎重險也水流而不盈行險而不失其信此釋有孚之義也水流而不盈者以其重坎故未盈也水流於坎險必既滿而後復行所謂盈科而後進也今水流而不盈處險之中而能不妄行亦如人守其孚信而不至於濫溢故云行險而不失其信也維心亨乃以剛中也行有尚往有功也維心之亨者以其剛而處中也行則有尚者以其往而有功也譬之水焉其流而不盈時止則止也盈而後進時行則行也坎以能止為信以能行為功時止時行其君子處險之道歟天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉此又推言險之義也天惟其險故人不得升地惟其險故有山川與丘陵由此觀之王公之有國者可不設險乎王公之設險如城郭溝池以為固是也故曰險之時用大矣哉言國家有用險之時而險之用甚大不可不謹也程子又有曰若尊卑之辨貴賤之分凡所以杜絶陵僭限隔上下者皆體險之用此又推明傳外之意也離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下離者附麗也觀之日月必麗乎天然後有以運行而照臨百穀草木必麗乎土然後有以發生而成遂以君臣言之亦必上下重明而皆麗於正道然後有以化天下而成文明之治焉二五皆離體乃君臣之重明也又皆處中正乃君臣皆麗乎正道也凡物之有形者則必有所麗如麗乎天麗乎土皆有形者也今言君臣不曰麗乎位乃曰麗乎正見君臣之合必皆附麗於正道若不麗於正雖有其位亦不能以治也彖言利貞而傳以是明之其意精矣柔麗乎中正故亨是以畜牝牛吉也卦之二五皆以柔而麗乎中正之道此其所以亨也二五既以中正而致亨則畜牝牛之吉可知矣牛之性本順而又為牝牛則順之至也麗於中正者非至順之人安能之故如牝牛者乃所以麗乎中正也六五本非正而與二總言中正者以中為重而可以包乎正也周易參義卷三
