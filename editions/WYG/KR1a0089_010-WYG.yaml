body:
  text: 周易參義卷十元梁寅撰説卦傳昔者聖人之作易也幽贊於神明而生蓍天下之理有以感之則必有以應之聖人之德幽贊於神明所以感之於隱然之中也神明相之而為之生蓍所以應之於顯然之際也參天兩地而倚數此以揲蓍言之也參天者參之以三兩地者兩之以二如天圎一而圍三三各一竒地方一而圍四四合二偶此參天兩地也天之生數為一三五地之生數為二四亦參天兩地也凡數皆本於天地其謂之倚數者言其數相依倚而成也如揲蓍三變之末其餘三竒則三三相倚而為九三偶則三二相倚而為六一三倚於兩二則為七一二倚於兩三則為八而於他數亦莫不然也觀變於隂陽而立卦發揮於剛柔而生爻以天地之氣言之則曰隂陽以竒偶之畫言之則曰剛柔隂陽者未入用而剛柔者已入用也言一卦之全則觀變於隂陽而立之者也故隂陽之氣有消息焉而姤復夬剥之卦立矣有升降焉而泰否損益之卦立矣言六爻之分則發揮於剛柔而生之者也故各卦之中或自剛而之柔或自柔而之剛剛之為爻百九十二自一偶而生也柔之為爻百九十二自一竒而生也聖人之作易本先有爻而後有卦此云立卦而後生爻者由後人之觀易者而言故先全卦而後六爻也和順於道德而理於義窮理盡性以至於命易書之作也其規模之大有以貫三才之道而无所乖戾焉此其所以和順於道德也其條理之密有以辨事物之宜而无所迷謬焉此其所以理於義也盖道德者義之統體義者道德之發用乃離合言之也至於萬物之宜萬事之變易皆有以覈之非所以窮天下之理乎大而人倫小而一物易皆有以處之非所以盡人物之性乎然曰理曰性皆天道也而易能窮之盡之以合於天道之自然又非所以至於命者乎盖理性者天命之散見天命者理性之本原其始窮之盡之功猶人也其終合於天道則人而天矣是又以淺深而言也右第一章昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章聖人之作易无非以發揮斯道之大也故曰順性命之理性命云者只混合而言之猶所謂太極之全體不必以性為在人命為在天也至於天地人之道則乃性命之分見於三才者是乃三才各具一太極也无所乖戾謂之順順性命之理順其在於造化者也有其定名謂之立立三才之道立之於易書者也性命之理即一隂一陽之道其理固未嘗外於隂陽也故自易而觀之則三才各具一理亦各具一隂陽也盖兩不立則一不可見一不可見則兩之用息一者其理也兩者所以載其理也以六爻觀之五上立天道初二立地道三四立人道天之隂陽固以氣言矣而地之柔剛亦隂陽之質也人之仁義亦隂陽之性也天地之道必因氣質而見而人之道不言氣質者以氣質之在造化者无善惡之分而在人則有善惡之異故於人不言氣質而直言德也八卦而小成固為三才之道矣及其重之則三才之道又以兩而立故易以六畫而成卦也然六畫之位以隂陽分之則初三五為陽位二四上為隂位此所謂分隂分陽也然位雖有隂陽而未嘗不迭居故陽或居隂位隂或居陽位此所謂迭用柔剛也分隂分陽迭用柔剛則六位之中剛柔交錯豈不粲然而成章歟盖三才之分屬者不易之體也剛柔之迭居者變易之用也易之為道自本而幹自幹而枝合而言之則極其大而无餘分而言之則極其精而不亂其廣大悉備於是見矣右第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯先天八卦之位乾與坤對故乾居南坤居北乃天位於上地位於下六子效其用而父母處其尊此天地所以各定其位也艮與兊對故艮居西北兊居東南雲雨出於山則山通澤之氣水泉注於澤則澤通山之氣是山澤之所以相通也震與巽對故震居東北巽居西南雷動則風隨風激則雷迅是雷風之相薄也薄謂親近之也坎與離對故離居東坎居西水火二物本相尅者而反相應是水火之不相射也射謂觸犯之也八卦之相對待此其體之常也至於八卦之上又各以八卦次第而加之則相交錯而為六十四卦矣是則其用之變也數徃者順知來者逆是故易逆數也起震而厯離兊以至於乾數已生之卦本為逆也而謂之順者猶自今日而追數昨日也自巽而厯坎艮以至於坤推未生之卦本為順也而謂之逆者猶自今日而逆計來日也然易之生卦則如横圖所陳及圎圖之右方而已故曰易逆數也盖自震之初為冬至至乾之末而交夏至自巽之初為夏至至坤之末而交冬至則以卦氣言之自震之一陽離兊之二陽而至於乾之三陽自巽之一隂坎艮之二隂而至於坤之三隂則以卦畫之生處言之是皆為徃順而來逆也右第三章雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之雷動至兊説隂陽之為用者也所以生萬物也乾君坤藏則隂陽之不用者也所以統萬物也以六子觀之乾坤初爻相交而為震巽故雷以動物而物萌風以散物而物具乾坤中爻相交而為坎離故雨以潤物而物滋日以烜物而物舒乾坤終爻相交而為艮兊故艮以止物而物成兊以說物而物遂此豈非隂陽之為用而生萬物者乎然乾父坤母純陽純隂而不交者也故氣之方通而物之方生則主於乾而動氣之旣復而物之旣成則歸于坤而藏乾居上而臨下故曰君坤居下而有終故曰藏此豈非隂陽之不用而統萬物者乎然震巽坎離取象義多故以象言之艮兊乾坤取卦義多故以卦言之天地定位一節首乾坤此一節則先六子者盖前乃先天八卦之體也故先言不用者而後言用此乃先天八卦之用也故先言其用者而後言不用如文王八卦專以用言之亦始于震巽而退乾于西北退坤于西南于此見八卦之體用先後固當不同也右第四章帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮勞去聲邵子以此為文王八卦盖因坤蹇解三卦彖辭而推之也伏羲八卦乃對待之體而謂之先天文王八卦乃流行之用而謂之後天二者之次序固為不同而亦未嘗不相須也帝者天之主宰而萬物之生成无不由之其神運於四時而游乎六合固不得而測也詩云昊天曰明及爾出王昊天曰旦及爾游衍此帝之出入可以見也震於方為東於時為春於五行為木而曰帝出乎震者帝於是時而始出乃令之方行氣之方動而萬物萌露之時也巽於方為東南於時為春夏之交於五行亦為木而曰齊乎巽者當是之時萬物已畢達而整齊也離於方為南於時為夏於五行為火而曰相見乎離者萬物明盛皆聚而相覩也坤於方為西南於時為秋夏之交於五行為土而曰致役乎坤者言地能役已以養物而不自以為罷也兊於方為西於時為秋於五行為金而曰説言乎兊者物至此時皆形色充盈而欣説也乾於方為西北於時為秋冬之交於五行亦為金而曰戰乎乾者自巽至兊皆隂卦而忽與乾遇故隂疑於陽而必戰也坎於方為北於時為冬於五行為水而曰勞乎坎者物於此時皆歸藏故慰勞之也艮於方為東北於時為冬春之交坎水非土則不能以生震木故艮於五行亦為土而曰成言乎艮者萬物皆止於此也然止不終止至震而復出矣故下文又言成終而成始也後天八卦之序如此以方言之則有周游之義以時言之則為迭旺之時以五行言之則得相生之次又自震而坤為元亨誠之通自兊至艮為利貞誠之復自東南至西皆母與三女之位自西北至東皆父與三男之位又震兊始交故當朝夕之位坎離交之極故當子午之位巽艮不交而隂陽猶雜故當用中之偏乾坤純隂純陽故當不用之位然八卦之中震與兊對則物生於春而成於秋故不曰説乎兊而必曰説言乎兊是兊與震均敵而説物之功為大也震與艮連則氣始於春而終於冬春之交故不曰成乎艮而必曰成言乎艮是艮又與震交際而成物之功為大也聖人立言之意盖如此云萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治盖取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所説也故曰説言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮言萬物出乎震者盖帝旣出焉則萬物亦隨之而出也齊乎巽而言潔齊者盖萬物發生而明絜故齊也離之時萬物皆相見乃盛夏之際亨嘉之㑹也而聖人之南面而立嚮明而治實有取焉盖以離為陽明之方而聖人之位亦陽明之位其為治者亦陽明之治也然於離獨言聖人之所取姑舉其一爾如對時育物之取於震申命行事之取於巽皆可以例而推之也坤獨言地者以方言之則屬西南而實則容載萬物者皆地也言萬物皆致養者地之生物如母之乳養其子无所偏愛也兊獨言正秋者舉其一時而他可知也乾言隂陽相薄者相薄即交戰之謂也坎言勞卦而又曰萬物之所歸者物歸則必有以慰勞其出之難也又方脱乎戰則勞瘁之餘亦當慰勞也艮言萬物之成終成始者旣動而止止則復動旣始而終終則復始艮者萬物之所由終所由始也後天八卦始之以震而終之以艮如四德始之以元而終之以貞震艮之交貞元之際可以觀生生之機矣艮之彖傳言時止時行則艮雖為止而實兼動靜成終者時止也成始者時行也艮之為卦其造化闔闢之樞歟右第五章神也者妙萬物而為言者也動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化旣成萬物也上言帝出乎震以生萬物而此言神之妙萬物者盖神即帝也帝者神之名神者帝之靈帝者神之體神者帝之用凡物皆有神也而物莫大於天則神亦莫尊於帝故主宰萬物者帝也而所以妙萬物者帝之神也然此去乾坤而專言六子者盖乾父坤母无為於上而六子效其用於下六子之所為即乾坤之所為六子之成功即乾坤之成功也然雖不言乾坤而首之曰神妙萬物則神者豈非乾坤之妙用乎六子之致用皆神之所為也然雷風山澤水火此象也非神也雷之動風之橈火之燥澤之説水之潤艮之終始此氣也亦非神也所謂神者果何哉盖其所以動橈所以燥説所以潤所以終始是之謂神也六子者各有在而神則无在无不在六子者各有為而神則无為无不為其妙之至不可以名姑强名之曰神爾然言六子之用矣而又繼以水火雷風山澤之對待者何歟盖以四時為序者六子之用而其所以主時成用則以由隂陽之交合故又仍用伏羲之卦序盖對待非流行則不能以變化流行非對待則不能以自行也聖人之言反覆相明而造化之妙无餘藴矣右第六章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也右第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兊為羊右第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口右第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女右第十章乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其于地也為黑震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其于馬也為善鳴為馵足為作足為的顙其于稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其于人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其于人也為加憂為心病為耳痛為血卦為赤其于馬也為美脊為亟心為下首為薄蹄為曳其于輿也為多眚為通為月為盗其于木也為堅多心離為火為日為電為中女為甲胄為戈兵其于人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其于木也為科上槁艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為䑕為黔喙之屬其于木也為堅多節兊為澤為少女為巫為口舌為毁折為附決其于地也為剛鹵為妾為羊右第十一章周易參義卷十
