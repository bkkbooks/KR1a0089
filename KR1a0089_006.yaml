body:
  text: 周易參義卷六元梁寅撰象下傳山上有澤咸君子以虛受人説卦云山澤通氣山上有澤則澤能潤乎山山受澤之潤其氣之相通可知矣君子觀山澤之象明感通之理故虛其中以受於人以物譬之舟唯虛故物無不載鑑唯虛故形無不睹君子以能問於不能以多問於寡樂取諸人以為善非其以虛而受安能若是哉咸其拇志在外也雖凶居吉順不害也其居則吉者順於理而不害也咸其股亦不處也志在隨人所執下也貞吉悔亡未感害也憧憧往來未光大也未感害者言能正固而亡其悔則未有私感之害也咸其脢志末也咸其輔頰舌滕口説也雷風恆君子以立不易方廬陵楊氏曰終始變化者恆之道所以久而不窮也立不易方者恆之節所以久而不變也浚恆之凶始求深也九二悔亡能久中也不恆其德無所容也久非其位安得禽也婦人貞吉從一而終也夫子制義從婦凶也振恆在上大無功也天下有山遁君子以逺小人不惡而嚴天之高無窮而山之高有限自下觀之則山之勢若上陵於天矣然自上而觀則天之與山邈然不相及也君子觀天逺於山之象則其心與天同運隨時避禍而小人不得以陵之是君子如天而小人如山也逺小人不惡而嚴猶所謂不怒而威也天之於山豈悍然絶之乎蓋其勢尊高而山自不能陵之爾君子之於小人亦豈必攘袂切齒以待之乎蓋其所守者嚴正而小人自不能干之爾處遁之君子與天同德者如此夫遁尾之厲不往何災也執用黃牛固志也係遁之厲有疾憊也畜臣妾吉不可大事也君子好遁小人否也嘉遁貞吉以正志也肥遁無不利無所疑也雷在天上大壯君子以非禮弗履雷在天上其威嚴果決至為可畏大壯之君子所以勝私復禮者亦如雷之果決故能決去非禮之事而所踐履者動皆天理也若自治不勇而優柔牽制則義理之心不為私欲所勝者鮮矣壯于趾其孚窮也九二貞吉以中也小人用壯君子罔也藩決不羸尚往也喪羊于易位不當也不能退不能遂不詳也艱則吉咎不長也明出地上晉君子以自昭明德自昭明德即大學之所謂明明德兼知行而言也謂之自昭者見其功之由乎已而無待於人也晉如摧如獨行正也裕無咎未受命也欲進而見摧則獨行其正而已固不可以冒進也不為人所信而處以寬裕者以未受君之爵命故可如是也若有官守而寬裕則為咎矣受兹介福以中正也衆允之志上行也鼫鼠貞厲位不當也失得勿恤往有慶也維用伐邑道未光也明入地中明夷君子以蒞衆用晦而明日之入於地中其明固傷矣然其照灼於地下則明未嘗滅地之上雖昏而月亦借其光以為照但不若晝之大明也君子觀象而臨蒞其衆則用晦而明蓋不欲察察以極其明耳非一於晦而不明也或曰離以繼明照四方而明夷以蒞衆用晦而明意得無異乎曰四方者極其逺而言之也故貴於廣照蒞衆者即其近而言之也故用晦而明若逺而用晦則見有所遺近而太察則多所猜忌皆非明君之所宜也象之取義豈膠於一而已乎君子于行義不食也六二之吉順以則也南狩之志乃大得也入于左腹獲心意也箕子之貞明不可息也箕子蓋外晦而內明者故其明不可息若一於晦則其明息矣初登于天照四國也後入于地失則也風自火出家人君子以言有物而行有恆風必有所自而出而其出也無常所凡氣之遒緊者皆風之自出故火之熾也其氣遒緊而風出於其中及其在外之風應之則其氣益遒而火益熾矣君子觀風之自火而出則知天下之事莫不有自故天下之治自於國國之治自於家家之治自於身身之治自於言行而言行者亦豈無所自乎君子身居於一家而化及於天下唯明於其所自故言必有物而行必有恆二者之所自豈非皆自其心乎其心明於理而能實其所發則言本於心必以其事實而不敢虛誕矣行本於心必以其常度而不敢差忒矣此之謂言有物行有恆也中庸曰知逺之近知風之自知微之顯可與入德矣正家之君子修其一身以為治人之本其明於此乎間有家志未變也六二之吉順以巽也家人嗃嗃未失也婦子嘻嘻失家節也富家大吉順在位也四以隂居隂又為巽之主皆順在位也王假有家交相愛也威如之吉反身之謂也吾身既修而猶有不化然後可用威若不先自治而用威以治人其能服乎故威如之所以吉者以其先能反身而後威如也上火下澤睽君子以同而異火澤二體合而為一此其同也然火之性上而又居上澤之性下而又居下是同而異矣君子觀火澤之象有以同於人而或異於人如本心則同而制事則異處常則同而應變則異修身則同而出處則異大節則同而細故則異以此推之皆所謂同而異也彖傳言異而同以理言之也此言同而異自人言之也見惡人以辟咎也遇主于巷未失道也遇主于巷似於枉道以求合故傳特明之曰未失道也見輿曳位不當也無初有終遇剛也交孚無咎志行也厥宗噬膚往有慶也遇雨之吉羣疑亡也山上有水蹇君子以反身修德水出於山上冝其流之易也然謂之蹇者以山多險而水常小水小而流險則難於盈而行不逺矣豈非蹇乎君子觀其象則見險而止姑反身以修德焉德既盛矣險既出矣則有為於斯世將沛然而莫之禦矣若然者如溥博之淵泉而時出之又何險之為患哉往蹇來譽宜待也當蹇之時雖當助於九五以濟其蹇然初處卑下未能自進故宜有所待謂待上位者援而進之也王臣蹇蹇終無尤也二在大臣之位以濟蹇為已任事之利鈍雖未可必然義所當為果何尤乎往蹇來反內喜之也三能復於臣職以助九五則九五喜之矣內謂九五也蓋非以卦之內外言乃以君臣之內外言也往蹇來連當位實也四居坎體柔弱之甚雖不能出險然與九五連比五陽剛而當位是當位者實而易於輔助也是豈無出險之時乎大蹇朋來以中節也九五當大蹇而得朋來之應者以其能處中而得人君之大節也往蹇來碩志在內也利見大人以從貴也從貴謂從於九五雷雨作解君子以赦過宥罪雷雨並作而物之屯難者皆解散矣故君子順天時而以赦其過之小寬其罪之大月令仲春省囹圄去桎梏止獄訟亦因解之時而行寬恤也剛柔之際義無咎也初與四為正應是剛柔相交際其義自無咎也九二貞吉得中道也負且乘亦可醜也自我致戎又誰咎也解而拇未當位也君子有解小人退也公用射隼以解悖也六三為悖逆者而上能解去之故曰以解悖也山下有澤損君子以懲忿窒欲高山之下而有水澤則其水急湧而莫遏注於深險而難盈君子觀其急湧之象則以懲其忿觀其難盈之象則以窒其欲又忿之暴起則如山之高故必懲欲之無厭則如壑之深故必窒皆損之義也大傳曰損德之修也君子損其忿而不忘身以辱親損其欲而不自處於汙穢則其德修可知矣已事遄往尚合志也九二利貞中以為志也一人行三則疑也損其疾亦可喜也六五元吉自上祐也弗損益之大得志也上九以天下之益益天下乃王者之道也其澤加於民豈私恩小惠之比哉故云大得志也風雷益君子以見善則遷有過則改風以散之雷以動之則萬物莫不受其益又風烈則雷迅雷受風之益雷激則風怒風受雷之益二物並興交相助益此卦之所以為益也君子觀其象見人之善而遷以從之則如風之速而不留知已之過而斷然改之則如雷之奮而有決此其益於身者亦大矣又見善則遷而改過愈勇有過則改而遷善愈速是遷善改過亦交相助益也然以二者言之則遷善為易改過為難遷善則在我者亦善而不及他人之尤善故遷以從之猶所謂聞義能徙也改過則在我者不善而速改以從善猶所謂不二過也若云遷善即改過則非矣元吉無咎下不厚事也所以必大善則吉而無咎者以在下者本不當任厚事故不能大善則未免有咎也如子之於父臣之於君僚屬之於官長凡有所為易於踰越其職分苟其為之不能盡善雖為所當為豈能免於譏乎或益之自外來也或益之者以其益從外來出於自然而不可期必也益用凶事固有之也告公從以益志也有孚惠心勿問之矣惠我德大得志也莫益之偏辭也或擊之自外來也如上九者但知益已而不知益人是其心之偏而不公也故爻言莫益之者乃偏已之辭也既偏而不公則為人所惡已方求益而損反至矣言或擊之者蓋殃禍自外而來出於不意也澤上於天夬君子以施祿及下居德則忌澤上於天則其勢必潰決於下矣君子觀潰決之象於是施祿以及下如以爵祿待賢才以恩惠賙百姓皆施祿之謂也居德則忌言以德自居而不恤其下則在所疾惡也夫人之積德貴於推以及人也若安然自得而下之休戚不顧焉是豈仁人之心乎在上而如是則雖以德自居而德非其德矣不勝而往咎也有戎勿恤得中道也君子夬夬終無咎也其行次且位不當也聞言不信聰不明也中行無咎中未光也五得中而不能大吉者以其近于陰故中德尚未光大也無號之凶終不可長也天下有風姤后以施命誥四方天下有風則物遇其吹噓后施誥命則民遇其德澤風者天之號令命者君之號令后以命誥於四方如天以風行於天下其周遍可知矣繫于金柅柔道牽也隂柔始生則牽引其類而進矣􅊶有魚義不及賔也二止隂之進者義當不使害及於衆陽也其行次且行未牽也其行次且則未能牽引以去也無魚之凶逺民也九五含章中正也有隕自天志不舍命也志不舍命言人心可以回天命也姤其角上窮吝也澤上於地萃君子以除戎器戒不虞澤本在地之下而乃上於地則其水潰決不可無隄防矣君子觀澤潰之象明萃聚之義於是除治戎器以戒不虞亦如水之潰決而萃土為之防也除者去舊取新之義戎器久則弊壞故當簡除其舊而易之以新然亦豈無故而耀武乎蓋以時當富庶則釁蘖或萌故不可不豫為之防耳乃亂乃萃其志亂也引吉無咎中未變也往無咎上巽也大吉無咎位不當也萃有位志未光也齎咨涕洟未安上也地中生木升君子以順德積小以高大地中生木自下而升高君子以巽順之德自小而積漸以至於高大亦猶木之升長也卦上坤為順下巽亦順故謂之順德允升大吉上合志也九二之孚有喜也升虛邑無所疑也王用亨于岐山順事也諸侯祭境內山川禮也文王居岐下而主其祭乃順禮而有事也貞吉升階大得志也冥升在上消不富也昏冥而升者唯有消亡不復能富矣澤無水困君子以致命遂志不言澤下有水而曰澤無水者下雖有水而不盈乃其外枯涸而內涵潤之象也君子之處困者其身雖困而其道自亨是亦猶澤之外枯而內潤也致命遂志者言得喪窮通皆委之於命以遂吾之志也夫君子之志雖大行不加雖窮居不損故道與時違則委致於命是雖不遂吾兼善之志而遂吾獨善之志矣如言遁世而無悶樂天知命故不憂皆所謂致命遂志也處困之君子能如是者以坎為心亨兊為和説在險而心亨遇枯涸而和説將無入而不自得矣彼汲汲富貴而戚戚貧賤者烏足語此哉入于幽谷幽不明也困于酒食中有慶也據于蒺藜乘剛也入于其宫不見其妻不祥也來徐徐志在下也雖不當位有與也四雖不能拯初之困然志在於下故初亦徐徐而來也有與者其終與初合則為有與矣劓刖志未得也乃徐有説以中直也利用祭祀受福也困于葛藟未當也動悔有悔吉行也木上有水井君子以勞民勸相木上有水如以木器汲水而上之君子觀汲井之象推及物之功於是勞來其民而勸勉相助之使之各安其業各遂其生乃所以法井之用也井泥不食下也舊井無禽時舍也井谷射鮒無與也井泄不食行惻也求王明受福也求王明者言必遇明王而後能用之非九三自往求之也然曰求之者猶言夫子之求之異乎人之求之也井甃無咎修井也寒泉之食中正也元吉在上大成也澤中有火革君子以治厯明時澤中有火火盛則克水水盛則克火乃變革之義也君子觀其象以治厯數而明天時則五日為候三候為氣六氣為時四時為歲至於晦朔弦望之不差分至啓閉之有定皆所以順變革之義也鞏用黃牛不可以有為也已日革之行有嘉也革言三就又何之矣改命之吉信志也大人虎變其文炳也君子豹變其文蔚也小人革面順以從君也木上有火鼎君子以正位凝命木在火上者以木巽火而烹飪也鼎之為器置之必正而烹飪之際尤貴於正苟傾側不正則其顛趾覆餗有不免矣故君子觀鼎之象以正其位所以凝集其天命也夫人君居於尊位而端正安重則所發必正言所行必正道而天命佑之鞏固而不去是亦猶鼎之安重而有以貯其實也鼎顛趾未悖也利出否以從貴也鼎有實慎所之也我仇有疾終無尤也鼎耳革失其義也覆公餗信如何也信如何猶漢書曰顧誠何如言覆公之餗誠何如哉蓋凶可知也鼎黃耳中以為實也鼎耳本中虛貫之以鉉則實矣玉鉉在上剛柔節也洊雷震君子以恐懼修省雷聲重洊則其威甚盛故君子以恐懼而修省恐懼者懼禍之至也修省者省察其身所以致禍之由也震來虩虩恐致福也笑言啞啞後有則也震來厲乘剛也震蘇蘇位不當也震遂泥未光也震往來厲危行也其事在中大無喪也震索索中未得也雖凶無咎畏鄰戒也畏鄰戒言懼鄰之有禍而先自警戒也兼山艮君子以思不出其位山止其所而不動而上下皆山則又各止其所而不相侵越焉故君子觀兼山之象而思不出其位位者當止之所當為之事也人能止所當止為所當為是所思不出於位也若踰分越職而為之則所為雖善亦非義也況於肆為不善乎艮其趾未失正也不拯其隨未退聽也所以不能拯救其所隨而心有不快者以三之艮限列夤未能退聽於二也艮其限危薰心也艮其身止諸躬也凡所止者皆當反求諸吾身故云止諸躬艮其輔以中正也敦艮之吉以厚終也山上有木漸君子以居賢德善俗山以漸而高木以漸而長而山上有木其高下相因亦有其漸也君子觀漸之象以居積其賢德善美乎風俗莫不當以其漸也居賢德以漸則日就月將不半塗而廢善風俗以漸則期月而可三年有成其施為之緩急必以序為學為政果何異山木之相因乎小子之厲義無咎也飲食衎衎不素飽也夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也或得其桷順以巽也終莫之勝吉得所願也其羽可用為儀吉不可亂也澤上有雷歸妹君子以永終知敝澤上有雷則潛處之久而今始出焉妹之歸者亦先處而今出故澤上有雷為歸妹也君子觀象於夫婦之道婚姻之禮必謹其始故能長永以終而知其敝壞蓋由婚姻之禮得夫婦之正則久而無敝不以其禮不由於正或合以淫姣或夫制於婦若是者皆為敝矣何以能久乎歸妹以娣以恆也跛能履吉相承也以恆者有常久之德也相承者能承順其嫡也利幽人之貞未變常也歸妹以須未當也愆期之志有待而行也帝乙歸妹不如其娣之袂良也其位在中以貴行也上六無實承虛筐也雷電皆至豐君子以折獄致刑折獄之道惟明與斷而已噬嗑與豐皆明斷並用者然噬嗑離上震下是明其理以立法然後待其犯者而斷之故言先王以明罰敇法豐震上離下是以果斷折獄者必照之以明察然後其斷合於理故言君子以折獄致刑雖旬無咎過旬災也有孚發若信以發志也豐其沛不可大事也折其右肱終不可用也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五之吉有慶也豐其屋天際翔也窺其户闃其無人自藏也天際翔猶言如翬斯飛也自藏者自障蔽其身而無所見也山上有火旅君子以明慎用刑而不留獄山上有火則燎之速而不停滯人居旅中則處之暫而非淹久君子觀象而以之用刑則極其明慎不至留滯蓋明慎則詳審不留則果斷乃用刑之道也旅瑣瑣志窮災也得童僕貞終無尤也旅焚其次亦以傷矣以旅與下其義喪也旅于處未得位也得其資斧心未快也終以譽命上逮也居上位而得其道故人譽天命皆逮及之也以旅在上其義焚也喪牛于易終莫之聞也隨風巽君子以申命行事以風隨風其動物不已乃教令丁寧反覆之意也君子之臨民者其命令之施丁寧反覆然後見之於行事故事不差忒而人皆順從亦如風之相隨以動物也申命者戒之於行事之先行事者施之於申命之後申命者固將以行事也進退志疑也利武人之貞志治也進退者志疑而不決利貞者志治而不疑紛若之吉得中也頻巽之吝志窮也田獲三品有功也九五之吉位正中也巽在牀下上窮也喪其資斧正乎凶也正如春秋戰不正勝之正乃固必之意也麗澤兊君子以朋友講習兩澤相麗則互相滋益故彼此皆不至於枯竭君子觀麗澤之象而以朋友講習則我之進德有資於人人之進德亦有資於我是其為益豈有窮乎講者討論而知其理習者重習而踐其事朋友之相資在於講而已然既講則必習故曰以朋友講習也又卦為重兊説之至也天下之説不可過極唯講習則過説無害故於兊言之也和兊之吉行未疑也孚兊之吉信志也來兊之凶位不當也九四之喜有慶也孚于剝位正當也上六引兊未光也風行水上渙先王以享于帝立廟風散以動水水散以受風風之與水雖散而相感應是其散者所以為合也先王觀象盡其敬以享帝則郊焉而天神格致其孝以立廟則廟焉而人鬼享人心之散因祭祀而合鬼神之散因郊廟而合是皆所以合其散也初六之吉順也渙奔其機得願也渙其躬志在外也渙其羣元吉光大也王居無咎正位也渙其血逺害也澤上有水節君子以制數度議德行澤上有水過多則不能容此有節之義也數度者為粗為末制之則有節而不差德行者為精為本議之則有節而中道是皆合乎節之義也不出户庭知通塞也不出門庭凶失時極也不節之嗟又誰咎也安節之亨承上道也甘節之吉居位中也苦節貞凶其道窮也澤上有風中孚君子以議獄緩死澤上有風則風能以虛而入於澤澤能以虛而受於風此中孚之象也君子之議獄則寬仁惻怛以緩人之死亦豈非中孚之意乎初九虞吉志未變也其子和之中心願也或鼓或罷位不當也馬匹亡絶類上也有孚攣如位正當也翰音登于天何可長也山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷行於空中則其聲暴震若鳴於山上則其聲微小詩所謂殷其雷是也君子之小過者行過乎恭喪過乎哀用過乎儉乃過之當於理也若恭而大過則為足恭哀而大過則或以傷生儉而大過則儉不中禮時當小過而至於大過豈君子之所為乎飛鳥以凶不可如何也不及其君臣不可過也從或戕之凶如何也弗過遇之位不當也往厲必戒終不可長也密雲不雨已上也弗遇過之已亢也水在火上既濟君子以思患而豫防之水居上則受火之熱火居下則能熱乎水是水火相交而為既濟也既濟之時雖非有患而患之從生必由於所忽故君子慎思其患而豫為之防則不至於患矣坎險在外故當思患離明在內故能豫防曵其輪義無咎也七日得以中道也三年克之憊也終日戒有所疑也東鄰殺牛不如西鄰之時也實受其福吉大來也濡其首厲何可久也火在水上未濟君子以慎辨物居方火入水則滅而不能焚水受火則涸而不能潤是水火不交而為未濟也君子觀水火之不交則思各止於其所故慎於辨物而居方焉慎於辨物則物各有類而不紊慎於居方則事有定向而不差若是則時之未濟果何患哉濡其尾亦不知極也九二貞吉中以行正也未濟征凶位不當也貞吉悔亡志行也君子之光其暉吉也飲酒濡首亦不知節也周易參義卷六
